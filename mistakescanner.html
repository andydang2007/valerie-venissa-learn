<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner - Family Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --text-main: #1e293b; --bg: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Nunito', 'Microsoft YaHei', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #e0e7ff 0%, #bae6fd 100%); margin: 0; padding: 10px; color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .container { width: 100%; max-width: 600px; background: rgba(255,255,255,0.95); padding: 25px 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 3px solid #ffffff; position: relative; margin-top: 5vh; margin-bottom: auto; }
        
        h1 { color: #3b82f6; text-align: center; margin-top: 0; font-size: 24px; font-weight: 900; }

        /* 隐藏的右上角设置按钮，万一想换Key可以点这里 */
        .settings-btn { position: absolute; top: 20px; right: 20px; font-size: 20px; cursor: pointer; opacity: 0.5; transition: 0.2s; background: none; border: none; outline: none; }
        .settings-btn:hover { opacity: 1; transform: rotate(90deg); }

        /* 🔐 密钥设置区 */
        #key-setup-area { background: #fffbeb; border: 3px dashed #f59e0b; padding: 20px; border-radius: 16px; margin-bottom: 20px; }
        #key-setup-area input { width: 100%; padding: 12px; border: 2px solid #fcd34d; border-radius: 10px; margin: 10px 0; font-family: monospace; font-size: 16px; }
        
        /* 📸 上传区 */
        .upload-area { border: 3px dashed #cbd5e1; border-radius: 16px; padding: 25px 15px; text-align: center; cursor: pointer; transition: 0.2s; background: #f1f5f9; position: relative; margin-bottom: 20px; }
        .upload-area:hover { border-color: #3b82f6; background: #eff6ff; }
        .upload-area input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .upload-text { font-size: 16px; font-weight: 800; color: #64748b; pointer-events: none; }
        #preview-img { max-width: 100%; max-height: 250px; border-radius: 8px; display: none; margin-top: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* 📝 表单区 */
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; width: 100%; }
        label { font-weight: 900; color: #475569; font-size: 14px; }
        input[type="text"], select, textarea { padding: 14px 12px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 16px; font-weight: 700; outline: none; transition: 0.2s; background: #f8fafc; width: 100%; box-sizing: border-box; }
        input:focus, select:focus, textarea:focus { border-color: #3b82f6; background: #fff; }
        
        textarea { min-height: 180px; resize: vertical; line-height: 1.5; } /* 拉长题目框，防止内部滑动 */

        /* 手机端自动变为上下排列，告别横向拥挤 */
        .row { display: flex; gap: 15px; flex-direction: column; margin-bottom: 0; }
        
        /* 电脑端才横向排列 */
        @media (min-width: 500px) {
            .row { flex-direction: row; }
            .row > div { flex: 1; margin-bottom: 0; }
        }

        /* 🔘 按钮 */
        .btn-action { width: 100%; border-radius: 16px; border: none; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.15s; padding: 16px; color: white; margin-top: 5px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-action:active { transform: translateY(4px); box-shadow: 0 0 0 transparent !important; }
        
        .btn-ai { background: #8b5cf6; box-shadow: 0 6px 0 #7e22ce; margin-bottom: 20px; }
        .btn-save { background: #10b981; box-shadow: 0 6px 0 #059669; }
        .btn-key { background: #f59e0b; box-shadow: 0 6px 0 #d97706; padding: 14px; }

        #ai-loading { display: none; color: #8b5cf6; font-weight: 900; text-align: center; margin-bottom: 20px; font-size: 16px; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
        
        #error-msg { color: #ef4444; background: #fef2f2; padding: 12px; border-radius: 12px; margin-bottom: 15px; font-size: 14px; font-weight: bold; border: 2px solid #fecaca; display: none; word-wrap: break-word; }
    </style>
</head>
<body>

<div class="container">
    <button class="settings-btn" onclick="resetApiKey()" title="重置API Key">⚙️</button>
    <h1>🤖 智能错题录入台</h1>

    <!-- 🔑 密钥输入区 -->
    <div id="key-setup-area" style="display: none;">
        <label style="color: #b45309; font-size: 16px;">🔑 请输入 Gemini API Key：</label>
        <input type="text" id="api-key-input" placeholder="AIzaSy...">
        <button class="btn-action btn-key" onclick="saveApiKey()">保存到本设备</button>
    </div>
    
    <div id="main-scanner-area" style="display: none;">
        <div class="upload-area" id="upload-area">
            <div class="upload-text">📸 点击拍照 或 选择截屏</div>
            <input type="file" id="file-input" accept="image/*">
            <img id="preview-img" src="" alt="Preview">
        </div>

        <div id="error-msg"></div>

        <button class="btn-action btn-ai" id="btn-analyze" style="display: none;" onclick="processImage()">✨ AI 识别并解析</button>
        <div id="ai-loading">🧠 AI 正在看题，请稍候...</div>

        <div id="editor-area" style="display: none;">
            <div class="row">
                <div class="form-group">
                    <label>👤 谁的错题？</label>
                    <select id="f-user">
                        <option value="Valerie">Valerie (姐姐)</option>
                        <option value="Venessa">Venessa (妹妹)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📚 科目</label>
                    <select id="f-subject">
                        <option value="English">English</option>
                        <option value="Math">Math</option>
                        <option value="华文">华文</option>
                        <option value="Science">Science</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>📝 题目内容</label>
                <!-- 优化：rows="8" 直接将框拉长，避免输入一半就滑动 -->
                <textarea id="f-question" rows="8"></textarea>
            </div>

            <div class="form-group">
                <label>✅ 正确答案</label>
                <input type="text" id="f-correct">
            </div>

            <div class="form-group">
                <label>❌ 她的错误答案 (选填)</label>
                <input type="text" id="f-wrong">
            </div>

            <button class="btn-action btn-save" id="btn-save" onclick="saveToCloud()">💾 确认无误，写入云端</button>
            <button class="btn-action" style="background:#f1f5f9; color:#64748b; border: 3px solid #e2e8f0; box-shadow: 0 4px 0 #cbd5e1; margin-top: 20px;" onclick="resetScanner()">🔄 换一道题</button>
        </div>
    </div>
</div>

<script>
    const SYNC_API_URL = "https://script.google.com/macros/s/AKfycbzbNOgg7deW9uVVyfYGTfKGOtVgNs_9ZfUQ9J_9cYpG2Ufow9KLDICHgsinBXrPJlmz/exec";

    let base64Image = "";
    let imageMimeType = "image/jpeg";

    window.onload = function() {
        const savedKey = localStorage.getItem('my_gemini_key');
        if (!savedKey) {
            document.getElementById('key-setup-area').style.display = 'block';
        } else {
            document.getElementById('main-scanner-area').style.display = 'block';
        }

        // 恢复上次的选择
        if(localStorage.getItem('scanner_last_user')) {
            document.getElementById('f-user').value = localStorage.getItem('scanner_last_user');
        }
        if(localStorage.getItem('scanner_last_subject')) {
            document.getElementById('f-subject').value = localStorage.getItem('scanner_last_subject');
        }
    };

    function saveApiKey() {
        const key = document.getElementById('api-key-input').value.trim();
        if (key) {
            localStorage.setItem('my_gemini_key', key);
            document.getElementById('key-setup-area').style.display = 'none';
            document.getElementById('main-scanner-area').style.display = 'block';
            hideError();
        } else {
            alert("请先输入API Key");
        }
    }

    // 彩蛋：点击右上角齿轮重置Key
    function resetApiKey() {
        if(confirm("确定要清除本地保存的 API Key 吗？")) {
            localStorage.removeItem('my_gemini_key');
            location.reload();
        }
    }

    function showError(msg) {
        const errEl = document.getElementById('error-msg');
        errEl.innerText = msg;
        errEl.style.display = 'block';
    }

    function hideError() {
        document.getElementById('error-msg').style.display = 'none';
    }

    function resetScanner() {
        document.getElementById('file-input').value = "";
        document.getElementById('preview-img').style.display = "none";
        document.querySelector('.upload-text').style.display = "block";
        document.getElementById('editor-area').style.display = "none";
        document.getElementById('btn-analyze').style.display = "none";
        hideError();
        base64Image = "";
    }

    // 前端自动压缩图片，防止手机原图太大导致报错
    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                const MAX_WIDTH = 1200; // 宽幅压缩阈值

                if (width > MAX_WIDTH) {
                    height = Math.round((height * MAX_WIDTH) / width);
                    width = MAX_WIDTH;
                }
                
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                
                const imgEl = document.getElementById('preview-img');
                imgEl.src = dataUrl;
                imgEl.style.display = 'inline-block';
                
                base64Image = dataUrl.split(',')[1]; 
                
                document.querySelector('.upload-text').style.display = 'none';
                document.getElementById('btn-analyze').style.display = 'flex';
                document.getElementById('btn-analyze').innerText = "✨ AI 识别并解析";
                document.getElementById('editor-area').style.display = 'none';
                hideError();
            }
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    async function processImage() {
        if (!base64Image) return;
        
        const apiKey = localStorage.getItem('my_gemini_key');
        if (!apiKey) {
            alert("找不到 API Key，请刷新页面重新输入。");
            return;
        }

        hideError();
        document.getElementById('btn-analyze').style.display = 'none';
        document.getElementById('ai-loading').style.display = 'block';

        const prompt = `你是一个严谨的OCR和教育数据提取专家。
请提取图片中的题目。
规则：
1. 提取题目的完整文本。如果是选择题，请将选项提取在题目下方。
2. 识别图片中手写的正确答案和错误答案（若无则留空）。
3. 必须返回合法的JSON格式，不带任何Markdown代码块，格式如下：
{
  "question": "提取的题目内容",
  "correctAns": "推断的正确答案",
  "wrongAns": "学生写错的答案"
}`;

        const requestBody = {
            contents: [{
                parts: [
                    { text: prompt },
                    { inlineData: { mimeType: imageMimeType, data: base64Image } }
                ]
            }]
        };

        try {
            // 🌟 模型已死死锁定在 gemini-2.0-flash
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });

            if (!response.ok) {
                if (response.status === 400 || response.status === 403 || response.status === 404) {
                    localStorage.removeItem('my_gemini_key');
                    throw new Error(`API 请求被拒绝 (代码: ${response.status})。请检查模型或密钥。已重置，请刷新页面。`);
                }
                const errorData = await response.text();
                throw new Error(`Google 服务器报错 (代码: ${response.status}) -> ${errorData}`);
            }

            const data = await response.json();
            
            if (!data.candidates || data.candidates.length === 0) {
                throw new Error("模型没有返回任何内容，请检查图片是否清晰。");
            }

            let rawText = data.candidates[0].content.parts[0].text;
            const jsonMatch = rawText.match(/\{[\s\S]*\}/); 
            if (!jsonMatch) {
                throw new Error("AI 返回的数据格式不正确，未能找到 JSON 结构。");
            }

            const parsed = JSON.parse(jsonMatch[0]);

            document.getElementById('f-question').value = parsed.question || "";
            document.getElementById('f-correct').value = parsed.correctAns || "";
            document.getElementById('f-wrong').value = parsed.wrongAns || "";

            document.getElementById('ai-loading').style.display = 'none';
            document.getElementById('editor-area').style.display = 'block';
            document.getElementById('btn-analyze').style.display = 'flex';
            document.getElementById('btn-analyze').innerText = "🔄 重新识别";

        } catch (error) {
            console.error("详细错误:", error);
            showError("❌ " + error.message);
            document.getElementById('ai-loading').style.display = 'none';
            document.getElementById('btn-analyze').style.display = 'flex';
            document.getElementById('btn-analyze').innerText = "🔄 尝试重新识别";
        }
    }

    async function saveToCloud() {
        const btn = document.getElementById('btn-save');
        btn.innerText = "上传中...";
        btn.disabled = true;

        const user = document.getElementById('f-user').value;
        const subject = document.getElementById('f-subject').value;
        const grade = user === 'Valerie' ? 'P3' : 'P1'; 
        const question = document.getElementById('f-question').value.trim();
        const correctAns = document.getElementById('f-correct').value.trim();
        const wrongAns = document.getElementById('f-wrong').value.trim();

        if (!question || !correctAns) {
            alert("⚠️ 题目和正确答案不能为空！");
            btn.innerText = "💾 确认无误，写入云端";
            btn.disabled = false;
            return;
        }

        // 保存本次选择，下次默认选中
        localStorage.setItem('scanner_last_user', user);
        localStorage.setItem('scanner_last_subject', subject);

        const payload = {
            type: 'mistake_update',
            user: user,
            grade: grade,
            subject: subject,
            questionText: question,
            correctAns: correctAns,
            wrongAns: wrongAns,
            isCorrect: false 
        };

        try {
            await fetch(SYNC_API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });

            btn.innerText = "✅ 成功录入！";
            btn.style.background = "#3b82f6";
            btn.style.boxShadow = "0 6px 0 #2563eb";
            
            setTimeout(() => {
                resetScanner();
                btn.innerText = "💾 确认无误，写入云端";
                btn.style.background = "#10b981";
                btn.style.boxShadow = "0 6px 0 #059669";
                btn.disabled = false;
            }, 1500);

        } catch (error) {
            showError("❌ 上传云端失败，请检查网络！");
            btn.innerText = "💾 确认无误，写入云端";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
