<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner - Family Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --text-main: #1e293b; --bg: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Nunito', 'Microsoft YaHei', sans-serif; }
        body { background: linear-gradient(135deg, #e0e7ff 0%, #bae6fd 100%); margin: 0; padding: 20px; color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .container { width: 100%; max-width: 600px; background: rgba(255,255,255,0.95); padding: 30px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 4px solid #ffffff; }
        
        h1 { color: #3b82f6; text-align: center; margin-top: 0; font-size: 28px; font-weight: 900; }
        
        /* 📸 上传区 */
        .upload-area { border: 4px dashed #cbd5e1; border-radius: 20px; padding: 30px 20px; text-align: center; cursor: pointer; transition: 0.2s; background: #f1f5f9; position: relative; margin-bottom: 20px; }
        .upload-area:hover { border-color: #3b82f6; background: #eff6ff; }
        .upload-area input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .upload-text { font-size: 18px; font-weight: 800; color: #64748b; pointer-events: none; }
        #preview-img { max-width: 100%; max-height: 300px; border-radius: 10px; display: none; margin-top: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        /* 📝 表单区 */
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        label { font-weight: 900; color: #475569; font-size: 14px; }
        input, select, textarea { padding: 12px; border-radius: 12px; border: 3px solid #e2e8f0; font-size: 16px; font-weight: 700; outline: none; transition: 0.2s; background: #f8fafc; }
        input:focus, select:focus, textarea:focus { border-color: #3b82f6; background: #fff; }
        
        .row { display: flex; gap: 15px; }
        .row > div { flex: 1; }

        /* 🔘 按钮 */
        .btn-action { width: 100%; border-radius: 20px; border: none; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.15s; padding: 18px; color: white; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-action:active { transform: translateY(4px); box-shadow: 0 0 0 transparent !important; }
        
        .btn-ai { background: #8b5cf6; box-shadow: 0 6px 0 #7e22ce; margin-bottom: 20px; }
        .btn-save { background: #10b981; box-shadow: 0 6px 0 #059669; }

        #ai-loading { display: none; color: #8b5cf6; font-weight: 900; text-align: center; margin-bottom: 20px; font-size: 16px; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>🤖 智能错题录入台</h1>
    
    <div class="upload-area" id="upload-area">
        <div class="upload-text">📸 点击拍照 或 选择错题截图</div>
        <input type="file" id="file-input" accept="image/*">
        <img id="preview-img" src="" alt="Preview">
    </div>

    <button class="btn-action btn-ai" id="btn-analyze" style="display: none;" onclick="processImage()">✨ AI 识别并解析题目</button>
    <div id="ai-loading">🧠 Gemini 正在施展读图魔法，请稍候...</div>

    <div id="editor-area" style="display: none;">
        <div class="row">
            <div class="form-group">
                <label>👤 谁的错题？</label>
                <select id="f-user">
                    <option value="Valerie">Valerie (姐姐)</option>
                    <option value="Venessa">Venessa (妹妹)</option>
                </select>
            </div>
            <div class="form-group">
                <label>📚 科目</label>
                <select id="f-subject">
                    <option value="English">English</option>
                    <option value="Math">Math</option>
                    <option value="华文">华文</option>
                    <option value="Science">Science</option>
                </select>
            </div>
        </div>
        
        <div class="form-group">
            <label>📝 题目内容</label>
            <textarea id="f-question" rows="4"></textarea>
        </div>

        <div class="form-group">
            <label>✅ 正确答案</label>
            <input type="text" id="f-correct">
        </div>

        <div class="form-group">
            <label>❌ 她的错误答案 (选填)</label>
            <input type="text" id="f-wrong">
        </div>

        <button class="btn-action btn-save" id="btn-save" onclick="saveToCloud()">💾 确认无误，写入云端错题本</button>
    </div>
</div>

<script>
    // 🌟 你的魔法钥匙
    const GEMINI_API_KEY = "AIzaSyAd2EjATGojfJQipB-J_iOjvjpRgozbvUc";
    // 🌟 你的后台数据库地址
    const SYNC_API_URL = "https://script.google.com/macros/s/AKfycbzbNOgg7deW9uVVyfYGTfKGOtVgNs_9ZfUQ9J_9cYpG2Ufow9KLDICHgsinBXrPJlmz/exec";

    let base64Image = "";

    // 1. 处理图片上传和预览
    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const imgEl = document.getElementById('preview-img');
            imgEl.src = event.target.result;
            imgEl.style.display = 'inline-block';
            
            // 剥离 Base64 的头部 (data:image/jpeg;base64,)，Gemini 只需要后面的纯代码
            base64Image = event.target.result.split(',')[1]; 
            
            document.querySelector('.upload-text').style.display = 'none';
            document.getElementById('btn-analyze').style.display = 'flex';
            document.getElementById('editor-area').style.display = 'none';
        };
        reader.readAsDataURL(file);
    });

    // 2. 召唤 Gemini API 解析图片
    async function processImage() {
        if (!base64Image) return;
        
        document.getElementById('btn-analyze').style.display = 'none';
        document.getElementById('ai-loading').style.display = 'block';

        const prompt = `
            你是一个严谨的 OCR 和教育数据提取专家。请提取图片中的题目。
            规则：
            1. 提取题目的完整文本。如果是选择题，请将选项（A,B,C,D）合并到题目文本中，或者通过上下文推断。
            2. 如果图片上有手写痕迹，尝试识别出正确的答案（如果有老师批改的勾）和学生写错的答案。
            3. 如果没有明显的手写答案，就留空。
            
            你必须且只能返回一个纯净的 JSON 对象，不准带 Markdown 标记（不要出现 \`\`\`json ），格式如下：
            {
                "question": "提取的题目完整内容",
                "correctAns": "推断的正确答案",
                "wrongAns": "学生写错的答案"
            }
        `;

        const requestBody = {
            contents: [{
                parts: [
                    { text: prompt },
                    { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                ]
            }]
        };

        // 替换 scanner.html 中 processImage 函数里的 try 块内容
    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestBody)
        });

        const data = await response.json();
        
        // 🚨 增强版提取逻辑：过滤 AI 的所有废话，只找 { ... }
        let rawText = data.candidates[0].content.parts[0].text;
        console.log("AI 原始输出：", rawText); // 你可以按 F12 在控制台看到 AI 说了什么

        const jsonMatch = rawText.match(/\{[\s\S]*\}/); // 贪婪匹配最外层的花括号
        if (!jsonMatch) throw new Error("无法从输出中找到有效的 JSON 格式");

        const parsed = JSON.parse(jsonMatch[0]);

        // 填入输入框
        document.getElementById('f-question').value = parsed.question || "";
        document.getElementById('f-correct').value = parsed.correctAns || "";
        document.getElementById('f-wrong').value = parsed.wrongAns || "";

        document.getElementById('ai-loading').style.display = 'none';
        document.getElementById('editor-area').style.display = 'block';
        document.getElementById('btn-analyze').style.display = 'flex';
        document.getElementById('btn-analyze').innerText = "🔄 重新识别";

    } catch (error) {
        console.error("详细错误信息:", error);
        alert("❌ 识别失败：" + error.message);
        document.getElementById('ai-loading').style.display = 'none';
        document.getElementById('btn-analyze').style.display = 'flex';
    }
        
    }

    // 3. 提交给 Google Apps Script 后台 (直接复用现有的 mistake_update 接口)
    async function saveToCloud() {
        const btn = document.getElementById('btn-save');
        btn.innerText = "上传中...";
        btn.disabled = true;

        const user = document.getElementById('f-user').value;
        const grade = user === 'Valerie' ? 'P3' : 'P1'; // 自动推断年级
        const subject = document.getElementById('f-subject').value;
        const question = document.getElementById('f-question').value.trim();
        const correctAns = document.getElementById('f-correct').value.trim();
        const wrongAns = document.getElementById('f-wrong').value.trim();

        if (!question || !correctAns) {
            alert("⚠️ 题目和正确答案不能为空！");
            btn.innerText = "💾 确认无误，写入云端错题本";
            btn.disabled = false;
            return;
        }

        const payload = {
            type: 'mistake_update',
            user: user,
            grade: grade,
            subject: subject,
            questionText: question,
            correctAns: correctAns,
            wrongAns: wrongAns,
            isCorrect: false // 设置为 false，这样后台会自动给它赋予 3 的权重，录入错题本！
        };

        try {
            await fetch(SYNC_API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });

            btn.innerText = "✅ 成功录入！";
            btn.style.background = "#3b82f6";
            btn.style.boxShadow = "0 6px 0 #2563eb";
            
            // 2 秒后重置表单，准备录入下一题
            setTimeout(() => {
                document.getElementById('file-input').value = "";
                document.getElementById('preview-img').style.display = "none";
                document.querySelector('.upload-text').style.display = "block";
                document.getElementById('editor-area').style.display = "none";
                document.getElementById('btn-analyze').style.display = "none";
                base64Image = "";
                
                btn.innerText = "💾 确认无误，写入云端错题本";
                btn.style.background = "#10b981";
                btn.style.boxShadow = "0 6px 0 #059669";
                btn.disabled = false;
            }, 2000);

        } catch (error) {
            alert("❌ 上传云端失败，请检查网络！");
            btn.innerText = "💾 确认无误，写入云端错题本";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
