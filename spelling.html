<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Spelling</title>

    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/240/paper-plane.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script>
        // 从主控台抓取当前选中的是 Valerie 还是 Venessa
        let currentPlayer = localStorage.getItem('currentPlayer') || 'P3'; 
    </script>

    <style>
        :root { --text-main: #1e293b; --text-muted: #64748b; }
        * { box-sizing: border-box; font-family: 'Nunito', 'Microsoft YaHei', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); margin: 0; padding: 20px; color: var(--text-main); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100dvh; overflow-x: hidden; }
        
        /* ☁️ 内容框上移至 3:7 比例 */
        .container { width: 100%; max-width: 850px; background: rgba(255,255,255,0.95); padding: 30px 20px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; position: relative; border: 4px solid #ffffff; backdrop-filter: blur(12px); display: flex; flex-direction: column; align-items: center; margin-top: 10vh; margin-bottom: auto; }
        
        .screen { display: none; width: 100%; flex-direction: column; align-items: center; animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        
        @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
        
        #topic-header { display: inline-flex; align-items: center; justify-content: center; margin: 0 auto 25px auto; font-size: 22px; color: #3b82f6; background: rgba(255,255,255,0.9); padding: 12px 30px; border-radius: 50px; font-weight: 900; border: 2px solid #fff; box-shadow: 0 8px 15px rgba(59, 130, 246, 0.1); }

        .checkbox-grid { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 20px; width: 100%; max-height: 400px; overflow-y: auto; }
        
        .topic-cb { padding: 14px 22px; border-radius: 25px; border: 3px solid #e2e8f0; background: white; cursor: pointer; transition: 0.15s; font-size: 16px; font-weight: 800; color: #475569; user-select: none; box-shadow: 0 5px 0 #cbd5e1; display: flex; align-items: center; }
        .topic-cb:active { transform: translateY(5px); box-shadow: 0 0 0 transparent; }
        .topic-cb.selected { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; box-shadow: 0 5px 0 #93c5fd; }
        
        .action-row { display: flex; gap: 15px; margin-top: 20px; width: 100%; }
        .btn-action { width: 100%; border-radius: 25px; border: none; font-weight: 900; font-size: 20px; cursor: pointer; transition: 0.15s; display: flex; align-items: center; justify-content: center; outline: none; padding: 20px; box-shadow: 0 8px 0 rgba(0,0,0,0.1); }
        .btn-action:active { transform: translateY(6px); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }

        .practice-main { display: flex; flex-direction: column; width: 100%; align-items: center; justify-content: center; gap: 20px; margin: 10px 0; }
        
        .audio-btn { font-size: 50px; background: #eff6ff; color: #3b82f6; border: 4px solid #bfdbfe; width: 110px; height: 110px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 10px 0 #93c5fd; transition: 0.1s; outline: none; margin: 0 auto; }
        .audio-btn:active { transform: translateY(10px); box-shadow: 0 0 0 transparent; }

        .spell-input { width: 100%; max-width: 450px; font-size: 44px; text-align: center; font-weight: 900; letter-spacing: 3px; padding: 18px; border-radius: 25px; border: 5px solid #e2e8f0; color: #1e293b; outline: none; transition: 0.2s; box-shadow: inset 0 4px 10px rgba(0,0,0,0.05); font-family: monospace; text-transform: lowercase; background: #f8fafc; }
        .spell-input:focus { border-color: #3b82f6; background: #fff; }
        .spell-input.correct { border-color: #10b981; color: #10b981; background: #ecfdf5; box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); }
        .spell-input.error-shake { border-color: #ef4444; color: #ef4444; background: #fef2f2; animation: shake 0.3s; }

        .hint-btn { background: #fffbeb; color: #d97706; border: 3px solid #fde68a; padding: 12px 25px; border-radius: 20px; font-weight: 900; font-size: 18px; cursor: pointer; box-shadow: 0 6px 0 #fcd34d; transition: 0.15s; margin-top: 5px; }
        .hint-btn:active { transform: translateY(6px); box-shadow: 0 0 0 transparent; }

        .letter-pool { display: none; flex-wrap: wrap; gap: 12px; justify-content: center; width: 100%; max-width: 450px; margin-top: 10px; }
        .letter-btn { width: 60px; height: 70px; border-radius: 15px; border: 3px solid #cbd5e1; background: white; font-size: 32px; font-weight: 900; color: #334155; cursor: pointer; box-shadow: 0 6px 0 #94a3b8; transition: 0.1s; display: flex; align-items: center; justify-content: center; text-transform: lowercase; }
        .letter-btn:active { transform: translateY(6px); box-shadow: 0 0 0 transparent; }
        .letter-btn:disabled { opacity: 0.3; pointer-events: none; transform: translateY(6px); box-shadow: 0 0 0 transparent; }

        .milestone-track { display: flex; flex-direction: row; justify-content: space-between; align-items: center; position: relative; padding: 0 5px; width: 100%; height: 38px; margin-bottom: 15px; }
        .milestone-track::before { content: ''; position: absolute; left: 15px; right: 15px; top: 50%; height: 8px; background: #e2e8f0; z-index: 1; transform: translateY(-50%); border-radius: 4px; }
        .milestone-fill { position: absolute; left: 15px; top: 50%; height: 8px; background: #3b82f6; z-index: 1; transform: translateY(-50%); border-radius: 4px; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); width: var(--pct); }
        .milestone { width: 38px; height: 38px; background: #f8fafc; border: 4px solid #cbd5e1; border-radius: 50%; z-index: 2; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: 0.4s; box-sizing: border-box; }
        .milestone.done { border-color: #3b82f6; background: #eff6ff; }
        .milestone.active { border-color: #f59e0b; background: #fffbeb; font-size: 20px; transform: scale(1.2); box-shadow: 0 0 15px rgba(245,158,11,0.3); }

        @media (min-width: 650px) { .container { padding: 40px 60px; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

<div class="container">
    <div id="loading" class="screen" style="display:flex; justify-content:center; align-items:center; padding: 60px 0; font-size: 24px; font-weight: 900; color: #3b82f6;">
        🌟 魔法书正在加载... 
    </div>

    <div id="topic-screen" class="screen">
        <div id="topic-header">📝 Loading...</div>
        <p style="color:#64748b; margin-bottom: 20px; font-weight: 700;">Choose the topics you want to practice.</p>
        
        <div style="text-align: center; margin-bottom: 15px;">
            <div id="check-all-btn" class="topic-cb" style="display:inline-flex; padding: 14px 22px; justify-content: center;" onclick="toggleAllTopics(this)">
                🌟 Select All
            </div>
        </div>
        
        <div id="topic-list" class="checkbox-grid"></div>
        
        <div class="action-row">
            <button class="btn-action" style="background:#f1f5f9; color:#64748b; border: 4px solid #e2e8f0; box-shadow: 0 8px 0 #cbd5e1; flex:0.4;" onclick="window.location.href='index.html'">← Hub</button>
            <button class="btn-action" style="background:#10b981; color:white; box-shadow: 0 8px 0 #059669; flex:0.6;" onclick="startPractice()">Start 🚀</button>
        </div>
    </div>

    <div id="practice-screen" class="screen">
        <div id="progress-bar" class="milestone-track" style="margin-bottom: 10px;"></div>
        <div id="prog-text" style="font-size:16px; font-weight: 800; color:#94a3b8; margin-bottom: 15px;">1 / 10</div>
        
        <div class="practice-main">
            <button class="audio-btn" onclick="playCurrentWord()">🔊</button>
            <div id="english-hint" style="color: #64748b; font-size: 20px; font-weight: 800; min-height: 30px;"></div>

            <input type="text" id="spell-input" class="spell-input" autocomplete="off" spellcheck="false" placeholder="type here" inputmode="text">
            
            <button id="hint-btn" class="hint-btn" onclick="showScrambledHint()">💡 Give me a hint</button>
            <div id="letter-pool" class="letter-pool"></div>
        </div>

        <div class="action-row" style="margin-top: 30px;">
            <button id="quit-btn" class="btn-action" style="background:#f1f5f9; color:#64748b; border: 4px solid #e2e8f0; box-shadow: 0 8px 0 #cbd5e1; flex: 0.8;" onclick="window.location.href='index.html'">Quit 🏠</button>
            <button id="sub-btn" class="btn-action" style="background:#3b82f6; color:white; box-shadow: 0 8px 0 #2563eb; flex: 1.2;" onclick="checkSpelling()">Submit</button>
            <button id="next-btn" class="btn-action" style="background:#10b981; color:white; box-shadow: 0 8px 0 #059669; flex: 1.2; display:none;" onclick="nextQuestion()">Next ➡️</button>
        </div>
    </div>

    <div id="finish-screen" class="screen" style="flex-direction: column; align-items: center;"></div>
</div>

<script>
    // 🔥 修正后的数据源链接
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlpdRHnR9ybEHHgX6fouRI-vXOh8KQNLSjsbt0TYh9R3No_9i7QNv_4ELwJZJGQpTe3oZVXaZijaW4/pub?gid=1634517601&single=true&output=csv";
    const LIMIT = 5; 

    let db = [], practiceList = [], curIdx = 0, sessionErrors = 0;
    let totalCorrectCount = 0, currentWrongItems = [];
    let isRetrySession = false;

    const synth = window.speechSynthesis;
    let englishVoice = null;

    function initVoice() {
        const voices = synth.getVoices();
        englishVoice = voices.find(v => v.lang.startsWith('en-US') && v.name.includes('Google')) || voices.find(v => v.lang.startsWith('en')) || voices[0];
    }
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = initVoice;

    function playCurrentWord() {
        if (synth.speaking) synth.cancel();
        const word = practiceList[curIdx].Answer;
        const u = new SpeechSynthesisUtterance(word);
        if (englishVoice) u.voice = englishVoice;
        u.lang = 'en-US'; u.rate = 0.75;
        synth.speak(u);
    }

    function checkAndIncrementLimit(lessons) {
        const today = new Date().toISOString().split('T')[0];
        const storageKey = `eng_spelling_usage_${today}`;
        let usage = JSON.parse(localStorage.getItem(storageKey) || "{}");

        for (let lesson of lessons) {
            if (!usage[lesson]) usage[lesson] = 0;
            if (usage[lesson] >= LIMIT) {
                alert(`You have practiced [${lesson}] enough today!`);
                return false;
            }
        }
        lessons.forEach(l => usage[l]++);
        localStorage.setItem(storageKey, JSON.stringify(usage));
        return true;
    }

    function showScreen(id) { 
        document.querySelectorAll('.screen').forEach(s => s.style.display='none'); 
        document.getElementById(id).style.display='flex'; 
    }

    function init() {
        let childName = currentPlayer === 'P1' ? 'Venessa' : 'Valerie';
        document.getElementById('topic-header').innerText = `📝 ${childName}'s English Spelling`;

        Papa.parse(SHEET_URL + "&t=" + Date.now(), {
            download: true, header: true, skipEmptyLines: 'greedy',
            complete: function(results) {
                let pool = [];
                results.data.forEach((row, index) => { 
                    let n = {}; Object.keys(row).forEach(k => n[k.trim()] = row[k]);
                    
                    let g = (n.Grade || n.GRADE || "").toString().trim().toUpperCase();
                    let type = (n.Type || n.TYPE || "").toString().trim().toUpperCase();
                    
                    // 确保匹配当前用户且类型是 SPELLING
                    if (g === currentPlayer && type === 'SPELLING') {
                        pool.push({
                            Topic: (n.Topic || n.TOPIC || n.Lesson || "").toString().trim() || "Default",
                            Hint: (n.Question || n.QUESTION || n.Hint || "").toString().trim(),
                            Answer: (n['Correct Answer'] || n['CORRECT ANSWER'] || n.Answer || "").toString().trim(),
                            originalIndex: index,
                            isWrong: false
                        });
                    }
                });
                
                db = pool;
                if (db.length === 0) {
                    document.getElementById('loading').innerHTML = "⚠️ No spelling words found. Please check Sheet data.";
                    return;
                }
                document.getElementById('loading').style.display = 'none';
                loadTopics();
            },
            error: function() {
                document.getElementById('loading').innerHTML = "⚠️ Sheet connection failed.";
            }
        });
    }

    function loadTopics() {
        let topics = [...new Set(db.map(q => q.Topic))].sort();
        const list = document.getElementById('topic-list'); list.innerHTML = '';
        topics.forEach(t => {
            const label = document.createElement('div'); 
            label.className = 'topic-cb';
            label.innerText = t;
            label.dataset.val = t;
            label.onclick = function() { this.classList.toggle('selected'); syncCheckAll(); };
            list.appendChild(label);
        });
        showScreen('topic-screen');
    }

    function toggleAllTopics(masterBtn) {
        let isSelecting = !masterBtn.classList.contains('selected');
        if (isSelecting) {
            masterBtn.classList.add('selected'); masterBtn.innerHTML = '🌟 Deselect All';
            document.querySelectorAll('.topic-cb:not(#check-all-btn)').forEach(cb => cb.classList.add('selected'));
        } else {
            masterBtn.classList.remove('selected'); masterBtn.innerHTML = '🌟 Select All';
            document.querySelectorAll('.topic-cb:not(#check-all-btn)').forEach(cb => cb.classList.remove('selected'));
        }
    }

    function syncCheckAll() {
        const allItems = Array.from(document.querySelectorAll('.topic-cb:not(#check-all-btn)'));
        const allChecked = allItems.every(cb => cb.classList.contains('selected'));
        const master = document.getElementById('check-all-btn');
        if (allChecked) { master.classList.add('selected'); master.innerHTML = '🌟 Deselect All'; } 
        else { master.classList.remove('selected'); master.innerHTML = '🌟 Select All'; }
    }

    function startPractice() {
        let sel = Array.from(document.querySelectorAll('.topic-cb.selected:not(#check-all-btn)')).map(cb => cb.dataset.val);
        if(sel.length === 0) return;
        if (!checkAndIncrementLimit(sel)) return;

        isRetrySession = false;
        let pool = db.filter(q => sel.includes(q.Topic));
        practiceList = pool.sort(() => 0.5 - Math.random());
        practiceList.forEach(q => q.isWrong = false);
        curIdx = 0; totalCorrectCount = 0; sessionErrors = 0;
        
        // 解锁音频
        initVoice();
        synth.speak(new SpeechSynthesisUtterance(''));

        showScreen('practice-screen'); 
        renderQuestion();
    }

    function updateProgress() {
        const bar = document.getElementById('progress-bar');
        const len = practiceList.length; const pct = len > 1 ? (curIdx / (len - 1)) * 100 : 100;
        let html = `<div class="milestone-fill" style="--pct: ${pct}%"></div>`;
        for(let i=0; i<len; i++) html += `<div class="milestone${i < curIdx ? ' done' : (i === curIdx ? ' active' : '')}">${i < curIdx ? '⭐' : (i === curIdx ? '🔤' : '☁️')}</div>`;
        bar.innerHTML = html;
        document.getElementById('prog-text').innerText = `${curIdx + 1} / ${len}`;
    }

    function renderQuestion() {
        const q = practiceList[curIdx];
        updateProgress();
        document.getElementById('english-hint').innerText = q.Hint;
        const input = document.getElementById('spell-input');
        input.value = ''; input.className = 'spell-input'; input.disabled = false;
        document.getElementById('hint-btn').style.display = 'block';
        document.getElementById('letter-pool').style.display = 'none';
        document.getElementById('sub-btn').style.display = 'flex'; 
        document.getElementById('next-btn').style.display = 'none';
        setTimeout(() => { playCurrentWord(); input.focus(); }, 400);
    }

    function showScrambledHint() {
        document.getElementById('hint-btn').style.display = 'none';
        const pool = document.getElementById('letter-pool');
        pool.style.display = 'flex';
        const answer = practiceList[curIdx].Answer.toLowerCase();
        let letters = answer.split('');
        const alphabet = "abcdefghijklmnopqrstuvwxyz";
        while(letters.length < answer.length + 3) letters.push(alphabet[Math.floor(Math.random()*26)]);
        letters.sort(() => 0.5 - Math.random());
        pool.innerHTML = letters.map((l, i) => `<button class="letter-btn" onclick="typeLetter('${l}', this)">${l}</button>`).join('');
    }

    function typeLetter(char, btn) {
        const input = document.getElementById('spell-input');
        input.value += char; btn.disabled = true;
    }

    function checkSpelling() {
        const input = document.getElementById('spell-input');
        const user = input.value.trim().toLowerCase();
        const correct = practiceList[curIdx].Answer.toLowerCase();
        if (user === '') { playCurrentWord(); input.focus(); return; }

        if (user === correct) {
            input.disabled = true; input.className = 'spell-input correct';
            document.getElementById('letter-pool').style.display = 'none';
            document.getElementById('hint-btn').style.display = 'none';
            document.getElementById('sub-btn').style.display = 'none'; 
            document.getElementById('next-btn').style.display = 'flex';
            if (!practiceList[curIdx].isWrong) totalCorrectCount++;
            confetti({ particleCount: 50, spread: 60, origin: { y: 0.8 } });
            if (curIdx === practiceList.length - 1) document.getElementById('next-btn').innerText = "Finish ✨";
        } else {
            sessionErrors++; practiceList[curIdx].isWrong = true;
            input.classList.add('error-shake');
            setTimeout(() => {
                input.classList.remove('error-shake'); input.value = ''; input.focus();
                showScrambledHint();
            }, 400);
        }
    }

    function nextQuestion() { 
        if(curIdx < practiceList.length - 1) { curIdx++; renderQuestion(); } 
        else { finishQuiz(); } 
    }

    function finishQuiz() {
        currentWrongItems = practiceList.filter(q => q.isWrong);
        if (currentWrongItems.length === 0 && !isRetrySession) {
            confetti({ particleCount: 300, spread: 100, origin: { y: 0.5 } });
            setTimeout(() => { window.location.href = "https://andydang2007.github.io/game/popballoons.html?ticket=" + Date.now(); }, 3000);
        }
        let html = `<div style="padding:40px 0;"><h1 style="font-size:80px; margin:0;">${currentWrongItems.length===0?'🏆':'👍'}</h1><h2 style="font-size:36px; font-weight:900;">Well Done!</h2><p style="font-size:22px; font-weight:800; color:#64748b;">Correct Words: <span style="color:#10b981; font-size:40px;">${totalCorrectCount}</span></p>`;
        if (currentWrongItems.length > 0) {
            html += `<div style="margin-top:30px; background:#fffbeb; padding:20px; border-radius:30px; border:4px dashed #fcd34d;"><h3 style="font-size:20px; font-weight:900; color:#d97706;">Practice these:</h3><div class="checkbox-grid" id="wrong-list">`;
            currentWrongItems.forEach((q, idx) => { html += `<div class="topic-cb selected" data-idx="${idx}" onclick="this.classList.toggle('selected')">${q.Answer}</div>`; });
            html += `</div><button class="btn-action" style="width:220px; margin:10px auto 0; background:#f59e0b; color:white;" onclick="startRetry()">Try Again 🚀</button></div>`;
        }
        html += `<button class="btn-action" style="width:250px; margin-top:40px; background:#f1f5f9; color:#64748b; border:4px solid #e2e8f0;" onclick="window.location.href='index.html'">🏠 Back to Hub</button></div>`;
        document.getElementById('finish-screen').innerHTML = html; showScreen('finish-screen');
    }

    function startRetry() {
        let selElements = Array.from(document.querySelectorAll('#wrong-list .topic-cb.selected'));
        if (selElements.length === 0) return;
        isRetrySession = true; 
        practiceList = selElements.map(el => currentWrongItems[parseInt(el.dataset.idx)]);
        practiceList.forEach(q => q.isWrong = false);
        curIdx = 0; totalCorrectCount = 0; sessionErrors = 0;
        showScreen('practice-screen'); renderQuestion();
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (document.getElementById('practice-screen').style.display === 'flex') {
                if (document.getElementById('sub-btn').style.display !== 'none') checkSpelling();
                else if (document.getElementById('next-btn').style.display !== 'none') nextQuestion();
            }
        }
    });

    window.onload = function() { init(); };
</script>

</body>
</html>
