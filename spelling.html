<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Spelling</title>

    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/240/paper-plane.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --primary: #10b981; --bg: #f8fafc; --text-main: #1e293b; --text-muted: #64748b; }
        * { box-sizing: border-box; font-family: 'Nunito', 'Microsoft YaHei', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); margin: 0; padding: 20px; color: var(--text-main); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; overflow-x: hidden; }
        
        .container { width: 100%; max-width: 850px; background: rgba(255,255,255,0.95); padding: 30px 20px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; position: relative; border: 4px solid #ffffff; backdrop-filter: blur(12px); display: flex; flex-direction: column; align-items: center; margin-top: 5vh; margin-bottom: auto; }
        
        .screen { display: none; width: 100%; flex-direction: column; align-items: center; animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
        
        .header-tag { background: #f8fafc; color: #3b82f6; padding: 10px 25px; border-radius: 30px; font-weight: 900; font-size: 18px; border: 3px solid #e2e8f0; box-shadow: 0 4px 0 #cbd5e1; margin-bottom: 20px; display: inline-flex; align-items: center; gap: 8px; }

        /* 💡 进度条折行适配 */
        .milestone-track { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 8px; width: 100%; margin-bottom: 10px; }
        .milestone { width: 28px; height: 28px; background: #f8fafc; border: 3px solid #cbd5e1; border-radius: 50%; z-index: 2; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: 0.4s; box-sizing: border-box; flex-shrink: 0; }
        .milestone.done { border-color: #10b981; background: #d1fae5; }
        .milestone.active { border-color: #3b82f6; background: #eff6ff; font-size: 16px; transform: scale(1.2); box-shadow: 0 0 10px rgba(59,130,246,0.3); animation: bounceActive 1s infinite alternate; }
        @keyframes bounceActive { 0% { transform: scale(1.2) translateY(0); } 100% { transform: scale(1.2) translateY(-3px); } }

        .q-text { font-size: 26px; text-align: left; margin: 15px 0 25px 0; line-height: 1.5; font-weight: 800; color: #1e293b; width: 100%; }
        input.ans-input, textarea.ans-input { font-size: 22px; padding: 18px; width: 100%; border: 4px solid #e2e8f0; border-radius: 20px; box-sizing: border-box; outline: none; font-family: inherit; font-weight: bold; color: #334155; }
        input.ans-input.error-shake { border-color: #ef4444; animation: shake 0.3s; background-color: #fef2f2; color: #ef4444; }
        
        .mcq-list { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        button.mcq-btn { padding: 18px; border-radius: 20px; border: 4px solid #e2e8f0; background: white; font-size: 20px; font-weight: 700; cursor: pointer; text-align: left; transition: 0.15s; color: #1e293b; outline: none; box-shadow: 0 5px 0 #cbd5e1; }
        button.mcq-btn.active { border-color: #3b82f6; background: #eff6ff; font-weight: 900; color: #1d4ed8; box-shadow: 0 5px 0 #93c5fd; }
        button.mcq-btn.error { border-color: #ef4444; background: #fef2f2; color: #b91c1c; animation: shake 0.3s; }

        .feedback { font-size: 20px; margin: 15px 0; min-height: 28px; font-weight: 900; width: 100%; }
        .btn-action { width: 100%; border-radius: 25px; border: none; font-weight: 900; font-size: 20px; cursor: pointer; transition: 0.15s; display: flex; align-items: center; justify-content: center; outline: none; padding: 20px; box-shadow: 0 8px 0 rgba(0,0,0,0.1); }
        .btn-action:active { transform: translateY(6px); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }

        .tool-btn { background: white; border: 3px solid #e2e8f0; padding: 10px 20px; border-radius: 15px; font-weight: 900; font-size: 16px; cursor: pointer; color: #475569; transition: 0.15s; box-shadow: 0 4px 0 #cbd5e1; outline: none; }
        .draw-panel { display: none; flex-direction: column; align-items: center; margin-top: 15px; background: #f8fafc; padding: 15px; border-radius: 25px; border: 4px dashed #cbd5e1; width: 100%; }
        canvas { background: white; border-radius: 15px; border: 2px solid #e2e8f0; touch-action: none; cursor: crosshair; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.85); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .epic-modal { background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); padding: 40px; border-radius: 40px; text-align: center; width: 90%; max-width: 450px; border: 6px solid #fde68a; box-shadow: inset 0 0 30px rgba(245, 158, 11, 0.2), 0 30px 60px rgba(0,0,0,0.4); display: flex; flex-direction: column; align-items: center; position: relative; transition: 0.2s; }
        @keyframes epicPop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        .epic-icon { font-size: 80px; margin-top: -80px; background: white; width: 120px; height: 120px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 6px solid #fde68a; box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3); z-index: 2; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .epic-title { font-size: 32px; font-weight: 900; color: #b45309; margin: 20px 0 10px 0; }
        .epic-desc { font-size: 18px; font-weight: 800; color: #92400e; line-height: 1.5; margin-bottom: 30px; }
        .epic-highlight { color: #ea580c; font-size: 22px; font-weight: 900; background: white; padding: 5px 15px; border-radius: 15px; border: 2px dashed #fcd34d; display: inline-block; margin: 10px 0; }
        .stat-badge { background: #fffbeb; color: #d97706; padding: 8px 15px; border-radius: 20px; font-weight: 900; font-size: 16px; border: 2px solid #fde68a; display: inline-block; margin-top: 10px; }

        @media (min-width: 768px) { 
            .container { padding: 40px 60px; } 
            .quiz-wrapper { flex-direction: row; gap: 40px; align-items: stretch; }
            .progress-col { flex: 0 0 60px; align-items: center; justify-content: flex-start; }
            .quiz-main-col { flex: 1; }
            .milestone-track { flex-direction: column; flex-wrap: nowrap; width: 38px; height: 100%; min-height: 500px; padding: 15px 0; margin: 0; justify-content: flex-start; }
            .milestone { width: 36px; height: 36px; font-size: 16px; }
            .milestone.active { font-size: 20px; }
        }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

<div class="container">
    <div id="loading" class="screen" style="display:flex; justify-content:center; align-items:center; padding: 60px 0; font-size: 24px; font-weight: 900; color: #3b82f6;">
        🌟 魔法书正在组卷... 
    </div>

    <div id="quiz-screen" class="screen">
        <div class="header-tag" id="header-info">✍️ Spelling</div>
        <div class="quiz-wrapper">
            <div class="progress-col">
                <div id="progress-bar" class="milestone-track"></div>
                <div id="progress-text" style="font-size:16px; font-weight: 800; color:#94a3b8; margin-top: 10px;"></div>
            </div>
            <div class="quiz-main-col">
                <div style="display:flex; justify-content: flex-end; width:100%;">
                    <button id="draw-pad-btn" class="tool-btn" style="color:#059669; border-color:#a7f3d0; background:#ecfdf5; display:none;" onclick="toggleDrawPad()">✍️ 草稿板</button>
                </div>
                <div id="q-text" class="q-text"></div>
                <div id="draw-panel" class="draw-panel">
                    <canvas id="pad" width="300" height="200"></canvas>
                    <div style="display:flex; justify-content: space-between; width:100%; margin-top:12px;">
                        <button class="tool-btn" style="background:#fef2f2; border-color:#fecaca; color:#e11d48;" onclick="clearPad()">🗑️ Clear</button>
                        <button class="tool-btn" onclick="toggleDrawPad()">❌ Close</button>
                    </div>
                </div>
                <div id="input-container" style="width: 100%;"></div>
                <div id="fb-text" class="feedback"></div>
                <div style="display:flex; gap:15px; margin-top: 10px; width: 100%;">
                    <button id="exit-btn" class="btn-action" style="background:#f1f5f9; color:#64748b; border: 4px solid #e2e8f0; box-shadow: 0 6px 0 #cbd5e1; flex: 0.8;" onclick="window.location.href='index.html'">Quit 🏠</button>
                    <button id="sub-btn" class="btn-action" style="background:#3b82f6; color:white; box-shadow: 0 6px 0 #2563eb; flex: 1.2;" onclick="checkAns()">Submit</button>
                    <button id="next-btn" class="btn-action" style="background:#10b981; color:white; box-shadow: 0 6px 0 #059669; flex: 1.2; display:none;" onclick="nextQ()">Next ➡️</button>
                </div>
            </div>
        </div>
    </div>

    <div id="finish-screen" class="screen"></div>
</div>

<div id="badge-modal" class="modal-overlay">
    <div class="epic-modal">
        <div class="epic-icon" id="badge-icon">⚡️</div>
        <div class="epic-title" id="badge-title">新纪录诞生！</div>
        <div class="epic-desc" id="badge-desc"></div>
        <div style="font-size:12px; color:#b45309; font-weight:800; margin-bottom: 20px;">☁️ 荣誉已存入云端荣誉墙...</div>
        <button class="btn-action" style="background:#f59e0b; color:white; box-shadow: 0 8px 0 #d97706;" onclick="closeBadgeModal()">Awesome! 🚀</button>
    </div>
</div>

<script>
    // 🌟 已更新为最新的 API
    const SYNC_API_URL = "https://script.google.com/macros/s/AKfycbzbNOgg7deW9uVVyfYGTfKGOtVgNs_9ZfUQ9J_9cYpG2Ufow9KLDICHgsinBXrPJlmz/exec";
    const SHEET_ID = "1vQlpdRHnR9ybEHHgX6fouRI-vXOh8KQNLSjsbt0TYh9R3No_9i7QNv_4ELwJZJGQpTe3oZVXaZijaW4";
    const GIDS = { "English": "1893311738", "Math": "59294467", "Science": "1581471994", "华文": "2020673087" };
    
    let db = {}, sessionQs = [], curIdx = 0, sessionErrors = 0;
    let canvas, ctx, drawing = false;
    let currentTermNum = 1, startTime = 0; 
    
    // 🌟 修复：正确读取当前用户和年级
    let curUser = localStorage.getItem('currentPlayer') || 'Valerie';
    let curGrade = localStorage.getItem('currentGrade') || 'P3';
    // 💡 Spelling 页面强制锁定为 English
    let curSub = 'English';

    let badgeQueue = [], pendingGameResult = null;

    async function syncToCloud(payload) {
        try {
            fetch(SYNC_API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        } catch (e) { console.error("Cloud sync failed", e); }
    }

    function getMistakes() { return JSON.parse(localStorage.getItem('hub_mistakes') || '{}'); }
    function saveMistakes(m) { localStorage.setItem('hub_mistakes', JSON.stringify(m)); }
    function getQuestionKey(sub, user, qText) { return `${user}_${sub}_${qText.trim()}`; }

    // 🌟 核心升级：强行锁定新加坡时间的 YYYY-MM-DD
    function getSGTDateString() {
        const d = new Date();
        const utc = d.getTime() + (d.getTimezoneOffset() * 60000);
        const sgt = new Date(utc + (3600000 * 8));
        return sgt.getFullYear() + '-' + String(sgt.getMonth() + 1).padStart(2, '0') + '-' + String(sgt.getDate()).padStart(2, '0');
    }

    function getDailyStats() {
        const today = getSGTDateString();
        const key = `practice_stats_${today}_${curUser}_${curSub}`;
        let stats = JSON.parse(localStorage.getItem(key) || '{"perfects":0, "gamesPlayed":0, "date":""}');
        if(stats.date !== today) stats = { perfects: 0, gamesPlayed: 0, date: today }; 
        return { key, stats };
    }
    
    function applyPerfectSession() {
        let { key, stats } = getDailyStats();
        stats.perfects += 1;
        let triggerGame = false, bonusMsg = "";
        if (stats.perfects % 2 === 0 && stats.gamesPlayed < 3) {
            triggerGame = true; stats.gamesPlayed += 1;
            bonusMsg = "🎉 完美达标！即将进入气球大作战！🎈";
        } else if (stats.gamesPlayed >= 3) {
            bonusMsg = "🌟 你今天已获得最高次数奖励！";
        } else {
            bonusMsg = "🔥 再获得一次 6~7 就能玩气球啦！";
        }
        localStorage.setItem(key, JSON.stringify(stats));
        return { trigger: triggerGame, msg: bonusMsg };
    }

    function checkAndRecordSpeed(timeTakenSec) {
        const key = `pb_speed_${curUser}_${curSub}`;
        const breaksKey = `speed_breaks_${curUser}`;
        let pb = localStorage.getItem(key);
        if (!pb || timeTakenSec < parseInt(pb)) {
            localStorage.setItem(key, timeTakenSec);
            let breaks = parseInt(localStorage.getItem(breaksKey) || '0') + 1;
            localStorage.setItem(breaksKey, breaks);
            return { isNewRecord: true, oldRecord: pb ? parseInt(pb) : null };
        }
        return { isNewRecord: false, oldRecord: parseInt(pb) };
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    async function init() {
        let activeIcon = '✍️';
        document.getElementById('header-info').innerHTML = `${activeIcon} ${curUser} - Spelling`;

        const today = getSGTDateString();
        const limitKey = `limit_${today}_${curUser}_Spelling`;
        if (parseInt(localStorage.getItem(limitKey) || "0") >= 1) {
            document.getElementById('loading').innerHTML = `
                <div style="padding:20px; text-align:center;">
                    <div style="font-size:60px; margin-bottom:15px;">🏆</div>
                    <h2 style="color:#1e293b; margin-bottom:10px; font-size:24px;">今日【听写】已达标！</h2>
                    <p style="color:#64748b; font-weight:800; font-size:14px; margin-bottom:25px;">每天只做一次，保证最高质量。<br>明天再来挑战吧！</p>
                    <button class="btn-action" style="background:#3b82f6; color:white; max-width:200px; margin: 0 auto;" onclick="window.location.href='index.html'">返回主页</button>
                </div>`;
            return;
        }

        try {
            const resp = await fetch(`${SYNC_API_URL}?type=fetch_mistakes&user=${curUser}`);
            const cloudMistakes = await resp.json();
            if (cloudMistakes && Object.keys(cloudMistakes).length > 0) {
                localStorage.setItem('hub_mistakes', JSON.stringify(cloudMistakes));
            }
        } catch (e) {}

        const now = new Date();
        const t2 = new Date(2026, 2, 23), t3 = new Date(2026, 5, 29), t4 = new Date(2026, 8, 14);
        if (now >= t4) currentTermNum = 4; else if (now >= t3) currentTermNum = 3; else if (now >= t2) currentTermNum = 2; else currentTermNum = 1;
        
        let cached = sessionStorage.getItem('hub_db_cache');
        if (cached) { try { db = JSON.parse(cached); if (Object.keys(db).length > 0) { startQuiz(); return; } } catch(e) { sessionStorage.removeItem('hub_db_cache'); } }

        const loads = Object.entries(GIDS).map(([name, gid]) => new Promise(res => {
            Papa.parse(`https://docs.google.com/spreadsheets/d/e/2PACX-${SHEET_ID}/pub?gid=${gid}&single=true&output=csv&t=${Date.now()}`, {
                download: true, header: true, skipEmptyLines: 'greedy',
                complete: r => res({ name, data: r.data.map(row => { let n = {}; Object.keys(row).forEach(k => n[k.trim()] = row[k]); return n; }) }),
                error: () => res({name, data: []})
            });
        }));
        const results = await Promise.race([Promise.all(loads), new Promise(res => setTimeout(() => res('timeout'), 5000))]);
        if (results === 'timeout') { document.getElementById('loading').innerHTML = "⚠️ 网络慢，请重试。"; return; }
        db = {};
        results.forEach(r => { if(r && r.data) { r.data.forEach(row => { 
            let g = (row.Grade || row.GRADE || "").toUpperCase(); if(!g) return;
            if(!db[g]) db[g] = {}; if(!db[g][r.name]) db[g][r.name] = []; db[g][r.name].push(row);
        }); } });
        if (Object.keys(db).length > 0) { sessionStorage.setItem('hub_db_cache', JSON.stringify(db)); startQuiz(); }
        else { document.getElementById('loading').innerText = "⚠️ Data error."; }
    }
    
    function startQuiz() {
        // 💡 提取 Spelling 题库
        let mainPool = (db[curGrade][curSub] || []).filter(q => (q.Type || "").toString().trim().toUpperCase() === 'SPELLING');
        mainPool = mainPool.filter(q => {
            let t = q.Term || q.TERM; if (!t) return true; 
            let tNum = parseInt(t.toString().replace(/\D/g, ''));
            return isNaN(tNum) || tNum <= currentTermNum;
        });
        if (mainPool.length === 0) { 
            document.getElementById('loading').innerHTML = "⚠️ 没有找到今日的听写词汇。"; 
            setTimeout(() => window.location.href='index.html', 2000); return; 
        }

        const today = getSGTDateString();
        localStorage.setItem(`limit_${today}_${curUser}_Spelling`, "1");
        
        let mistakes = getMistakes(), eligibleMistakes = [], freshNewPool = []; 
        mainPool.forEach(q => {
            let key = getQuestionKey(curSub, curUser, q.Question);
            let mData = mistakes[key];
            if (mData) {
                let w = typeof mData === 'object' ? (mData.weight || 0) : mData;
                if (w > 0) eligibleMistakes.push({ q: q, weight: w });
                else freshNewPool.push(q);
            } else {
                freshNewPool.push(q);
            }
        });

        let mistakesPicked = [];
        if (eligibleMistakes.length > 0) {
            let weightedList = [];
            eligibleMistakes.forEach(item => { let w = Math.max(1, item.weight); for(let i=0; i<w; i++) weightedList.push(item.q); });
            let targetMistakes = Math.min(5, eligibleMistakes.length);
            while (mistakesPicked.length < targetMistakes && weightedList.length > 0) {
                let idx = Math.floor(Math.random() * weightedList.length); let selectedQ = weightedList[idx];
                if (!mistakesPicked.includes(selectedQ)) mistakesPicked.push(selectedQ);
                weightedList = weightedList.filter(item => item !== selectedQ);
            }
        }
        
        let remainingQuota = 15 - mistakesPicked.length;
        freshNewPool.sort(() => 0.5 - Math.random());
        sessionQs = [...mistakesPicked, ...freshNewPool.slice(0, remainingQuota)];
        sessionQs.sort(() => 0.5 - Math.random());
        curIdx = 0; sessionErrors = 0; 
        document.getElementById('draw-panel').style.display = 'none';
        document.getElementById('draw-pad-btn').style.display = 'none';
        
        startTime = Date.now(); showScreen('quiz-screen'); renderQ();
    }

    function updateProgress() {
        const bar = document.getElementById('progress-bar');
        let html = '', icon = '✍️';
        for(let i=0; i<sessionQs.length; i++) html += `<div class="milestone${i < curIdx ? ' done' : (i === curIdx ? ' active' : '')}">${i < curIdx ? '⭐' : (i === curIdx ? icon : '☁️')}</div>`;
        bar.innerHTML = html;
        document.getElementById('progress-text').innerText = `${curIdx + 1} / ${sessionQs.length}`;
    }

    // 💡 发音功能
    function playAudio(text) {
        if ('speechSynthesis' in window) {
            let msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'en-SG'; // 新加坡英语口音
            window.speechSynthesis.speak(msg);
        } else {
            alert("Sorry, your browser doesn't support text to speech!");
        }
    }

    function renderQ() {
        updateProgress(); if(ctx && canvas) clearPad();
        const q = sessionQs[curIdx];
        q.isEvaluated = false; 

        // 💡 针对听写页面的渲染逻辑：点击发音图标
        const targetWord = (q['Correct Answer'] || q['ANSWER'] || "").toString().trim();
        document.getElementById('q-text').innerHTML = `
            <div style="display:flex; align-items:center; gap: 15px;">
                <button onclick="playAudio('${targetWord.replace(/'/g, "\\'")}')" style="background:#e0f2fe; border:3px solid #bae6fd; border-radius:50%; width:50px; height:50px; font-size:24px; cursor:pointer; box-shadow:0 4px 0 #7dd3fc; outline:none; transition:0.1s;">🔊</button>
                <span>${q.Question}</span>
            </div>
        `;

        const container = document.getElementById('input-container');
        container.innerHTML = `<input type="text" id="ans-in" class="ans-input" placeholder="Type here..." autocomplete="off">`;
        
        document.getElementById('fb-text').innerText = '';
        document.getElementById('sub-btn').style.display = 'flex'; document.getElementById('next-btn').style.display = 'none';
        if (curIdx === sessionQs.length - 1) document.getElementById('next-btn').innerText = "Finish ✨";
        else document.getElementById('next-btn').innerText = "Next ➡️";
        
        setTimeout(() => document.getElementById('ans-in').focus(), 100);
    }

    function checkAns() {
        const input = document.getElementById('ans-in'), user = input.value.trim().toLowerCase();
        const correctRaw = (sessionQs[curIdx]['Correct Answer'] || sessionQs[curIdx]['ANSWER'] || "").toString().trim();
        const fb = document.getElementById('fb-text');
        
        if(user === "") { alert("Please type your answer!"); return; }
        
        let isCorrect = (user === correctRaw.toLowerCase()), key = getQuestionKey(curSub, curUser, sessionQs[curIdx].Question), mistakes = getMistakes();

        let mData = mistakes[key] || { weight: 0, wrongs: [] };
        if (typeof mData === 'number') mData = { weight: mData, wrongs: [] };

        if(isCorrect) {
            input.disabled = true; document.getElementById('sub-btn').style.display = 'none'; document.getElementById('next-btn').style.display = 'flex';
            fb.innerHTML = `<span style="color:#10b981;">✅ Correct!</span>`;
            
            if (mistakes[key] && !sessionQs[curIdx].isEvaluated) {
                mData.weight = Math.max(0, mData.weight - 1); 
                if (mData.weight <= 0) delete mistakes[key]; 
                else mistakes[key] = mData;
                saveMistakes(mistakes); 
                
                syncToCloud({
                    type: 'mistake_update', 
                    user: curUser, grade: curGrade, subject: curSub, 
                    questionText: sessionQs[curIdx].Question, 
                    correctAns: correctRaw, isCorrect: true
                });
            }
        } else {
            if (!sessionQs[curIdx].isEvaluated) sessionErrors++; 
            fb.innerHTML = `<span style="color:#ef4444;">❌ Try again!</span><br><span style="font-size:18px; color:#64748b;">Answer: <b style="color:#0f172a;">${correctRaw}</b></span>`;
            input.classList.add('error-shake'); setTimeout(()=> input.classList.remove('error-shake'), 400);
            
            if (!sessionQs[curIdx].isEvaluated) {
                if (!mistakes[key]) mData.weight = 3; 
                else mData.weight += 1; 
                
                if (mData.wrongs[mData.wrongs.length - 1] !== user) {
                    mData.wrongs.push(user);
                }
                mistakes[key] = mData; saveMistakes(mistakes); 
                
                syncToCloud({
                    type: 'mistake_update', 
                    user: curUser, grade: curGrade, subject: curSub, 
                    questionText: sessionQs[curIdx].Question, 
                    correctAns: correctRaw, wrongAns: user
                });
            }
        }
        sessionQs[curIdx].isEvaluated = true; 
    }

    function nextQ() { if (curIdx < sessionQs.length - 1) { curIdx++; renderQ(); } else { finishQuiz(); } }

    function finishQuiz() {
        const timeTakenSec = Math.floor((Date.now() - startTime) / 1000);
        const isPerfect = sessionErrors <= 1;
        
        let config = JSON.parse(localStorage.getItem('hub_config') || "{}");
        const speedLimit = (curGrade === 'P1' || curUser === 'Venessa') ? (config.speed_limit_p1 || 360) : (config.speed_limit_p3 || 180);

        badgeQueue = [];
        let earnedBadgesForCoin = 0;
        
        const today = getSGTDateString();
        const statsKey = `practice_stats_${today.replace(/-/g, '')}_${curUser}_${curSub}`;
        let localStats = JSON.parse(localStorage.getItem(statsKey) || '{"perfects":0, "gamesPlayed":0}');
        if (isPerfect) localStats.perfects += 1;
        localStorage.setItem(statsKey, JSON.stringify(localStats));

        if (sessionErrors <= 3) {
            earnedBadgesForCoin++;
            let subIcon = '👑';
            let subName = '听写大王';
            badgeQueue.push({ icon: subIcon, title: subName, desc: `完成高质量听写，专属徽章 +1！` });
            syncToCloud({ type: 'badge', user: curUser, grade: curGrade, subject: curSub, icon: subIcon, title: subName, desc: '高质量听写' });
        }

        if (isPerfect) {
            earnedBadgesForCoin++;
            badgeQueue.push({ icon: '🎯', title: 'Sharpshooter!', desc: 'Great spelling accuracy! Sharpshooter badge +1!' });
            syncToCloud({ type: 'badge', user: curUser, grade: curGrade, subject: curSub, icon: '🎯', title: '神奇射手', desc: '错题<=1' });

            if (timeTakenSec <= speedLimit) {
                earnedBadgesForCoin++;
                let currentBreaks = parseInt(localStorage.getItem(`speed_breaks_${curUser}`) || '0');
                localStorage.setItem(`speed_breaks_${curUser}`, currentBreaks + 1);

                badgeQueue.push({ icon: '⚡️', title: 'Speed Record!', desc: `Finished in <span class="epic-highlight">${timeTakenSec}s</span>! Lightning fast!` });
                syncToCloud({ type: 'badge', user: curUser, grade: curGrade, subject: curSub, icon: '⚡️', title: '极速突破', desc: `耗时: ${timeTakenSec}秒` });
            }

            pendingGameResult = applyBalloonLogic(sessionErrors);
            if (pendingGameResult && pendingGameResult.trigger) {
                badgeQueue.push({ icon: '🎈', title: 'Balloon Hunter!', desc: pendingGameResult.msg });
                
                localStats.gamesPlayed += 1;
                localStorage.setItem(statsKey, JSON.stringify(localStats));

                syncToCloud({ type: 'badge', user: curUser, grade: curGrade, subject: curSub, icon: '🎈', title: '气球猎人', desc: '解锁气球游戏' });
            }
        } else {
            pendingGameResult = null; 
        }

        if (earnedBadgesForCoin > 0) {
            let coinGain = earnedBadgesForCoin;
            let vaultCoins = parseInt(localStorage.getItem('gold_coins_vault') || "0");
            localStorage.setItem('gold_coins_vault', vaultCoins + coinGain);
            syncToCloud({ type: 'coin_update', user: curUser, total: vaultCoins + coinGain });
        }

        let lastDate = localStorage.getItem(`last_date_${curUser}`);
        let currentStreak = parseInt(localStorage.getItem(`current_streak_${curUser}`) || "0");
        let totalDays = parseInt(localStorage.getItem(`total_days_${curUser}`) || "0");

        if (lastDate) {
            let diff = Math.floor((new Date(today) - new Date(lastDate)) / 864e5);
            if (diff === 1) currentStreak++; else if (diff > 1) currentStreak = 1; 
        } else {
            currentStreak = 1;
        }

        if (lastDate !== today) {
            totalDays++; 
            localStorage.setItem(`last_date_${curUser}`, today);
            localStorage.setItem(`current_streak_${curUser}`, currentStreak);
            localStorage.setItem(`total_days_${curUser}`, totalDays);

            let crys = parseInt(localStorage.getItem(`crystals_${curUser}`) || "0");

            if (currentStreak >= 3) {
                crys += 1;
                localStorage.setItem(`crystals_${curUser}`, crys);
                badgeQueue.push({ icon: '💎', title: 'Crystal', desc: `Streak ${currentStreak} days! Crystal +1!` });
            }
            
            syncToCloud({ 
                type: 'crystal_update', user: curUser, 
                crystalsTotal: crys, totalDays: totalDays, streak: currentStreak 
            });
        }

        const dayOfWeek = new Date().getDay();
        if (dayOfWeek === 0 || dayOfWeek === 6) { 
            if (earnedBadgesForCoin > 0) {
                let d = new Date();
                d.setDate(d.getDate() - (d.getDay() === 0 ? 7 : d.getDay()) + 6); 
                let weekendId = d.toISOString().split('T')[0];
                
                let wkKey = `wk_count_${curUser}_${weekendId}`;
                let wkAwardedKey = `wk_awarded_${curUser}_${weekendId}`;
                
                let currentWkCount = parseInt(localStorage.getItem(wkKey) || "0");
                currentWkCount += earnedBadgesForCoin;
                localStorage.setItem(wkKey, currentWkCount);

                if (currentWkCount >= 10 && !localStorage.getItem(wkAwardedKey)) {
                    localStorage.setItem(wkAwardedKey, "1"); 
                    badgeQueue.push({ 
                        icon: '🎉', title: 'Weekend Maniac!', 
                        desc: `10 badges this weekend! Amazing!` 
                    });
                    syncToCloud({ type: 'badge', user: curUser, grade: curGrade, subject: curSub, title: '周末狂人' });
                }
            }
        }

        // 🌟🌟 核心：在此处印下今日打卡印章 🌟🌟
        localStorage.setItem(`last_checkin_date_${curUser}`, today);

        if (badgeQueue.length > 0) {
            document.getElementById('badge-modal').style.display = 'flex';
            showNextBadge();
        } else renderFinalScreen();
    }

    function showNextBadge() {
        if (badgeQueue.length > 0) {
            let b = badgeQueue.shift(); let m = document.querySelector('.epic-modal');
            m.style.transform = m.style.opacity = ''; m.style.animation = 'none'; void m.offsetWidth; m.style.animation = 'epicPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            document.getElementById('badge-icon').innerText = b.icon;
            document.getElementById('badge-title').innerText = b.title;
            document.getElementById('badge-desc').innerHTML = b.desc;
            if (typeof confetti === 'function') confetti({ particleCount: 300, spread: 150, origin: { y: 0.3 }, zIndex: 1001 });
        } else { document.getElementById('badge-modal').style.display = 'none'; renderFinalScreen(); }
    }

    function closeBadgeModal() {
        let m = document.querySelector('.epic-modal'); m.style.transform = 'scale(0.8)'; m.style.opacity = '0';
        setTimeout(showNextBadge, 150);
    }

    function renderFinalScreen() {
        const isPerfect = sessionErrors <= 1;
        let title = isPerfect ? '🎉 You got 6~7!' : '💪 Keep trying!';
        let html = `<div style="text-align:center; padding: 40px 0;"><h1 style="font-size:32px; color:#0f172a; font-weight:900;">${title}</h1>`;
        if (pendingGameResult && pendingGameResult.msg) html += `<div class="stat-badge">${pendingGameResult.msg}</div>`;
        if (sessionErrors > 0) html += `<p style="color:#ef4444; font-weight:800; margin-top:25px;">🐞 已将 ${sessionErrors} 道错词关进捉虫日记。</p>`;
        html += `<button class="btn-action" style="background:#f1f5f9; color:#64748b; width:100%; max-width: 300px; margin: 40px auto 0 auto; border: 4px solid #e2e8f0;" onclick="window.location.href='index.html'">🏠 Back to Hub</button></div>`;
        document.getElementById('finish-screen').innerHTML = html; showScreen('finish-screen');
        
        // 🌟 已加上带回家地址的回城车票！
        if (isPerfect && pendingGameResult && pendingGameResult.trigger) setTimeout(() => { window.location.href = "https://andydang2007.github.io/game/popballoons.html?ticket=" + Date.now() + "&returnUrl=index.html"; }, 2500);
    }

    function initDrawPad() {
        canvas = document.getElementById('pad'); ctx = canvas.getContext('2d');
        ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 5; ctx.strokeStyle = '#1e293b';
        const getP = (e) => { const r = canvas.getBoundingClientRect(), t = e.touches ? e.touches[0] : e; return { x: t.clientX - r.left, y: t.clientY - r.top }; };
        canvas.addEventListener('mousedown', (e) => { drawing = true; ctx.beginPath(); const p = getP(e); ctx.moveTo(p.x, p.y); });
        canvas.addEventListener('mousemove', (e) => { if (!drawing) return; e.preventDefault(); const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
        window.addEventListener('mouseup', () => drawing = false);
        canvas.addEventListener('touchstart', (e) => { drawing = true; ctx.beginPath(); const p = getP(e); ctx.moveTo(p.x, p.y); }, {passive:false});
        canvas.addEventListener('touchmove', (e) => { if (!drawing) return; e.preventDefault(); const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }, {passive:false});
        canvas.addEventListener('touchend', () => drawing = false);
    }
    function clearPad() { if(ctx) ctx.clearRect(0,0,canvas.width,canvas.height); }
    function toggleDrawPad() { const p = document.getElementById('draw-panel'); p.style.display = p.style.display === 'none' ? 'flex' : 'none'; if (p.style.display === 'flex' && !ctx) initDrawPad(); }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (document.getElementById('quiz-screen').style.display === 'flex') {
                if (document.getElementById('sub-btn').style.display !== 'none') { e.preventDefault(); checkAns(); }
                else if (document.getElementById('next-btn').style.display !== 'none') { e.preventDefault(); nextQ(); }
            } else if (document.getElementById('badge-modal').style.display === 'flex') { e.preventDefault(); closeBadgeModal(); }
        }
    });
    window.onload = init;
</script>
</body>
</html>
