<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Learning Hub</title>

    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/240/learning.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LearningHub">

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        :root { --primary: #10b981; --bg: #f8fafc; --text-main: #1e293b; --text-muted: #64748b; }
        * { box-sizing: border-box; font-family: 'Nunito', 'Microsoft YaHei', 'Comic Sans MS', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); margin: 0; padding: 20px; color: var(--text-main); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        /* ☁️ 圆润的白色主面板 */
        .container { width: 100%; max-width: 650px; background: rgba(255,255,255,0.95); padding: 35px 25px 45px 25px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; position: relative; border: 4px solid #ffffff; backdrop-filter: blur(10px); margin-top: 20px; }
        .screen { display: none; width: 100%; animation: bounceIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        
        @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        
        /* 📅 顶部胶囊日期块 */
        #school-term-display { 
            margin-bottom: 25px; font-size: 15px; color: #3b82f6; 
            background: rgba(255,255,255,0.7); padding: 10px 20px; 
            border-radius: 50px; font-weight: 900; border: 2px solid #fff; 
            box-shadow: 0 8px 15px rgba(59, 130, 246, 0.1); 
            display: inline-flex; align-items: center; gap: 8px;
            letter-spacing: 0.5px;
        }

        .magic-number { display: inline-block; font-size: 1.4em; color: #f59e0b; font-weight: 900; padding: 0 5px; animation: popPulse 1s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes popPulse { 0% { transform: scale(1); text-shadow: 0 0 5px rgba(253, 224, 71, 0.5); } 100% { transform: scale(1.2) translateY(-3px); text-shadow: 0 0 15px rgba(234, 179, 8, 0.8), 0 0 30px rgba(234, 179, 8, 0.4); } }

        button.name-btn { width: 85%; padding: 20px; border-radius: 30px; border: 4px solid #e2e8f0; background: white; cursor: pointer; font-weight: 900; font-size: 26px; transition: 0.15s; color: #475569; display: flex; align-items: center; justify-content: center; gap: 15px; box-shadow: 0 8px 0 #cbd5e1; outline: none; margin-bottom: 20px; }
        button.name-btn:active { transform: translateY(8px); box-shadow: 0 0 0 transparent; }
        
        .grid-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; width: 100%; margin-bottom: 20px; }
        .grid-cards.three-col { grid-template-columns: repeat(3, 1fr); }
        
        .card-btn { background: white; border: 4px solid #e2e8f0; border-radius: 30px; padding: 25px 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; cursor: pointer; transition: 0.15s; color: #475569; font-weight: 900; font-size: 18px; box-shadow: 0 8px 0 #cbd5e1; }
        .card-btn:active { transform: translateY(8px); box-shadow: 0 0 0 transparent; }
        .card-btn .emoji { font-size: 46px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        
        .card-btn.eng { border-color: #bae6fd; }
        .card-btn.math { border-color: #fbcfe8; }
        .card-btn.cn { border-color: #e9d5ff; }
        .card-btn.sci { border-color: #a7f3d0; }

        .checkbox-grid { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 20px; max-height: 300px; overflow-y: auto; padding: 10px; align-content: flex-start; }
        .checkbox-label { padding: 14px 22px; border-radius: 25px; border: 3px solid #e2e8f0; background: white; cursor: pointer; transition: 0.15s; font-size: 16px; font-weight: 800; color: #475569; user-select: none; box-shadow: 0 5px 0 #cbd5e1; }
        .checkbox-label:active { transform: translateY(5px); box-shadow: 0 0 0 transparent; }
        .checkbox-label input { display: none; }
        .checkbox-label.selected { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; box-shadow: 0 5px 0 #93c5fd; }
        
        .btn-action { border-radius: 25px; border: none; font-weight: 900; font-size: 20px; cursor: pointer; transition: 0.15s; display: flex; align-items: center; justify-content: center; outline: none; padding: 18px; box-shadow: 0 6px 0 rgba(0,0,0,0.1); }
        .btn-action:active { transform: translateY(6px); box-shadow: 0 0 0 transparent; }

        .milestone-track { display: flex; justify-content: space-between; position: relative; margin: 15px 0 25px 0; padding: 0 5px; }
        .milestone-track::before { content: ''; position: absolute; top: 50%; left: 15px; right: 15px; height: 8px; background: #e2e8f0; z-index: 1; transform: translateY(-50%); border-radius: 4px; }
        .milestone-fill { position: absolute; top: 50%; left: 15px; height: 8px; background: #10b981; z-index: 1; transform: translateY(-50%); border-radius: 4px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .milestone { width: 38px; height: 38px; background: #f8fafc; border: 4px solid #cbd5e1; border-radius: 50%; z-index: 2; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: 0.4s; box-sizing: border-box; }
        .milestone.done { border-color: #10b981; background: #d1fae5; }
        .milestone.active { border-color: #3b82f6; background: #eff6ff; font-size: 20px; transform: scale(1.2); box-shadow: 0 0 15px rgba(59,130,246,0.3); animation: bounceActive 1s infinite alternate; }

        .q-text { font-size: 26px; text-align: left; margin: 25px 0; line-height: 1.5; font-weight: 800; color: #1e293b; }
        input.ans-input, textarea.ans-input { font-size: 22px; padding: 18px; width: 100%; border: 4px solid #e2e8f0; border-radius: 20px; box-sizing: border-box; outline: none; font-family: inherit; font-weight: bold; color: #334155; }
        input.ans-input.error-shake { border-color: #ef4444; animation: shake 0.3s; background-color: #fef2f2; color: #ef4444; }
        
        .mcq-list { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
        button.mcq-btn { padding: 18px; border-radius: 20px; border: 4px solid #e2e8f0; background: white; font-size: 20px; font-weight: 700; cursor: pointer; text-align: left; transition: 0.15s; color: #1e293b; outline: none; box-shadow: 0 5px 0 #cbd5e1; }
        button.mcq-btn.active { border-color: #3b82f6; background: #eff6ff; font-weight: 900; color: #1d4ed8; box-shadow: 0 5px 0 #93c5fd; }
        button.mcq-btn.error { border-color: #ef4444; background: #fef2f2; color: #b91c1c; animation: shake 0.3s; }

        .feedback { font-size: 20px; margin: 20px 0; min-height: 28px; font-weight: 900; }
        
        .res-section { border-top: 4px dashed #e2e8f0; margin-top: 30px; padding-top: 25px; text-align: left; }
        .res-card { background: #f1f5f9; padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 2px solid #e2e8f0; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: white; padding: 40px; border-radius: 40px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.2); width: 90%; max-width: 400px; display: flex; flex-direction: column; align-items: center; border: 5px solid #fff; }
        .pin-input-hub { font-size: 40px; font-weight: 900; letter-spacing: 12px; padding: 20px; width: 180px; text-align: center; border: 4px solid #e2e8f0; border-radius: 25px; margin: 25px 0; outline: none; color: #1e293b; transition: 0.2s; box-shadow: inset 0 4px 6px rgba(0,0,0,0.05); }

        @media (min-width: 768px) { .container { padding: 40px 40px 60px 40px; border-radius: 50px; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body>

<div class="container">
    <div id="school-term-display">📅 Loading Date...</div>

    <div id="loading" class="screen" style="display:block; padding: 30px 0; font-size: 24px; color: #3b82f6; font-weight: 900;">
        🌟 魔法书正在加载...
    </div>

    <div id="user-screen" class="screen">
        <h2 style="margin:0 0 5px 0; color:#0f172a; font-size: 32px; font-weight: 900;">Did you <span class="magic-number" style="font-size:1.2em;">6~7</span> today?</h2>
        <div style="font-size: 16px; color: #64748b; margin-top: 5px; font-weight: 800; margin-bottom: 25px;">Aim for a perfect score or just 1 mistake!</div>

        <div class="name-selector">
            <button class="name-btn" onclick="switchUser('P3')">
                <span style="font-size: 46px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1));">👱‍♀️</span> Valerie
            </button>
            <button class="name-btn" onclick="switchUser('P1')">
                <span style="font-size: 46px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1));">👧</span> Venessa
            </button>
        </div>
    </div>

    <div id="subject-screen" class="screen">
        <h2 id="welcome-title" style="margin:0 0 30px 0; color:#0f172a; font-size: 32px; font-weight: 900;">Welcome!</h2>
        
        <div class="grid-cards">
            <div class="card-btn eng" onclick="handleSubjectClick('English')">
                <div class="emoji">🔤</div> English
            </div>
            <div class="card-btn math" onclick="handleSubjectClick('Math')">
                <div class="emoji">🔢</div> Math
            </div>
            <div class="card-btn cn" id="cn-subject-btn" onclick="handleSubjectClick('华文')">
                <div class="emoji">🐼</div> 华文
            </div>
            <div class="card-btn sci" onclick="handleSubjectClick('Science')">
                <div class="emoji">🌱</div> Science
            </div>
        </div>

        <div class="res-section">
            <h3 style="margin-top:0; color:#334155; font-size: 22px; font-weight: 900;">📚 Resources</h3>
            <div id="res-list"></div>
        </div>
        
        <div style="margin-top: 30px;">
            <button class="btn-action" style="background:#f1f5f9; color:#64748b; border:4px solid #e2e8f0; width: 100%; box-shadow: 0 6px 0 #cbd5e1;" onclick="showScreen('user-screen')">← Switch User</button>
        </div>
    </div>

    <div id="mode-screen" class="screen">
        <h2 style="margin:0 0 30px 0; color:#0f172a; font-size: 28px; font-weight: 900;">Select Mode</h2>
        <div class="grid-cards">
            <div class="card-btn" style="border-color:#bae6fd; color:#0284c7;" onclick="showTopicSelection(curSub, false)">
                <div class="emoji">🚀</div> Practice
            </div>
            <div class="card-btn" style="border-color:#fde68a; color:#b45309;" onclick="showTopicSelection(curSub, true)">
                <div class="emoji">✍️</div> Spelling
            </div>
        </div>
        <button class="btn-action" style="background:#f1f5f9; color:#64748b; width: 100%; border:4px solid #e2e8f0; box-shadow: 0 6px 0 #cbd5e1; margin-top: 15px;" onclick="showScreen('subject-screen')">← Back</button>
    </div>

    <div id="cn-mode-screen" class="screen">
        <h2 style="margin:0 0 30px 0; color:#0f172a; font-size: 28px; font-weight: 900;">要做什么练习？</h2>
        <div class="grid-cards three-col">
            <div class="card-btn" style="border-color:#bae6fd; color:#0284c7;" onclick="showTopicSelection('华文', false)">
                <div class="emoji">📝</div> <div style="font-size:16px;">复习</div>
            </div>
            <div class="card-btn" style="border-color:#fde68a; color:#b45309;" onclick="goToSpelling()">
                <div class="emoji">✍️</div> <div style="font-size:16px;">听写</div>
            </div>
            <div class="card-btn" style="border-color:#fbcfe8; color:#be185d;" onclick="goToPinyinGame()">
                <div class="emoji">🎮</div> <div style="font-size:16px;">拼音</div>
            </div>
        </div>
        <button class="btn-action" style="background:#f1f5f9; color:#64748b; width: 100%; border:4px solid #e2e8f0; box-shadow: 0 6px 0 #cbd5e1; margin-top: 25px;" onclick="showScreen('subject-screen')">← 返回</button>
    </div>

    <div id="topic-screen" class="screen">
        <h2 id="topic-title" style="margin:0 0 5px 0; color:#0f172a; font-size: 28px; font-weight: 900;">Select Topics</h2>
        <p id="topic-desc" style="color:#64748b; margin-bottom: 20px; font-weight: 700;"></p>
        <div style="text-align: center; margin-bottom: 15px;">
            <label class="checkbox-label" id="check-all-label" style="display:inline-flex;">
                <input type="checkbox" id="check-all" onchange="toggleAllTopics(this)">
                <b id="check-all-text">🌟 全选所有 (Select All)</b>
            </label>
        </div>
        <div id="topic-checkboxes" class="checkbox-grid"></div>
        <div class="action-row">
            <button class="btn-action" style="background:#f1f5f9; color:#64748b; border: 4px solid #e2e8f0; box-shadow: 0 6px 0 #cbd5e1; flex:0.4;" onclick="goBackFromTopic()">← Back</button>
            <button class="btn-action" style="background:#10b981; color:white; box-shadow: 0 6px 0 #059669; flex:0.6;" onclick="startQuiz()">Start 🚀</button>
        </div>
    </div>

    <div id="quiz-screen" class="screen">
        <div id="progress-bar" class="milestone-track"></div>
        <div id="q-text" class="q-text"></div>
        <div id="input-container"></div>
        <div id="fb-text" class="feedback"></div>
        <div class="action-row">
            <button id="exit-btn" class="btn-action" style="background:#f1f5f9; color:#64748b; border: 4px solid #e2e8f0; box-shadow: 0 6px 0 #cbd5e1; flex: 0.8;" onclick="location.reload()">Quit 🏠</button>
            <button id="sub-btn" class="btn-action" style="background:#3b82f6; color:white; box-shadow: 0 6px 0 #2563eb; flex: 1.2;" onclick="checkAns()">Submit</button>
            <button id="next-btn" class="btn-action" style="background:#10b981; color:white; box-shadow: 0 6px 0 #059669; flex: 1.2; display:none;" onclick="nextQ()">Next ➡️</button>
        </div>
    </div>

</div>

<div id="pin-modal" class="modal-overlay">
    <div class="modal-content">
        <div style="font-size: 50px; margin-bottom: 10px;">🛡️</div>
        <h3 style="margin:0 0 10px 0; color:#0f172a; font-size: 26px; font-weight: 900;">Parent Lock</h3>
        <p style="color:#64748b; font-size:16px; margin:0; font-weight: 700;">Locked profile.</p>
        <input type="tel" id="hub-pin-input" class="pin-input-hub" maxlength="4" placeholder="***">
        <div style="display:flex; gap:15px; width: 100%;">
            <button class="btn-action" style="background:#f1f5f9; color:#475569; border: 4px solid #e2e8f0; box-shadow: 0 6px 0 #cbd5e1; flex:1;" onclick="closePinModal()">Cancel</button>
            <button class="btn-action" style="background:#f59e0b; color:white; box-shadow: 0 6px 0 #d97706; flex:1;" onclick="verifyHubPin()">Unlock</button>
        </div>
    </div>
</div>

<script>
    const SHEET_ID = "1vQlpdRHnR9ybEHHgX6fouRI-vXOh8KQNLSjsbt0TYh9R3No_9i7QNv_4ELwJZJGQpTe3oZVXaZijaW4";
    const GIDS = { "English": "1893311738", "Math": "59294467", "Science": "1581471994", "华文": "2020673087", "Resources": "469231602" };
    let db = {}, curUser = '', curSub = '', sessionQs = [], curIdx = 0, sessionErrors = 0, pendingUser = null;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    async function init() {
        const now = new Date();
        const t2 = new Date(2026, 2, 23), t3 = new Date(2026, 5, 29), t4 = new Date(2026, 8, 14);
        const diff = (d1, d2) => Math.floor((d1 - d2) / 864e5);
        let term = "Term 1";
        if (now >= t4) { const w = Math.floor(diff(now, t4)/7) + 1; term = w <= 10 ? `Term 4 Wk ${w}` : "Holiday"; }
        else if (now >= t3) { const w = Math.floor(diff(now, t3)/7) + 1; term = w <= 10 ? `Term 3 Wk ${w}` : "Holiday"; }
        else if (now >= t2) { const w = Math.floor(diff(now, t2)/7) + 1; term = w <= 10 ? `Term 2 Wk ${w}` : "Holiday"; }
        
        // 渲染顶部胶囊块内容
        document.getElementById('school-term-display').innerHTML = `<span>📅 ${now.toLocaleDateString('en-SG', {month:'short', day:'numeric'})}</span><span style="color:#cbd5e1">|</span><span>${term}</span>`;

        let cachedHubDB = sessionStorage.getItem('hub_db_cache');
        if (cachedHubDB) {
            db = JSON.parse(cachedHubDB);
            document.getElementById('loading').style.display = 'none';
            showScreen('user-screen');
            return;
        }

        const loads = Object.entries(GIDS).map(([name, gid]) => new Promise(res => {
            Papa.parse(`https://docs.google.com/spreadsheets/d/e/2PACX-${SHEET_ID}/pub?gid=${gid}&single=true&output=csv&t=${Date.now()}`, {
                download: true, header: true, skipEmptyLines: 'greedy',
                complete: r => res({ name, data: r.data.map(row => { let n = {}; Object.keys(row).forEach(k => n[k.trim()] = row[k]); return n; }) }),
                error: () => res(null)
            });
        }));
        const results = await Promise.all(loads);
        db = {};
        results.forEach(r => { if(r) r.data.forEach(row => { 
            let g = (row.Grade || "").toUpperCase(); if(!g) return;
            if(!db[g]) db[g] = {}; if(!db[g][r.name]) db[g][r.name] = []; db[g][r.name].push(row);
        }); });
        sessionStorage.setItem('hub_db_cache', JSON.stringify(db));
        document.getElementById('loading').style.display = 'none';
        showScreen('user-screen');
    }

    function switchUser(g) {
        if (g === 'P1') { pendingUser = g; document.getElementById('pin-modal').style.display = 'flex'; return; }
        executeSwitchUser(g);
    }

    function executeSwitchUser(g) {
        curUser = g; localStorage.setItem('currentPlayer', g);
        document.getElementById('welcome-title').innerText = `Welcome, ${g==='P3'?'Valerie':'Venessa'}!`;
        document.getElementById('cn-subject-btn').innerHTML = `<div class="emoji">🐼</div> ${g==='P3'?'高级华文':'华文'}`;
        const list = document.getElementById('res-list'); list.innerHTML = '';
        if(db[g] && db[g]['Resources']) db[g]['Resources'].forEach(r => {
            const div = document.createElement('div'); div.className = 'res-card';
            div.innerHTML = r.Type === 'IMAGE' ? `<b>${r.Title}</b><img src="${r.Content}" style="width:100%;margin-top:12px;border-radius:12px;">` : `<b>${r.Title}</b><p>${r.Content}</p>`;
            list.appendChild(div);
        });
        showScreen('subject-screen');
    }

    function verifyHubPin() {
        const input = document.getElementById('hub-pin-input').value;
        const now = new Date();
        const mmdd = (now.getMonth() + 1) * 100 + now.getDate();
        const day = now.getDay() === 0 ? 7 : now.getDay();
        if (input === (mmdd + day).toString()) {
            document.getElementById('pin-modal').style.display = 'none';
            executeSwitchUser(pendingUser);
        } else {
            document.getElementById('hub-pin-input').classList.add('error-shake');
            setTimeout(() => { document.getElementById('hub-pin-input').classList.remove('error-shake'); document.getElementById('hub-pin-input').value = ''; }, 400);
        }
    }
    
    function closePinModal() { document.getElementById('pin-modal').style.display = 'none'; }
    function handleSubjectClick(s) { curSub = s; localStorage.setItem('currentSubject', s); if (s === '华文') showScreen('cn-mode-screen'); else showScreen('mode-screen'); }
    function goToPinyinGame() { window.location.href = "pinyin.html"; }
    function goToSpelling() { window.location.href = "spelling.html"; }

    init();
</script>
</body>
</html>
