<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Learning Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        :root { --primary: #10b981; --bg: #f8fafc; }
        
        /* 核心修复：所有元素强制包含边框计算，防止尺寸微变导致的跳动 */
        * { box-sizing: border-box; }

        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 600px; background: #fff; padding: 25px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; position: relative; overflow: hidden; }
        .screen { display: none; width: 100%; }
        
        .magic-number { display: inline-block; font-size: 1.4em; color: #f59e0b; font-weight: 900; padding: 0 5px; animation: popPulse 1s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes popPulse { 0% { transform: scale(1); } 100% { transform: scale(1.2) translateY(-3px); } }

        .date-badge { display: inline-block; background: #f1f5f9; color: #475569; padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: 600; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        
        .name-selector { display: flex; gap: 15px; justify-content: center; margin: 25px 0; height: 60px; /* 固定高度防止跳动 */ }
        button.name-btn { padding: 0 30px; height: 55px; border-radius: 16px; border: 3px solid #e2e8f0; background: white; cursor: pointer; font-weight: 700; font-size: 18px; transition: 0.2s; color: #475569; display: flex; align-items: center; justify-content: center; }
        button.name-btn.active { border-color: var(--primary); background: #d1fae5; color: #065f46; }
        
        .subject-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 15px; }
        button.sub-btn { flex: 1 1 40%; max-width: 45%; padding: 20px; border-radius: 16px; border: none; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button.sub-btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
        
        .checkbox-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; max-height: 250px; overflow-y: auto; padding: 5px; }
        .checkbox-label { display: flex; align-items: center; padding: 8px 12px; border-radius: 20px; border: 2px solid #e2e8f0; background: white; cursor: pointer; transition: 0.2s; font-size: 15px; font-weight: 500; color: #475569; user-select: none; }
        .checkbox-label.selected { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; font-weight: bold; }
        .checkbox-label.vocab-list { border-color: #d8b4fe; background: #faf5ff; color: #7e22ce; }
        .checkbox-label.vocab-list.selected { border-color: #9333ea; background: #e9d5ff; color: #6b21a8; }

        .milestone-track { display: flex; justify-content: space-between; position: relative; margin: 15px 0 35px 0; padding: 0 5px; height: 40px; }
        .milestone-track::before { content: ''; position: absolute; top: 50%; left: 15px; right: 15px; height: 6px; background: #e2e8f0; transform: translateY(-50%); border-radius: 3px; }
        .milestone-fill { position: absolute; top: 50%; left: 15px; height: 6px; background: #10b981; transform: translateY(-50%); border-radius: 3px; transition: width 0.5s; }
        .milestone { width: 36px; height: 36px; background: #f8fafc; border: 3px solid #cbd5e1; border-radius: 50%; z-index: 2; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: 0.4s; }
        .milestone.done { border-color: #10b981; background: #d1fae5; }
        .milestone.active { border-color: #3b82f6; background: #eff6ff; font-size: 20px; transform: scale(1.2); }

        .q-text { font-size: 24px; text-align: left; margin: 25px 0; min-height: 36px; }
        input.ans-input { font-size: 22px; padding: 18px; width: 100%; border: 2px solid #e2e8f0; border-radius: 12px; outline: none; transition: 0.2s; text-align: center; }
        input.ans-input:focus { border-color: #3b82f6; background: #f8faff; }
        
        .mcq-list { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        button.mcq-btn { padding: 18px; border-radius: 12px; border: 2px solid #e2e8f0; background: white; font-size: 18px; cursor: pointer; text-align: left; transition: 0.2s; color: #1e293b; }
        button.mcq-btn.active { border-color: var(--primary); background: #d1fae5; font-weight: bold; color: #065f46; }

        .feedback { font-size: 18px; margin: 15px 0; min-height: 24px; font-weight: bold; }
        
        /* 固定控制区域高度，防止按钮切换时页面跳动 */
        .controls { display: flex; gap: 10px; margin-top: 20px; height: 65px; align-items: stretch; }
        .btn-action { flex: 1; padding: 0 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        
        .pinyin-display { font-size: 36px; font-weight: bold; color: #64748b; margin: 5px 0 15px 0; height: 50px; }
        .pinyin-unit { margin: 0 8px; transition: 0.3s; }
        .pinyin-unit.active { color: #ea580c; transform: scale(1.1); text-decoration: underline; }
        
        .hanzi-practice-box { width: 280px; height: 280px; border: 3px solid #cbd5e1; border-radius: 16px; background: white; margin: 0 auto 15px auto; position: relative; }
        .word-card-btn { width: 50px; height: 60px; font-size: 28px; font-weight: bold; border: 2px solid #e2e8f0; border-radius: 12px; background: white; cursor: pointer; }
        .tool-btn { background: white; border: 2px solid #e2e8f0; padding: 8px 15px; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; color: #475569; }
        
        @media (min-width: 768px) {
            .container { max-width: 750px; padding: 40px; }
            button.name-btn { padding: 0 45px; height: 65px; font-size: 24px; }
            .hanzi-practice-box { width: 320px; height: 320px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="loading" class="screen" style="display:block;">Syncing...</div>

    <div id="menu-screen" class="screen">
        <h2 style="margin:0 0 10px 0; color:#0f172a;">Did you <span class="magic-number">6~7</span> today?</h2>
        <div id="school-term-display" class="date-badge">Loading...</div>
        <div class="name-selector">
            <button id="btn-P3" class="name-btn" onclick="switchUser('P3')">Valerie (P3)</button>
            <button id="btn-P1" class="name-btn" onclick="switchUser('P1')">Venessa (P1)</button>
        </div>
        <div id="subject-grid" class="subject-grid">
            <button class="sub-btn" style="background:#3b82f6;" onclick="handleSubjectClick('English')">English</button>
            <button class="sub-btn" style="background:#ec4899;" onclick="handleSubjectClick('Math')">Math</button>
            <button class="sub-btn" style="background:#a855f7;" onclick="handleSubjectClick('华文')">华文</button>
            <button class="sub-btn" style="background:#10b981;" onclick="handleSubjectClick('Science')">Science</button>
        </div>
        <div class="res-section" style="text-align:left; border-top: 2px dashed #e2e8f0; margin-top:20px; padding-top:10px;">
            <h3>Resources 📚</h3>
            <div id="res-list"></div>
        </div>
    </div>

    <div id="mode-screen" class="screen">
        <h2 style="margin-bottom:25px;">Select Mode</h2>
        <div style="display:flex; flex-direction:column; gap:15px;">
            <button class="btn-action" style="background:#3b82f6; color:white; height:70px;" onclick="showTopicSelection(curSub, false)">🚀 Start Practice</button>
            <button class="btn-action" style="background:linear-gradient(135deg, #f59e0b, #ea580c); color:white; height:70px;" onclick="showTopicSelection(curSub, true)">✍️ Spelling Game</button>
            <button class="btn-action" style="background:#f8fafc; color:#64748b; border:2px solid #e2e8f0; margin-top:10px;" onclick="showScreen('menu-screen')">← Back</button>
        </div>
    </div>

    <div id="topic-screen" class="screen">
        <h2 id="topic-title">Select Topics</h2>
        <div style="text-align: center; margin-bottom: 15px;">
            <label class="checkbox-label" id="check-all-label">
                <input type="checkbox" id="check-all" onchange="toggleAllTopics(this)"> 🌟 Select All
            </label>
        </div>
        <div id="topic-checkboxes" class="checkbox-grid"></div>
        <div class="controls">
            <button class="btn-action" style="background:#f1f5f9; color:#475569;" onclick="goBackFromTopic()">Back</button>
            <button class="btn-action" style="background:#10b981; color:white;" onclick="startQuiz()">Start 🚀</button>
        </div>
    </div>

    <div id="quiz-screen" class="screen">
        <div id="progress-bar" class="milestone-track"></div>
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:10px;">
            <button class="tool-btn" onclick="toggleDrawPad()">✍️ Pad</button>
            <div id="progress-text" style="font-size:14px; color:#94a3b8;"></div>
        </div>
        <div id="q-text" class="q-text"></div>
        <div id="draw-panel" style="display:none; flex-direction: column; align-items: center; margin-bottom:15px;">
            <canvas id="pad" width="300" height="200" style="background:#fff; border:1px solid #ddd; touch-action:none;"></canvas>
            <button class="tool-btn" style="margin-top:5px; width:100%;" onclick="ctx.clearRect(0,0,300,200)">Clear</button>
        </div>
        <div id="input-container" style="min-height: 100px;"></div>
        <div id="fb-text" class="feedback"></div>
        <div class="controls">
            <button class="btn-action" style="background:#f1f5f9;" onclick="location.reload()">Exit</button>
            <button id="sub-btn" class="btn-action" style="background:#1e293b; color:white;" onclick="checkAns()">Submit</button>
            <button id="next-btn" class="btn-action" style="background:#10b981; color:white; display:none;" onclick="nextQ()">Next →</button>
        </div>
    </div>

    <div id="spelling-screen" class="screen">
        <div id="spell-progress-bar" class="milestone-track"></div>
        <div id="spelling-pinyin" class="pinyin-display"></div>
        <div id="practice-pad-container" style="min-height:300px; display:flex; flex-direction:column; align-items:center;"></div>
        <div id="spell-fb" class="feedback"></div>
        <div class="controls">
            <button class="btn-action" style="background:#f1f5f9;" onclick="location.reload()">Exit</button>
            <button id="spell-next-btn" class="btn-action" style="background:#e2e8f0; color:#94a3b8; pointer-events:none;" onclick="nextSpellQ()">Next →</button>
        </div>
    </div>

</div>

<script>
    // ==========================================
    // 🎵 专属欢呼语音设置区 (ID 已提取)
    // ==========================================
    const SUCCESS_AUDIO_VALERIE = "https://docs.google.com/uc?export=download&id=1StoRXMJqWPegTr5Cu6oxlyIvL0iVgFwH"; 
    const SUCCESS_AUDIO_VENESSA = "https://docs.google.com/uc?export=download&id=1dMcI2VhKCzCKzTnAn570yyTGF0R_MJPh"; 

    const SHEET_ID = "1vQlpdRHnR9ybEHHgX6fouRI-vXOh8KQNLSjsbt0TYh9R3No_9i7QNv_4ELwJZJGQpTe3oZVXaZijaW4";
    const GIDS = { "English": "1893311738", "Math": "59294467", "Science": "1581471994", "华文": "2020673087", "Resources": "469231602" };

    let db = {}, curUser = '', curSub = '', sessionQs = [], curIdx = 0, sessionErrors = 0;
    let isSpellingMode = false, currentWriter = null, currentSpellWord = "", currentSpellCharIdx = 0;
    const synth = window.speechSynthesis;
    let voices = { en: null, zh: null };

    // --- 语音初始化 ---
    function loadVoices() {
        const vs = synth.getVoices();
        voices.en = vs.find(v => v.lang.startsWith('en') && v.name.includes('Google')) || vs.find(v => v.lang.startsWith('en')) || vs[0];
        voices.zh = vs.find(v => v.lang.includes('zh') && v.name.includes('Google')) || vs.find(v => v.lang.includes('zh')) || vs[0];
    }
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function playTTS(text, lang) {
        if (synth.speaking) synth.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.voice = lang === 'zh' ? voices.zh : voices.en;
        u.lang = lang === 'zh' ? 'zh-CN' : 'en-US';
        u.rate = 0.8;
        synth.speak(u);
    }

    function playSuccessSound() {
        const url = curUser === 'P3' ? SUCCESS_AUDIO_VALERIE : SUCCESS_AUDIO_VENESSA;
        const audio = new Audio(url);
        audio.play().catch(e => console.log("Audio play blocked or failed"));
    }

    // --- 回车键支持 ---
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (document.getElementById('quiz-screen').style.display === 'block') {
                if (document.getElementById('sub-btn').style.display !== 'none') checkAns();
                else if (document.getElementById('next-btn').style.display !== 'none') nextQ();
            } else if (document.getElementById('spelling-screen').style.display === 'block') {
                if (curSub === 'English' && document.getElementById('eng-sub-btn') && document.getElementById('eng-sub-btn').style.display !== 'none') checkEngTyping();
                else if (document.getElementById('spell-next-btn').style.pointerEvents === 'auto') nextSpellQ();
            }
        }
    });

    // --- 数据同步与初始化 ---
    async function init() {
        const now = new Date();
        const t2 = new Date(2026, 2, 23), t3 = new Date(2026, 5, 29), t4 = new Date(2026, 8, 14);
        const diff = (d1, d2) => Math.floor((d1 - d2) / 864e5);
        let term = "Term 1";
        if (now >= t4) term = `Term 4 Week ${Math.floor(diff(now, t4)/7) + 1}`;
        else if (now >= t3) term = `Term 3 Week ${Math.floor(diff(now, t3)/7) + 1}`;
        else if (now >= t2) term = `Term 2 Week ${Math.floor(diff(now, t2)/7) + 1}`;
        document.getElementById('school-term-display').innerText = `📅 ${now.toLocaleDateString('en-SG', {weekday:'short', month:'short', day:'numeric'})} | ${term}`;

        const loads = Object.entries(GIDS).map(([name, gid]) => new Promise(res => {
            Papa.parse(`https://docs.google.com/spreadsheets/d/e/2PACX-${SHEET_ID}/pub?gid=${gid}&single=true&output=csv&t=${Date.now()}`, {
                download: true, header: true, skipEmptyLines: 'greedy',
                complete: r => res({ name, data: r.data.map(row => { let n = {}; Object.keys(row).forEach(k => n[k.trim()] = row[k]); return n; }) }),
                error: () => res(null)
            });
        }));
        const results = await Promise.all(loads);
        results.forEach(r => { if(r) r.data.forEach(row => { 
            let g = (row.Grade || "").toUpperCase(); if(!g) return;
            if(!db[g]) db[g] = {}; if(!db[g][r.name]) db[g][r.name] = []; db[g][r.name].push(row);
        }); });
        document.getElementById('loading').style.display = 'none';
        showScreen('menu-screen');
    }

    function switchUser(g) {
        curUser = g;
        document.getElementById('btn-P3').className = g === 'P3' ? 'name-btn active' : 'name-btn';
        document.getElementById('btn-P1').className = g === 'P1' ? 'name-btn active' : 'name-btn';
        const list = document.getElementById('res-list'); list.innerHTML = '';
        if(db[g] && db[g]['Resources']) db[g]['Resources'].forEach(r => {
            const div = document.createElement('div'); div.style.marginBottom = '10px';
            div.innerHTML = `<b>• ${r.Title}</b>: ${r.Content}`;
            list.appendChild(div);
        });
    }

    function handleSubjectClick(s) {
        if (!curUser) { alert("Please select Valerie or Venessa first!"); return; }
        curSub = s; let pool = db[curUser][s];
        if (!pool) { alert("No questions yet!"); return; }
        let hasN = pool.some(q => q.Type !== 'SPELLING'), hasS = pool.some(q => q.Type === 'SPELLING');
        if (hasN && hasS) showScreen('mode-screen');
        else if (hasS) showTopicSelection(s, true);
        else showTopicSelection(s, false);
    }

    function showTopicSelection(s, isS) {
        curSub = s; isSpellingMode = isS;
        let pool = db[curUser][s].filter(q => isS ? q.Type === 'SPELLING' : q.Type !== 'SPELLING');
        let topics = [...new Set(pool.map(q => q.Topic || q.Lesson || ""))].filter(t => t);
        document.getElementById('topic-title').innerText = isS ? 'Select Spelling Topics' : 'Select Topics';
        document.getElementById('check-all').checked = false;
        const boxGrid = document.getElementById('topic-checkboxes'); boxGrid.innerHTML = '';
        topics.forEach(t => {
            const label = document.createElement('label'); 
            label.className = (t.includes('Spelling') ? 'checkbox-label vocab-list' : 'checkbox-label');
            const cb = document.createElement('input'); cb.type = 'checkbox'; cb.className = 'topic-cb'; cb.value = t;
            cb.onchange = () => label.classList.toggle('selected', cb.checked);
            label.appendChild(cb); label.appendChild(document.createTextNode(t));
            boxGrid.appendChild(label);
        });
        showScreen('topic-screen');
    }

    function toggleAllTopics(m) {
        document.querySelectorAll('.topic-cb').forEach(cb => { cb.checked = m.checked; cb.parentElement.classList.toggle('selected', m.checked); });
    }

    function goBackFromTopic() {
        let pool = db[curUser][curSub];
        if (pool.some(q=>q.Type==='SPELLING') && pool.some(q=>q.Type!=='SPELLING')) showScreen('mode-screen');
        else showScreen('menu-screen');
    }

    function startQuiz() {
        let sel = [...document.querySelectorAll('.topic-cb:checked')].map(cb => cb.value);
        if (!sel.length) { alert("Select at least one topic!"); return; }
        let pool = db[curUser][curSub].filter(q => (isSpellingMode ? q.Type === 'SPELLING' : q.Type !== 'SPELLING') && sel.includes(q.Topic || q.Lesson));
        curIdx = 0; sessionErrors = 0;
        if (isSpellingMode) {
            sessionQs = curSub === 'English' ? pool.sort(() => Math.random()-0.5) : pool;
            showScreen('spelling-screen'); renderSpelling();
        } else {
            sessionQs = pool.sort(() => Math.random()-0.5).slice(0, 7);
            showScreen('quiz-screen'); renderQ();
        }
    }

    function updateBar(id) {
        const bar = document.getElementById(id), len = sessionQs.length;
        const pct = len > 1 ? (curIdx / (len - 1)) * 100 : 100;
        let html = `<div class="milestone-fill" style="width:${pct}%"></div>`;
        for(let i=0; i<len; i++) html += `<div class="milestone ${i<curIdx?'done':i===curIdx?'active':''}">${i<curIdx?'⭐':i===curIdx?(isSpellingMode?'✍️':'🐼'):'☁️'}</div>`;
        bar.innerHTML = html;
    }

    // --- 听写逻辑 (修复轻声/跳动) ---
    function renderSpelling() {
        updateBar('spell-progress-bar');
        const q = sessionQs[curIdx];
        document.getElementById('spell-fb').innerText = '';
        const nextBtn = document.getElementById('spell-next-btn');
        nextBtn.style.background = '#e2e8f0'; nextBtn.style.pointerEvents = 'none';
        
        if (curSub === 'English') {
            currentSpellWord = q['Correct Answer'].toLowerCase();
            document.getElementById('spelling-pinyin').innerHTML = `<button class="tool-btn" style="color:#3b82f6;" onclick="playTTS(currentSpellWord, 'en')">🔊 Listen</button>`;
            document.getElementById('practice-pad-container').innerHTML = `
                <input type="text" id="eng-spell-input" class="ans-input" style="letter-spacing:2px; margin-bottom:15px;" placeholder="Type here..." autocomplete="off">
                <div style="display:flex; gap:10px; width:100%; justify-content:center;">
                    <button class="tool-btn" id="eng-hint-btn" onclick="showEngHint()">💡 Hint</button>
                    <button class="btn-action" id="eng-sub-btn" style="background:#1e293b; color:white; flex:none; width:150px;" onclick="checkEngTyping()">Submit</button>
                </div>
                <div id="eng-hint-area" style="display:none; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:15px;"></div>
            `;
            const area = document.getElementById('eng-hint-area');
            (currentSpellWord + "aei").split('').sort(()=>Math.random()-0.5).forEach(l => {
                area.innerHTML += `<button class="word-card-btn" onclick="document.getElementById('eng-spell-input').value+='${l}'">${l}</button>`;
            });
            setTimeout(() => { playTTS(currentSpellWord, 'en'); document.getElementById('eng-spell-input').focus(); }, 500);
        } else {
            currentSpellWord = q['Correct Answer'];
            let pyArr = q.Question.split(/\s+/), pyHtml = '';
            pyArr.forEach((p, i) => pyHtml += `<span class="pinyin-unit" id="py-${i}">${p}</span>`);
            document.getElementById('spelling-pinyin').innerHTML = pyHtml + `<button class="tool-btn" style="margin-left:15px;" onclick="playTTS(sessionQs[curIdx].Question, 'zh')">🔊</button>`;
            document.getElementById('practice-pad-container').innerHTML = `<div id="hanzi-practice-box" class="hanzi-practice-box"></div>`;
            currentSpellCharIdx = 0; startNextChar();
            setTimeout(() => playTTS(q.Question, 'zh'), 500);
        }
    }

    function showEngHint() { document.getElementById('eng-hint-area').style.display = 'flex'; document.getElementById('eng-hint-btn').style.display = 'none'; }

    function checkEngTyping() {
        const val = document.getElementById('eng-spell-input').value.trim().toLowerCase();
        const fb = document.getElementById('spell-fb');
        if (val === currentSpellWord) {
            fb.innerHTML = '<span style="color:#10b981;">✅ Excellent!</span>';
            document.getElementById('spell-next-btn').style.background = '#10b981';
            document.getElementById('spell-next-btn').style.pointerEvents = 'auto';
            document.getElementById('eng-sub-btn').style.display = 'none';
        } else {
            sessionErrors++; document.getElementById('eng-spell-input').classList.add('error-shake');
            setTimeout(()=>document.getElementById('eng-spell-input').classList.remove('error-shake'), 400);
        }
    }

    function startNextChar() {
        if (currentSpellCharIdx >= currentSpellWord.length) {
            document.getElementById('spell-next-btn').style.background = '#10b981';
            document.getElementById('spell-next-btn').style.pointerEvents = 'auto';
            return;
        }
        document.querySelectorAll('.pinyin-unit').forEach((el, i) => el.className = i===currentSpellCharIdx ? 'pinyin-unit active' : 'pinyin-unit');
        currentWriter = HanziWriter.create('hanzi-practice-box', currentSpellWord[currentSpellCharIdx], {
            width: 300, height: 300, padding: 15, showOutline: false, strokeColor: '#1e293b', drawingColor: '#3b82f6'
        });
        currentWriter.quiz({ onMistake: () => sessionErrors++, onComplete: () => { currentSpellCharIdx++; setTimeout(startNextChar, 500); } });
    }

    // --- 常规答题 ---
    function renderQ() {
        updateBar('progress-bar');
        const q = sessionQs[curIdx];
        document.getElementById('q-text').innerText = q.Question;
        const container = document.getElementById('input-container');
        if (q.Type === 'MCQ') {
            let opts = q.Options.split('/').map(o => o.trim());
            container.innerHTML = `<div class="mcq-list">${opts.map(o => `<button class="mcq-btn" onclick="selMCQ(this, '${o}')">${o}</button>`).join('')}</div><input type="hidden" id="ans-in">`;
        } else {
            container.innerHTML = `<input type="text" id="ans-in" class="ans-input" placeholder="Type answer..." autocomplete="off">`;
        }
        document.getElementById('fb-text').innerText = '';
        document.getElementById('sub-btn').style.display = 'block'; document.getElementById('next-btn').style.display = 'none';
        setTimeout(() => { if(document.getElementById('ans-in')) document.getElementById('ans-in').focus(); }, 100);
    }

    function selMCQ(btn, v) { document.querySelectorAll('.mcq-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); document.getElementById('ans-in').value = v; }

    function checkAns() {
        const input = document.getElementById('ans-in');
        const user = input.value.trim().toLowerCase();
        const correct = sessionQs[curIdx]['Correct Answer'].toLowerCase();
        const fb = document.getElementById('fb-text');
        if (user === correct) {
            fb.innerHTML = `<span style="color:#10b981;">✅ Correct!</span>`;
            document.getElementById('sub-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'flex';
        } else {
            sessionErrors++; fb.innerHTML = `<span style="color:#ef4444;">❌ Try again! Hint: ${correct}</span>`;
            input.classList.add('error-shake'); setTimeout(()=>input.classList.remove('error-shake'), 400);
        }
    }

    function nextQ() { if(curIdx < sessionQs.length-1) { curIdx++; renderQ(); } else finishQuiz(); }
    function nextSpellQ() { if(curIdx < sessionQs.length-1) { curIdx++; renderSpelling(); } else finishQuiz(); }

    function finishQuiz() {
        const target = isSpellingMode ? 'spelling-screen' : 'quiz-screen';
        if (sessionErrors <= 1) playSuccessSound();
        document.getElementById(target).innerHTML = `
            <div style="padding:40px 0; font-size:26px; font-weight:bold; color:#064e3b;">🎉 Great Job! You got <span class="magic-number">6~7</span>!</div>
            <button class="btn-action" style="background:#10b981; color:white; width:100%; height:60px;" onclick="location.reload()">Back to Menu</button>
        `;
    }

    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.style.display = 'none'); document.getElementById(id).style.display = 'block'; }
    function toggleDrawPad() {
        const p = document.getElementById('draw-panel'); 
        p.style.display = p.style.display === 'none' ? 'flex' : 'none';
        if (p.style.display === 'flex' && !ctx) {
            canvas = document.getElementById('pad'); ctx = canvas.getContext('2d');
            ctx.lineCap = 'round'; ctx.lineWidth = 3;
            const draw = (e) => { if(!drawing) return; e.preventDefault(); const r=canvas.getBoundingClientRect(); const t=e.touches?e.touches[0]:e; ctx.lineTo(t.clientX-r.left, t.clientY-r.top); ctx.stroke(); };
            canvas.onmousedown = (e) => { drawing=true; ctx.beginPath(); }; canvas.onmousemove = draw; window.onmouseup = () => drawing=false;
            canvas.ontouchstart = (e) => { drawing=true; ctx.beginPath(); }; canvas.ontouchmove = draw; canvas.ontouchend = () => drawing=false;
        }
    }

    init();
</script>
</body>
</html>
