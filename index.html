<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valerie & Venissa's Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0fdf4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #1f2937; }
        .container { background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 750px; text-align: center; }
        h1 { font-size: 42px; margin: 0 0 10px 0; color: #064e3b; } 
        .subtitle { color: #6b7280; font-size: 22px; margin-bottom: 30px; } 
        .screen { display: none; }
        
        .name-selector { display: flex; gap: 20px; justify-content: center; margin-bottom: 30px; }
        button.name-btn { font-size: 24px; font-weight: bold; padding: 15px 30px; border: 3px solid #e5e7eb; border-radius: 15px; cursor: pointer; background: #fff; transition: 0.2s; }
        button.name-btn.active { border-color: #059669; background: #d1fae5; color: #065f46; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        button.subject-btn { font-size: 26px; font-weight: bold; padding: 30px 16px; border: none; border-radius: 16px; cursor: pointer; color: #fff; transition: 0.2s; }
        button.subject-btn:hover { transform: translateY(-3px); opacity: 0.9; }
        
        .tools-area { border-top: 2px solid #e5e7eb; padding-top: 24px; }
        button.tool-btn { width: 100%; background: #f8fafc; border: 2px solid #cbd5e1; color: #475569; padding: 18px; font-size: 20px; font-weight: bold; border-radius: 12px; cursor: pointer; }
        
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .topic-badge { padding: 8px 20px; border-radius: 999px; font-size: 20px; font-weight: bold; background: #dbeafe; color: #1e40af; }
        .progress-text { font-size: 20px; font-weight: bold; color: #6b7280; }
        .question { font-size: 32px; font-weight: 500; margin-bottom: 32px; text-align: left; line-height: 1.4; }
        .options-mcq { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        button.option { font-size: 26px; padding: 20px; border: 3px solid #e5e7eb; border-radius: 12px; background: #fff; cursor: pointer; color: #374151; font-weight: bold; }
        button.option.correct { border-color: #10b981; background: #d1fae5; color: #065f46; }
        button.option.incorrect { border-color: #ef4444; background: #fee2e2; color: #991b1b; }
        input.text-input, textarea.text-input { font-size: 28px; padding: 16px; border: 3px solid #e5e7eb; border-radius: 12px; width: 100%; box-sizing: border-box; margin-bottom: 24px; }
        
        .feedback { font-size: 24px; min-height: 36px; margin-bottom: 24px; font-weight: bold; }
        .feedback.success { color: #10b981; } .feedback.error { color: #ef4444; } .feedback.info { color: #2563eb; background: #eff6ff; padding: 16px; border-radius: 12px; text-align: left;}
        
        .controls { display: flex; gap: 16px; }
        button.action-btn { flex: 1; background: #f3f4f6; color: #4b5563; border: none; padding: 18px; font-size: 22px; font-weight: bold; border-radius: 12px; cursor: pointer; }
        button.primary-btn { background: #111827; color: #fff; }
        button.success-btn { background: #10b981; color: white; } button.danger-btn { background: #ef4444; color: white; }

        .mistake-subject { margin-top: 24px; font-size: 26px; border-bottom: 3px solid #e5e7eb; padding-bottom: 8px; font-weight: bold; text-align: left; color: #0f172a;}
        .mistake-item { margin-top: 16px; font-size: 22px; background: #f8fafc; padding: 20px; border-radius: 12px; text-align: left; }
        .m-ans { color: #059669; font-weight: bold; margin-top: 12px; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="container">
    <div id="loading-screen" class="screen" style="display: flex; flex-direction: column; align-items: center; padding: 50px 0;">
        <h2>Connecting to Cloud...</h2>
        <p id="debug-info" style="color: #94a3b8; margin-top: 10px;"></p>
    </div>

    <div id="menu-screen" class="screen">
        <h1>Family Hub</h1>
        <div class="subtitle">Who is practicing today?</div>
        
        <div class="name-selector">
            <button id="btn-valerie" class="name-btn" onclick="selectChild('P3', 'Valerie')">Valerie (P3)</button>
            <button id="btn-venissa" class="name-btn" onclick="selectChild('P1', 'Venissa')">Venissa (P1)</button>
        </div>

        <div class="menu-grid" id="subject-grid"></div>
        <div class="tools-area"><button class="tool-btn" onclick="showMistakes()">🖨️ Review & Print Mistakes</button></div>
    </div>

    <div id="quiz-screen" class="screen no-print">
        <div class="header-area">
            <div id="topic-badge" class="topic-badge">Subject</div>
            <div id="progress-text" class="progress-text">1 of 5</div>
        </div>
        <div class="question" id="question-text">Question</div>
        <div id="dynamic-content"></div>
        <div class="feedback" id="feedback-text"></div>
        <div class="controls">
            <button class="action-btn" onclick="showScreen('menu-screen')">Exit</button>
            <button class="action-btn primary-btn" id="submit-btn" onclick="submitAnswer()">Submit</button>
            <button class="action-btn primary-btn" id="next-btn" style="display:none;" onclick="handleNext()">Next</button>
            <button class="action-btn danger-btn" id="self-wrong-btn" style="display:none;" onclick="logSelf(false)">Needs Work</button>
            <button class="action-btn success-btn" id="self-right-btn" style="display:none;" onclick="logSelf(true)">Correct!</button>
        </div>
    </div>

    <div id="end-screen" class="screen no-print">
        <div style="font-size: 80px; margin-bottom: 24px;">🎉</div>
        <h2 style="font-size: 40px;">Excellent!</h2>
        <p style="font-size: 24px; color: #64748b;">Practice finished.</p>
        <button class="action-btn primary-btn" style="width: 100%;" onclick="showScreen('menu-screen')">Back to Menu</button>
    </div>

    <div id="mistake-screen" class="screen">
        <div class="header-area no-print">
            <button class="action-btn" style="flex:none;" onclick="showScreen('menu-screen')">Back</button>
            <h2 style="margin:0;">Mistake Bank</h2>
            <div>
                <button class="action-btn" style="background:#ef4444; color:white;" onclick="clearMistakes()">Clear</button>
                <button class="action-btn" style="background:#10b981; color:white; margin-left:8px;" onclick="window.print()">Print</button>
            </div>
        </div>
        <div id="mistake-list"></div>
    </div>
</div>

<script>
    const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlpdRHnR9ybEHHgX6fouRI-vXOh8KQNLSjsbt0TYh9R3No_9i7QNv_4ELwJZJGQpTe3oZVXaZijaW4/pub?output=csv"; 
    const colors = ["#2563eb", "#059669", "#e11d48", "#d97706", "#7c3aed"];
    
    let cloudDB = {}, mistakeBank = {}; 
    let curGrade = '', curChild = '', curSub = '', curQ = null, ansed = false, qCnt = 1, sessionQs = [];

    try { let saved = localStorage.getItem('family_errs_final'); if (saved) mistakeBank = JSON.parse(saved); } catch(e) {}

    window.onload = function() {
        Papa.parse(GOOGLE_SHEET_CSV_URL, { 
            download: true, 
            header: true, 
            skipEmptyLines: true,
            complete: r => {
                parseCSV(r.data);
                showScreen('menu-screen');
                selectChild('P3', 'Valerie');
            }, 
            error: () => document.getElementById('debug-info').innerText = "Sync Error. Check 'Publish to Web'." 
        });
    };

    function parseCSV(rows) {
        cloudDB = {};
        rows.forEach(r => {
            const g = (r['Grade'] || "").trim();
            const s = (r['Subject'] || "").trim();
            if (!g || !s) return;
            if (!cloudDB[g]) cloudDB[g] = {}; if (!cloudDB[g][s]) cloudDB[g][s] = [];
            cloudDB[g][s].push({
                q: r['Question'].trim(),
                type: (r['Type'] || 'MCQ').trim().toUpperCase(),
                options: [r['Option A'], r['Option B'], r['Option C'], r['Option D']].filter(x => x && x.trim() !== ''),
                ans: r['Correct Answer'].trim()
            });
        });
    }

    function selectChild(grade, name) {
        curGrade = grade; curChild = name;
        document.getElementById('btn-valerie').classList.toggle('active', name === 'Valerie');
        document.getElementById('btn-venissa').classList.toggle('active', name === 'Venissa');
        renderSubjects();
    }

    function renderSubjects() {
        const grid = document.getElementById('subject-grid'); grid.innerHTML = '';
        if (!cloudDB[curGrade]) return;
        Object.keys(cloudDB[curGrade]).forEach((sub, i) => {
            let btn = document.createElement('button'); btn.className = 'subject-btn';
            btn.style.background = colors[i % colors.length]; btn.innerText = sub;
            btn.onclick = () => startQuiz(sub); grid.appendChild(btn);
        });
    }

    function startQuiz(sub) {
        curSub = sub; qCnt = 1; sessionQs = [];
        let mkKey = `${curGrade}_${sub}`;
        let mPool = shuffle(mistakeBank[mkKey] || []);
        for(let i=0; i<Math.min(2, mPool.length); i++) sessionQs.push(mPool[i]);
        let fPool = shuffle(cloudDB[curGrade][sub] || []);
        for(let q of fPool) { if(sessionQs.length >= 5) break; if(!sessionQs.some(x=>x.q===q.q)) sessionQs.push(q); }
        sessionQs = shuffle(sessionQs).slice(0, 5);
        showScreen('quiz-screen'); renderQ();
    }

    function renderQ() {
        ansed = false; document.getElementById('feedback-text').innerText = '';
        document.getElementById('submit-btn').style.display = 'block'; 
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('self-wrong-btn').style.display = 'none'; 
        document.getElementById('self-right-btn').style.display = 'none';
        curQ = sessionQs[qCnt - 1];
        document.getElementById('question-text').innerText = curQ.q;
        document.getElementById('topic-badge').innerText = curSub;
        document.getElementById('progress-text').innerText = `${qCnt} of ${sessionQs.length}`;
        const cont = document.getElementById('dynamic-content'); cont.innerHTML = ''; 
        if (curQ.type === 'MCQ') {
            document.getElementById('submit-btn').style.display = 'none';
            let div = document.createElement('div'); div.className = 'options-mcq';
            shuffle(curQ.options).forEach(o => {
                let btn = document.createElement('button'); btn.className = 'option'; btn.innerText = o; btn.value = o;
                btn.onclick = function() { processMCQ(this); }; div.appendChild(btn);
            });
            cont.appendChild(div);
        } else if (curQ.type === 'FITB') {
            cont.innerHTML = `<input type="text" id="fitb-input" class="text-input" placeholder="Type answer..." autocomplete="off">`;
            document.getElementById('fitb-input').addEventListener("keypress", e => { if(e.key==="Enter") submitAnswer(); });
        } else {
            document.getElementById('submit-btn').innerText = "Reveal Answer";
            cont.innerHTML = `<textarea id="open-input" class="text-input" placeholder="Explain here..."></textarea>`;
        }
    }

    function processMCQ(btn) {
        if(ansed) return; ansed = true;
        let fb = document.getElementById('feedback-text'); document.querySelectorAll('.option').forEach(b => b.disabled = true);
        if(btn.value === curQ.ans) { btn.classList.add('correct'); fb.innerText = "Correct!"; fb.className = 'feedback success'; logErr(false); } 
        else { btn.classList.add('incorrect'); document.querySelectorAll('.option').forEach(b=>{if(b.value===curQ.ans) b.classList.add('correct');}); fb.innerText = "Incorrect."; fb.className = 'feedback error'; logErr(true); }
        showNext();
    }

    function submitAnswer() {
        if(ansed) return;
        let fb = document.getElementById('feedback-text');
        if(curQ.type === 'FITB') {
            let v = document.getElementById('fitb-input').value.trim();
            if(!v) return; ansed = true; document.getElementById('fitb-input').disabled = true; document.getElementById('submit-btn').style.display = 'none';
            if(v.toLowerCase() === curQ.ans.toLowerCase()) { fb.innerText = "Correct!"; fb.className = 'feedback success'; logErr(false); } 
            else { fb.innerText = `Incorrect. Answer: ${curQ.ans}`; fb.className = 'feedback error'; logErr(true); }
            showNext();
        } else {
            ansed = true; document.getElementById('submit-btn').style.display = 'none';
            fb.innerHTML = `<div class="info"><strong>Ref Answer:</strong> ${curQ.ans}</div>`;
            document.getElementById('self-wrong-btn').style.display = 'block'; document.getElementById('self-right-btn').style.display = 'block';
        }
    }

    function logSelf(isCorrect) { document.getElementById('self-wrong-btn').style.display = 'none'; document.getElementById('self-right-btn').style.display = 'none'; logErr(!isCorrect); showNext(); }
    function logErr(isWrong) {
        let k = `${curGrade}_${curSub}`; if(!mistakeBank[k]) mistakeBank[k] = [];
        if(isWrong) { if(!mistakeBank[k].some(m=>m.q===curQ.q)) mistakeBank[k].push(curQ); } 
        else { mistakeBank[k] = mistakeBank[k].filter(m=>m.q!==curQ.q); }
        localStorage.setItem('family_errs_final', JSON.stringify(mistakeBank));
    }
    function showNext() { let b = document.getElementById('next-btn'); b.innerText = qCnt === sessionQs.length ? "Finish" : "Next"; b.style.display = 'block'; }
    function handleNext() { if(qCnt < sessionQs.length) { qCnt++; renderQ(); } else showScreen('end-screen'); }
    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.style.display = 'none'); document.getElementById(id).style.display = 'block'; }
    function shuffle(a) { let arr=[...a]; for(let i=arr.length-1; i>0; i--) { let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
    
    function showMistakes() {
        showScreen('mistake-screen');
        let list = document.getElementById('mistake-list'), cnt = 0; list.innerHTML = '';
        for(let k in mistakeBank) {
            if(mistakeBank[k].length > 0) {
                cnt += mistakeBank[k].length; let [g,s] = k.split('_');
                list.innerHTML += `<div class="mistake-subject">[${g}] ${s}</div>`;
                mistakeBank[k].forEach((m,i) => { list.innerHTML += `<div class="mistake-item"><strong>Q${i+1}:</strong> ${m.q}<div class="m-ans">Ans: ${m.ans}</div></div>`; });
            }
        }
        if(!cnt) list.innerHTML = '<div style="margin-top:40px; text-align:center; font-size:24px;">No mistakes!</div>';
    }
    function clearMistakes() { if(confirm("Clear mistakes?")) { mistakeBank={}; localStorage.removeItem('family_errs_final'); showMistakes(); } }
</script>
</body>
</html>
