<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Learning Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        :root { --primary: #10b981; --bg: #f8fafc; }
        
        * { box-sizing: border-box; }

        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; display: flex; flex-direction: column; align-items: center; min-height: 100dvh; position: relative; }
        
        /* 🌟 右下角的悬浮日期微标 */
        #school-term-display {
            position: absolute;
            bottom: 15px;
            right: 15px;
            font-size: 12px;
            color: #94a3b8;
            background: rgba(255, 255, 255, 0.7);
            padding: 5px 10px;
            border-radius: 10px;
            pointer-events: none;
            backdrop-filter: blur(5px);
        }

        .container { width: 100%; max-width: 600px; background: #fff; padding: 25px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; position: relative; overflow: hidden; margin-bottom: 40px; }
        .screen { display: none; width: 100%; }
        
        .magic-number { display: inline-block; font-size: 1.4em; color: #f59e0b; font-weight: 900; padding: 0 5px; animation: popPulse 1s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes popPulse { 0% { transform: scale(1); } 100% { transform: scale(1.2) translateY(-3px); } }
        
        /* 🌟 新增的副标题标语样式 */
        .subtitle-instruction { font-size: 14px; color: #64748b; margin-top: -5px; margin-bottom: 25px; font-weight: 500; }

        .name-selector { display: flex; gap: 15px; justify-content: center; margin: 25px 0; height: 60px; }
        button.name-btn { padding: 0 30px; height: 55px; border-radius: 16px; border: 3px solid #e2e8f0; background: white; cursor: pointer; font-weight: 700; font-size: 18px; transition: 0.2s; color: #475569; display: flex; align-items: center; justify-content: center; }
        button.name-btn.active { border-color: var(--primary); background: #d1fae5; color: #065f46; }
        
        .subject-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 15px; }
        button.sub-btn { flex: 1 1 40%; max-width: 45%; padding: 20px; border-radius: 16px; border: none; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button.sub-btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
        
        .checkbox-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; max-height: 250px; overflow-y: auto; padding: 5px; }
        .checkbox-label { display: flex; align-items: center; padding: 8px 12px; border-radius: 20px; border: 2px solid #e2e8f0; background: white; cursor: pointer; transition: 0.2s; font-size: 15px; font-weight: 500; color: #475569; user-select: none; }
        .checkbox-label.selected { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; font-weight: bold; }
        .checkbox-label.vocab-list { border-color: #d8b4fe; background: #faf5ff; color: #7e22ce; }
        .checkbox-label.vocab-list.selected { border-color: #9333ea; background: #e9d5ff; color: #6b21a8; }

        .bundle-label { width: 100%; justify-content: center; border-radius: 12px; border-width: 2px; border-style: dashed; padding: 10px; margin-top: 5px; }
        .bundle-label.selected { border-style: solid; }
        
        .action-row { display: flex; gap: 10px; margin-top: 15px; flex-direction: row; }

        .milestone-track { display: flex; justify-content: space-between; position: relative; margin: 15px 0 35px 0; padding: 0 5px; height: 40px; }
        .milestone-track::before { content: ''; position: absolute; top: 50%; left: 15px; right: 15px; height: 6px; background: #e2e8f0; transform: translateY(-50%); border-radius: 3px; }
        .milestone-fill { position: absolute; top: 50%; left: 15px; height: 6px; background: #10b981; transform: translateY(-50%); border-radius: 3px; transition: width 0.5s; }
        .milestone { width: 36px; height: 36px; background: #f8fafc; border: 3px solid #cbd5e1; border-radius: 50%; z-index: 2; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: 0.4s; }
        .milestone.done { border-color: #10b981; background: #d1fae5; }
        .milestone.active { border-color: #3b82f6; background: #eff6ff; font-size: 20px; transform: scale(1.2); }

        .q-text { font-size: 24px; text-align: left; margin: 25px 0; min-height: 36px; }
        input.ans-input { font-size: 26px; padding: 18px; width: 100%; border: 2px solid #e2e8f0; border-radius: 12px; outline: none; transition: 0.2s; text-align: center; font-weight: bold; letter-spacing: 1px; }
        input.ans-input:focus { border-color: #3b82f6; background: #f8faff; box-shadow: 0 0 10px rgba(59,130,246,0.1); }
        
        .mcq-list { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        button.mcq-btn { padding: 18px; border-radius: 12px; border: 2px solid #e2e8f0; background: white; font-size: 18px; cursor: pointer; text-align: left; transition: 0.2s; color: #1e293b; }
        button.mcq-btn.active { border-color: var(--primary); background: #d1fae5; font-weight: bold; color: #065f46; }

        .feedback { font-size: 18px; margin: 15px 0; min-height: 24px; font-weight: bold; }
        
        .controls { display: flex; gap: 10px; margin-top: 20px; height: 60px; align-items: stretch; }
        .btn-action { flex: 1; padding: 0 20px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .btn-action:active { transform: scale(0.98); }
        
        /* 糖果蓝 Submit 按钮 */
        #sub-btn, #eng-sub-btn { background: #3b82f6; color: white; box-shadow: 0 4px 10px rgba(59,130,246,0.2); }
        #sub-btn:hover, #eng-sub-btn:hover { background: #2563eb; }

        .pinyin-display { font-size: 36px; font-weight: bold; color: #64748b; margin: 5px 0 15px 0; min-height: 50px; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; }
        .pinyin-unit { margin: 0 8px; transition: 0.3s; }
        .pinyin-unit.active { color: #ea580c; transform: scale(1.1); text-decoration: underline; }
        
        .hanzi-practice-box { width: 280px; height: 280px; border: 3px solid #cbd5e1; border-radius: 16px; background: white; margin: 0 auto 15px auto; position: relative; }
        .word-card-btn { width: 55px; height: 65px; font-size: 30px; font-weight: bold; border: 2px solid #e2e8f0; border-radius: 12px; background: white; cursor: pointer; color: #1e293b; transition: 0.2s; }
        .word-card-btn:hover { border-color: #3b82f6; transform: translateY(-2px); }
        .tool-btn { background: white; border: 2px solid #e2e8f0; padding: 8px 15px; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; color: #475569; }
        
        @media (min-width: 768px) {
            .container { max-width: 750px; padding: 40px; }
            button.name-btn { padding: 0 45px; height: 65px; font-size: 24px; }
            .hanzi-practice-box { width: 320px; height: 320px; }
            .word-card-btn { width: 65px; height: 75px; font-size: 36px; }
            #school-term-display { font-size: 14px; bottom: 20px; right: 20px; padding: 8px 15px; }
        }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

<div id="school-term-display">Loading...</div>

<div class="container">
    <div id="loading" class="screen" style="display:block; padding: 50px 0; font-size: 18px; color: #64748b;">
        Syncing with Google Sheets... ⏳
    </div>

    <div id="menu-screen" class="screen">
        <h2 style="margin:0 0 5px 0; color:#0f172a;">Did you <span class="magic-number">6~7</span> today?</h2>
        <div class="subtitle-instruction">Get all questions correct or only 1 mistake to 6~7</div>
        
        <div class="name-selector">
            <button id="btn-P3" class="name-btn" onclick="switchUser('P3')">Valerie (P3)</button>
            <button id="btn-P1" class="name-btn" onclick="switchUser('P1')">Venessa (P1)</button>
        </div>
        
        <div id="subject-grid" class="subject-grid">
            <button class="sub-btn" style="background:#3b82f6;" onclick="handleSubjectClick('English')">English</button>
            <button class="sub-btn" style="background:#ec4899;" onclick="handleSubjectClick('Math')">Math</button>
            <button class="sub-btn" style="background:#a855f7;" onclick="handleSubjectClick('华文')">华文</button>
            <button class="sub-btn" style="background:#10b981;" onclick="handleSubjectClick('Science')">Science</button>
        </div>

        <div class="res-section" style="text-align:left; border-top: 2px dashed #e2e8f0; margin-top:20px; padding-top:10px;">
            <h3 style="color:#0f172a; margin-bottom: 10px;">Resources 📚</h3>
            <div id="res-list"></div>
        </div>
    </div>

    <div id="mode-screen" class="screen">
        <h2 style="margin-bottom:25px;">Select Mode</h2>
        <div style="display:flex; flex-direction:column; gap:15px;">
            <button class="btn-action" style="background:#3b82f6; color:white; height:70px;" onclick="showTopicSelection(curSub, false)">🚀 Start Practice</button>
            <button class="btn-action" style="background:linear-gradient(135deg, #f59e0b, #ea580c); color:white; height:70px;" onclick="showTopicSelection(curSub, true)">✍️ Spelling Game</button>
            <button class="btn-action" style="background:#f8fafc; color:#64748b; border:2px solid #e2e8f0; margin-top:10px; height:60px;" onclick="showScreen('menu-screen')">← Back</button>
        </div>
    </div>

    <div id="topic-screen" class="screen">
        <h2 id="topic-title">Select Topics</h2>
        <p id="topic-desc" style="color:#64748b; margin-bottom: 20px; font-size:14px;"></p>
        <div style="text-align: center; margin-bottom: 15px;">
            <label class="checkbox-label" id="check-all-label" style="display:inline-flex;">
                <input type="checkbox" id="check-all" onchange="toggleAllTopics(this)"> 🌟 Select All
            </label>
        </div>
        <div id="topic-checkboxes" class="checkbox-grid"></div>
        <div class="action-row">
            <button class="btn-action" style="background:#f8fafc; color:#64748b; border:2px solid #e2e8f0; flex:0.4; height:60px;" onclick="goBackFromTopic()">← Back</button>
            <button class="btn-action" style="background:#10b981; color:white; flex:0.6; height:60px;" onclick="startQuiz()">Start 🚀</button>
        </div>
    </div>

    <div id="quiz-screen" class="screen">
        <div id="progress-bar" class="milestone-track"></div>
        
        <div id="pad-toggle-container" style="display:flex; justify-content: space-between; align-items: center; margin-bottom:10px;">
            <button class="tool-btn" id="pad-btn" onclick="toggleDrawPad()">✍️ Pad</button>
            <div id="progress-text" style="font-size:14px; color:#94a3b8;"></div>
        </div>

        <div id="q-text" class="q-text"></div>
        <div id="draw-panel" style="display:none; flex-direction: column; align-items: center; margin-bottom:15px;">
            <canvas id="pad" width="300" height="200" style="background:#fff; border:1px solid #ddd; touch-action:none;"></canvas>
            <button class="tool-btn" style="margin-top:5px; width:100%;" onclick="ctx.clearRect(0,0,300,200)">Clear</button>
        </div>
        <div id="input-container" style="min-height: 100px;"></div>
        <div id="fb-text" class="feedback"></div>
        <div class="controls">
            <button class="btn-action" style="background:#f1f5f9; color:#475569;" onclick="location.reload()">Exit</button>
            <button id="sub-btn" class="btn-action" onclick="checkAns()">Submit</button>
            <button id="next-btn" class="btn-action" style="background:#10b981; color:white; display:none;" onclick="nextQ()">Next →</button>
        </div>
    </div>

    <div id="spelling-screen" class="screen">
        <div id="spell-progress-bar" class="milestone-track"></div>
        <div id="spelling-pinyin" class="pinyin-display"></div>
        <div id="practice-pad-container" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
        <div id="spell-fb" class="feedback"></div>
        <div class="controls">
            <button class="btn-action" style="background:#f1f5f9; color:#475569; flex:0.3;" onclick="location.reload()">Exit</button>
            <button id="spell-next-btn" class="btn-action" style="background:#e2e8f0; color:#94a3b8; flex:0.7; pointer-events:none;" onclick="nextSpellQ()">Next →</button>
        </div>
    </div>

</div>

<script>
    // ==========================================
    // 🎵 专属欢呼语音 Base64 配置区
    // ==========================================
    // 请把你转换好的 "data:audio/mp3;base64,AAAA..." 字符串完整填入下面的双引号中！
    const BASE64_VALERIE = ""; 
    const BASE64_VENESSA = ""; 
    // ==========================================

    const SHEET_ID = "1vQlpdRHnR9ybEHHgX6fouRI-vXOh8KQNLSjsbt0TYh9R3No_9i7QNv_4ELwJZJGQpTe3oZVXaZijaW4";
    const GIDS = { "English": "1893311738", "Math": "59294467", "Science": "1581471994", "华文": "2020673087", "Resources": "469231602" };

    let db = {}, curUser = '', curSub = '', sessionQs = [], curIdx = 0, sessionErrors = 0;
    let isSpellingMode = false, currentWriter = null, currentSpellWord = "", currentSpellCharIdx = 0;
    let pinyinArray = [];
    
    const synth = window.speechSynthesis;
    let bestEngVoice = null;

    function loadVoices() {
        const vs = synth.getVoices();
        bestEngVoice = vs.find(v => v.name.includes('Google') && v.lang.startsWith('en')) || vs.find(v => v.lang.startsWith('en')) || vs[0];
    }
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function playTTS(text) {
        if (synth.speaking) synth.cancel();
        const u = new SpeechSynthesisUtterance(text);
        if (bestEngVoice) u.voice = bestEngVoice;
        u.lang = 'en-US'; 
        u.rate = 0.8; u.volume = 1;
        synth.speak(u);
    }

    // --- 回车键全局监听 ---
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (document.getElementById('quiz-screen').style.display === 'block') {
                if (document.getElementById('sub-btn').style.display !== 'none') { e.preventDefault(); checkAns(); }
                else if (document.getElementById('next-btn').style.display !== 'none') { e.preventDefault(); nextQ(); }
            } else if (document.getElementById('spelling-screen').style.display === 'block') {
                if (curSub === 'English' && document.getElementById('eng-sub-btn') && document.getElementById('eng-sub-btn').style.display !== 'none') { e.preventDefault(); checkEngTyping(); }
                else if (document.getElementById('spell-next-btn').style.pointerEvents === 'auto') { e.preventDefault(); nextSpellQ(); }
            }
        }
    });

    let canvas, ctx, drawing = false;
    function initDrawPad() {
        canvas = document.getElementById('pad'); ctx = canvas.getContext('2d');
        ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 4; ctx.strokeStyle = '#1e293b';
        const start = (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); };
        const move = (e) => { if (!drawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
        const stop = () => { drawing = false; };
        const getPos = (e) => { const r = canvas.getBoundingClientRect(); const t = e.touches ? e.touches[0] : e; return { x: t.clientX - r.left, y: t.clientY - r.top }; };
        canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
        canvas.addEventListener('touchstart', start, {passive:false}); canvas.addEventListener('touchmove', move, {passive:false}); canvas.addEventListener('touchend', stop);
    }
    function clearPad() { ctx.clearRect(0,0,canvas.width,canvas.height); }
    function toggleDrawPad() {
        const p = document.getElementById('draw-panel');
        p.style.display = p.style.display === 'none' ? 'flex' : 'none';
        if (p.style.display === 'flex' && !canvas) initDrawPad();
    }

    // 🌟 核心：更强壮的数据拉取与重试机制
    async function init() {
        const now = new Date();
        const t2 = new Date(2026, 2, 23), t3 = new Date(2026, 5, 29), t4 = new Date(2026, 8, 14);
        const diff = (d1, d2) => Math.floor((d1 - d2) / 864e5);
        let term = "Term 1";
        if (now >= t4) { const w = Math.floor(diff(now, t4)/7) + 1; term = w <= 10 ? `Term 4 Week ${w}` : "December Holiday"; }
        else if (now >= t3) { const w = Math.floor(diff(now, t3)/7) + 1; term = w <= 10 ? `Term 3 Week ${w}` : "September Holiday"; }
        else if (now >= t2) { const w = Math.floor(diff(now, t2)/7) + 1; term = w <= 10 ? `Term 2 Week ${w}` : "June Holiday"; }
        
        const dateStr = now.toLocaleDateString('en-SG', {weekday:'short', month:'short', day:'numeric'});
        document.getElementById('school-term-display').innerText = `📅 ${dateStr} | ${term}`;

        try {
            const loads = Object.entries(GIDS).map(([name, gid]) => new Promise((res, rej) => {
                Papa.parse(`https://docs.google.com/spreadsheets/d/e/2PACX-${SHEET_ID}/pub?gid=${gid}&single=true&output=csv&t=${Date.now()}`, {
                    download: true, header: true, skipEmptyLines: 'greedy',
                    complete: r => res({ name, data: r.data.map(row => { let n = {}; Object.keys(row).forEach(k => n[k.trim()] = row[k]); return n; }) }),
                    error: (err) => { console.error(`Failed loading ${name}:`, err); res(null); }
                });
            }));
            
            const results = await Promise.all(loads);
            db = {};
            let hasData = false;
            
            results.forEach(r => { 
                if(r && r.data) {
                    r.data.forEach(row => { 
                        let g = (row.Grade || "").toUpperCase(); if(!g) return;
                        if(!db[g]) db[g] = {}; if(!db[g][r.name]) db[g][r.name] = []; db[g][r.name].push(row);
                        hasData = true;
                    }); 
                }
            });
            
            if (!hasData) throw new Error("No data parsed from Google Sheets");
            
            document.getElementById('loading').style.display = 'none';
            showScreen('menu-screen');
            
        } catch (error) {
            console.error("Initialization error:", error);
            document.getElementById('loading').innerHTML = `
                <div style="color:#ef4444; margin-bottom:10px;">⚠️ Connection Error</div>
                <div style="font-size:14px; color:#64748b;">Please check your internet connection and refresh the page.</div>
                <button class="tool-btn" style="margin-top:15px;" onclick="location.reload()">🔄 Refresh</button>
            `;
        }
    }

    function switchUser(g) {
        curUser = g;
        document.getElementById('btn-P3').className = g === 'P3' ? 'name-btn active' : 'name-btn';
        document.getElementById('btn-P1').className = g === 'P1' ? 'name-btn active' : 'name-btn';
        const list = document.getElementById('res-list'); list.innerHTML = '';
        if(db[g] && db[g]['Resources']) db[g]['Resources'].forEach(r => {
            const div = document.createElement('div'); div.className = 'res-card';
            div.innerHTML = r.Type === 'IMAGE' ? `<b>${r.Title}</b><img src="${r.Content}" style="width:100%;margin-top:10px;border-radius:8px;">` : `<b>${r.Title}</b><p style="margin:5px 0 0 0;">${r.Content}</p>`;
            list.appendChild(div);
        });
    }

    function getSortWeight(str) {
        const numMatch = str.match(/\d+/); if (numMatch) return parseInt(numMatch[0]);
        const cnNums = { "十": 10, "九": 9, "八": 8, "七": 7, "六": 6, "五": 5, "四": 4, "三": 3, "二": 2, "一": 1 };
        for (let key in cnNums) { if (str.includes(key)) return cnNums[key]; }
        return 999;
    }

    function handleSubjectClick(s) {
        if (!curUser) { alert("Please select Valerie or Venessa first!"); return; }
        
        if (!db[curUser] || !db[curUser][s] || db[curUser][s].length === 0) { 
            alert(s === '华文' ? "题库里暂时还没有这科的题目哦！" : "No questions available for this subject yet!"); 
            return; 
        }
        
        curSub = s; let pool = db[curUser][s];
        let hasNormal = pool.some(q => (q.Type||"").toUpperCase() !== 'SPELLING');
        let hasSpelling = pool.some(q => (q.Type||"").toUpperCase() === 'SPELLING');

        if (hasNormal && hasSpelling) {
            const isCN = (s === '华文');
            document.getElementById('mode-title').innerText = isCN ? '请选择练习模式' : 'Select Practice Mode';
            document.getElementById('mode-screen').style.display = 'block';
            document.getElementById('menu-screen').style.display = 'none';
        } 
        else if (hasSpelling) showTopicSelection(s, true);
        else showTopicSelection(s, false);
    }

    function showTopicSelection(s, isS) {
        curSub = s; isSpellingMode = isS; let pool = db[curUser][s];
        pool = pool.filter(q => {
            let type = (q.Type || "").toString().trim().toUpperCase();
            return isSpellingMode ? (type === 'SPELLING') : (type !== 'SPELLING');
        });

        let topics = new Set();
        pool.forEach(q => { let t = (q.Topic || q.topic || q.Lesson || "").toString().trim(); if (t !== "") topics.add(t); });

        const isCN = (s === '华文');
        document.getElementById('topic-title').innerText = isSpellingMode ? (isCN ? '你要听写哪里的内容？' : 'Select Spelling Topics') : (isCN ? '你要复习哪里的内容？' : 'Select Practice Topics');
        document.getElementById('topic-desc').innerText = isCN ? `（至少选择一项）` : `Choose the topics you want to practice.`;
        document.getElementById('check-all-text').innerText = isCN ? '🌟 全选 (Select All)' : '🌟 Select All';
        document.getElementById('check-all').checked = false;
        
        let topicsArr = Array.from(topics).sort((a, b) => getSortWeight(a) - getSortWeight(b));
        let maxWeight = 0; topicsArr.forEach(t => { let w = getSortWeight(t); if(w < 999 && w > maxWeight) maxWeight = w; });

        let renderItems = []; let bundledTopics = new Set();
        if (isCN) {
            if (maxWeight > 5) { let t1 = topicsArr.filter(t => getSortWeight(t) >= 1 && getSortWeight(t) <= 5); if (t1.length > 0) { renderItems.push({ label: "🎒 第一学段 (第1-5课)", values: t1, isBundle: true }); t1.forEach(t => bundledTopics.add(t)); } }
            if (maxWeight > 10) { let t2 = topicsArr.filter(t => getSortWeight(t) >= 6 && getSortWeight(t) <= 10); if (t2.length > 0) { renderItems.push({ label: "🎒 第二学段 (第6-10课)", values: t2, isBundle: true }); t2.forEach(t => bundledTopics.add(t)); } }
        }
        topicsArr.forEach(t => { if (!bundledTopics.has(t)) { renderItems.push({ label: `${t}`, values: [t], isBundle: false }); } });

        const boxGrid = document.getElementById('topic-checkboxes'); boxGrid.innerHTML = '';
        renderItems.forEach(item => {
            let isVocabList = /^Spelling \d+/.test(item.label) || item.label.includes("Spelling ");
            let baseClass = item.isBundle ? 'checkbox-label bundle-label' : 'checkbox-label';
            if (isVocabList) baseClass += ' vocab-list';

            const label = document.createElement('label'); label.className = baseClass;
            const cb = document.createElement('input'); cb.type = 'checkbox'; cb.value = JSON.stringify(item.values); cb.className = 'topic-cb';
            cb.checked = false;
            cb.onchange = () => { label.className = cb.checked ? baseClass + ' selected' : baseClass.replace('selected', '').trim(); syncCheckAll(); };
            label.appendChild(cb); label.appendChild(document.createTextNode(item.label));
            boxGrid.appendChild(label);
        });

        showScreen('topic-screen');
    }

    function toggleAllTopics(master) {
        document.querySelectorAll('.topic-cb').forEach(cb => { 
            cb.checked = master.checked; 
            let p = cb.parentElement.className; 
            cb.parentElement.className = master.checked ? (p.includes('selected') ? p : p + ' selected') : p.replace('selected', '').trim(); 
        });
    }
    
    function syncCheckAll() {
        const allChecked = Array.from(document.querySelectorAll('.topic-cb')).every(cb => cb.checked);
        document.getElementById('check-all').checked = allChecked; document.getElementById('check-all-label').className = allChecked ? 'checkbox-label selected' : 'checkbox-label';
    }

    function goBackFromTopic() {
        let pool = db[curUser][curSub];
        let hasNormal = pool.some(q => (q.Type||"").toUpperCase() !== 'SPELLING');
        let hasSpelling = pool.some(q => (q.Type||"").toUpperCase() === 'SPELLING');
        if (hasNormal && hasSpelling) showScreen('mode-screen'); else showScreen('menu-screen');
    }

    function startQuiz() {
        let pool = db[curUser][curSub];
        const selectedJSONs = Array.from(document.querySelectorAll('.topic-cb:checked')).map(cb => cb.value);
        if (selectedJSONs.length === 0) { alert(curSub === '华文' ? "请至少选择一项进行练习哦！" : "Please select at least one topic!"); return; }
        
        let selectedTopics = [];
        selectedJSONs.forEach(j => { selectedTopics = selectedTopics.concat(JSON.parse(j)); });
        
        pool = pool.filter(q => {
            let t = (q.Topic || q.topic || q.Lesson || "").toString().trim();
            let type = (q.Type || "").toString().trim().toUpperCase();
            let modeMatch = isSpellingMode ? (type === 'SPELLING') : (type !== 'SPELLING');
            return selectedTopics.includes(t) && modeMatch;
        });

        curIdx = 0; sessionErrors = 0; document.getElementById('draw-panel').style.display = 'none';

        // 根据科目显示或隐藏草稿板
        const padToggle = document.getElementById('pad-toggle-container');
        if (padToggle) padToggle.style.display = (curSub === 'Math') ? 'none' : 'flex';

        if (isSpellingMode) {
            if (curSub === 'English') sessionQs = pool.sort(() => 0.5 - Math.random());
            else sessionQs = pool;
            showScreen('spelling-screen'); renderSpelling();
        } else {
            let grabCount = Math.min(pool.length, 7);
            sessionQs = pool.sort(() => 0.5 - Math.random()).slice(0, grabCount);
            showScreen('quiz-screen'); renderQ();
        }
    }

    function updateProgress(barId) {
        const bar = document.getElementById(barId);
        const len = sessionQs.length; const pct = len > 1 ? (curIdx / (len - 1)) * 100 : 100;
        let activeIcon = isSpellingMode ? '✍️' : (curSub === '华文' ? '🐼' : (curSub === 'Science' ? '🌱' : (curSub === 'Math' ? '🔢' : '🚀')));
        
        if (isSpellingMode && len > 10) {
            bar.innerHTML = `<div class="milestone-fill" style="width: ${pct}%; transition: width 0.3s;"></div>
                             <div style="position:absolute; right:0; top:-25px; font-weight:bold; color:#10b981;">${curIdx + 1} / ${len}</div>`;
            return;
        }

        let html = `<div class="milestone-fill" style="width: ${pct}%"></div>`;
        for(let i=0; i<len; i++) {
            let cls = 'milestone' + (i < curIdx ? ' done' : (i === curIdx ? ' active' : ''));
            html += `<div class="${cls}">${i < curIdx ? '⭐' : (i === curIdx ? activeIcon : '☁️')}</div>`;
        }
        bar.innerHTML = html;
    }

    function renderSpelling() {
        updateProgress('spell-progress-bar');
        const q = sessionQs[curIdx];
        document.getElementById('spell-fb').innerText = '';
        const nextBtn = document.getElementById('spell-next-btn');
        nextBtn.style.background = '#e2e8f0'; nextBtn.style.pointerEvents = 'none';

        if (curSub === 'English') renderEnglishSpelling(q);
        else renderChineseSpelling(q);
    }

    function renderEnglishSpelling(q) {
        currentSpellWord = (q['Correct Answer'] || "").toString().trim().toLowerCase();
        
        document.getElementById('spelling-pinyin').innerHTML = `
            <button class="tool-btn" style="font-size:24px; padding:12px 25px; border-color:#3b82f6; color:#3b82f6; background:#eff6ff; border-radius:16px; box-shadow:0 4px 6px rgba(59,130,246,0.2);" onclick="playTTS('${currentSpellWord}')">
                🔊 Listen & Spell
            </button>`;
        
        let letters = currentSpellWord.split('');
        const alpha = "abcdefghijklmnopqrstuvwxyz";
        letters.push(alpha[Math.floor(Math.random() * alpha.length)]);
        letters.push(alpha[Math.floor(Math.random() * alpha.length)]);
        letters.sort(() => Math.random() - 0.5);
        
        let btnsHtml = '';
        letters.forEach((l, idx) => {
            btnsHtml += `<button class="word-card-btn" onclick="document.getElementById('eng-spell-input').value+='${l}';">${l}</button>`;
        });
        
        const container = document.getElementById('practice-pad-container');
        container.style.display = 'flex';
        // 防挡设计：上移输入框
        container.innerHTML = `
            <input type="text" id="eng-spell-input" class="ans-input" style="text-align:center; font-size:32px; text-transform:lowercase; font-weight:bold; letter-spacing:2px; padding:20px; width:100%; max-width:350px;" autocomplete="off" spellcheck="false" placeholder="Type here..." onfocus="this.scrollIntoView({behavior: 'smooth', block: 'center'})" />
            <div style="display:flex; gap:10px; width:100%; max-width:350px; margin-top:15px; height:55px;">
                <button class="tool-btn" id="eng-hint-btn" style="flex:0.3; background:#fffbeb; color:#d97706; border-color:#fde68a;" onclick="showEngHint()">💡 Hint</button>
                <button class="btn-action" id="eng-sub-btn" style="flex:0.7; margin:0;" onclick="checkEngTyping()">Submit</button>
            </div>
            <div id="eng-hint-area" style="display:none; flex-wrap:wrap; gap:8px; justify-content:center; width:100%; margin-top:15px;">
                ${btnsHtml}
            </div>
        `;
        
        setTimeout(() => playTTS(currentSpellWord), 600);
        // 在宽屏设备上才自动聚焦，防止平板键盘乱弹
        if(window.innerWidth > 800) { setTimeout(() => document.getElementById('eng-spell-input').focus(), 700); }
    }

    function showEngHint() {
        document.getElementById('eng-hint-area').style.display = 'flex';
        document.getElementById('eng-hint-btn').style.display = 'none';
    }

    function checkEngTyping() {
        const inp = document.getElementById('eng-spell-input');
        if(inp.value.trim().toLowerCase() === currentSpellWord) {
            inp.style.borderColor = '#10b981'; inp.style.color = '#10b981'; inp.disabled = true;
            document.getElementById('eng-sub-btn').style.display = 'none';
            if (document.getElementById('eng-hint-btn')) document.getElementById('eng-hint-btn').style.display = 'none';
            if (document.getElementById('eng-hint-area')) document.getElementById('eng-hint-area').style.display = 'none';
            
            playTTS("Excellent!");
            const nextBtn = document.getElementById('spell-next-btn');
            nextBtn.style.background = '#10b981'; nextBtn.style.color = 'white'; nextBtn.style.pointerEvents = 'auto';
        } else {
            sessionErrors++;
            inp.classList.add('error-shake');
            inp.style.borderColor = '#ef4444'; inp.style.color = '#ef4444'; inp.style.background = '#fef2f2';
            setTimeout(() => {
                inp.classList.remove('error-shake');
                inp.style.borderColor = '#e2e8f0'; inp.style.color = '#1e293b'; inp.style.background = 'white';
            }, 400);
        }
    }

    function renderChineseSpelling(q) {
        currentSpellWord = (q['Correct Answer'] || "").toString().trim();
        pinyinArray = q.Question.trim().split(/\s+/);
        currentSpellCharIdx = 0;
        
        let pinyinHtml = '<div style="display:flex; gap:5px; justify-content:center; align-items:center; flex-wrap:wrap;">';
        let pyIndex = 0;
        for (let i = 0; i < currentSpellWord.length; i++) {
            let char = currentSpellWord[i];
            if (!/[，。！？、：；（）《》“”]/u.test(char)) {
                let py = pinyinArray[pyIndex] || "";
                pinyinHtml += `<span class="pinyin-unit" id="py-idx-${i}">${py}</span>`;
                pyIndex++;
            }
        }
        pinyinHtml += '</div>';

        document.getElementById('spelling-pinyin').innerHTML = pinyinHtml;
        
        const container = document.getElementById('practice-pad-container');
        container.style.display = 'flex';
        container.innerHTML = `<div id="hanzi-practice-box" class="hanzi-practice-box"></div>`;
        
        startNextChar();
    }

    function startNextChar() {
        while(currentSpellCharIdx < currentSpellWord.length && /[，。！？、：；（）《》“”]/u.test(currentSpellWord[currentSpellCharIdx])) { currentSpellCharIdx++; }

        if (currentSpellCharIdx >= currentSpellWord.length) {
            document.querySelectorAll('span[id^="py-idx-"]').forEach(el => {
                el.style.color = '#10b981'; el.style.fontWeight = 'bold'; el.style.transform = 'scale(1)'; el.style.textDecoration = 'none';
            });
            const nextBtn = document.getElementById('spell-next-btn');
            nextBtn.style.background = '#10b981'; nextBtn.style.color = 'white'; nextBtn.style.pointerEvents = 'auto';
            if (currentWriter) { currentWriter.cancelQuiz(); currentWriter = null; }
            return;
        }

        document.querySelectorAll('span[id^="py-idx-"]').forEach(el => {
            el.style.color = '#cbd5e1'; el.style.fontWeight = 'normal'; el.style.transform = 'scale(1)'; el.style.textDecoration = 'none';
        });
        let curPy = document.getElementById(`py-idx-${currentSpellCharIdx}`);
        if (curPy) { curPy.classList.add('active'); }

        let char = currentSpellWord[currentSpellCharIdx];
        const box = document.getElementById('hanzi-practice-box');
        box.innerHTML = ''; 
        let boxSize = document.body.clientWidth < 400 ? 250 : 280;
        
        currentWriter = HanziWriter.create('hanzi-practice-box', char, {
            width: boxSize, height: boxSize, padding: 15,
            showOutline: false, strokeAnimationSpeed: 1, delayBetweenStrokes: 50,
            strokeColor: '#1e293b', drawingColor: '#3b82f6', showCharacter: false
        });

        currentWriter.quiz({
            onMistake: function() { sessionErrors++; },
            onComplete: function() { 
                currentSpellCharIdx++;
                setTimeout(() => startNextChar(), 500); 
            }
        });
    }

    function nextSpellQ() {
        if(synth.speaking) synth.cancel();
        if(curIdx < sessionQs.length - 1) { curIdx++; renderSpelling(); } 
        else { finishQuiz(); }
    }

    function renderQ() {
        updateProgress('progress-bar'); 
        if(ctx && canvas) clearPad();
        const q = sessionQs[curIdx]; const isCN = (curSub === '华文');
        document.getElementById('q-text').innerText = q.Question;
        const container = document.getElementById('input-container');
        const qType = (q.Type || "").toString().trim().toUpperCase();
        
        if (qType === 'OPEN') {
            container.innerHTML = `<textarea id="ans-in" class="ans-input" rows="5" placeholder="${isCN ? '在此输入你的完整答案...' : 'Type your full answer here...'}"></textarea>`;
        } else if (qType === 'MCQ') {
            const opts = (q.Options || q.options || "").toString().split('/').map(o => o.trim()).filter(o => o);
            let html = `<div class="mcq-list">`;
            opts.forEach(opt => { html += `<button class="mcq-btn" onclick="selectMCQ(this, '${opt.replace(/'/g, "\\'").replace(/"/g, "&quot;")}')">${opt}</button>`; });
            html += `</div><input type="hidden" id="ans-in" value="">`;
            container.innerHTML = html;
        } else {
            container.innerHTML = `<input type="text" id="ans-in" class="ans-input" placeholder="${isCN ? '在此输入答案...' : 'Type answer here...'}" autocomplete="off" onfocus="this.scrollIntoView({behavior: 'smooth', block: 'center'})">`;
        }
        document.getElementById('fb-text').innerText = '';
        document.getElementById('sub-btn').style.display = 'flex'; document.getElementById('next-btn').style.display = 'none';
        if(window.innerWidth > 800) { setTimeout(() => { if(document.getElementById('ans-in')) document.getElementById('ans-in').focus(); }, 100); }
    }

    function selectMCQ(btn, val) {
        if(document.getElementById('sub-btn').style.display === 'none') return; 
        document.querySelectorAll('.mcq-btn').forEach(b => { b.classList.remove('active'); b.classList.remove('error'); });
        btn.classList.add('active'); document.getElementById('ans-in').value = val;
    }

    // 这里包含 Gemini API 判断，确保功能完整
    async function checkAns() {
        const input = document.getElementById('ans-in');
        const user = input.value.trim().toLowerCase();
        const correctRaw = (sessionQs[curIdx]['Correct Answer'] || "").toString().trim();
        const fb = document.getElementById('fb-text');
        const qType = (sessionQs[curIdx]['Type'] || "").toString().trim().toUpperCase();
        const isCN = (curSub === '华文');
        
        if(user === "") { if(qType === 'MCQ') alert(isCN ? "请选择一个选项！" : "Please select an option!"); return; }

        const showNextState = () => {
            input.disabled = true; document.getElementById('sub-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'flex';
        };

        // 处理开放题 AI 判卷
        if (qType === 'OPEN') {
            if (GEMINI_API_KEY && GEMINI_API_KEY !== "YOUR_API_KEY_HERE") {
                fb.innerHTML = `<span style="color:#3b82f6; font-size: 16px;">⏳ ${isCN ? "老师正在看你的答案..." : "Teacher is reading your answer..."}</span>`;
                try {
                    const promptText = `You are a primary school teacher. Question: ${sessionQs[curIdx].Question}. Standard Answer: ${correctRaw}. Student Answer: ${user}. Evaluate meaning. Reply JSON: {"correct": boolean, "comment": "encouraging feedback in ${isCN ? 'Simplified Chinese' : 'English'}"}`;
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                    });
                    const data = await res.json();
                    let aiRes = data.candidates[0].content.parts[0].text.replace(/```json/g, '').replace(/```/g, '').trim();
                    const result = JSON.parse(aiRes);
                    if (result.correct) fb.innerHTML = `<span style="color:#10b981;">✅ ${isCN ? "答对啦！" : "Excellent!"}</span><br><span style="font-size:16px; color:#475569;">${result.comment}</span>`;
                    else { sessionErrors++; fb.innerHTML = `<span style="color:#ef4444;">❌ ${isCN ? "还差一点点。" : "Not quite right."}</span><br><span style="font-size:16px; color:#475569;">${result.comment}</span><br><br><span style="color:#0f172a; font-size: 15px;"><b>${isCN ? "参考答案：" : "Standard Answer:"}</b> ${correctRaw}</span>`; }
                } catch (e) { fb.innerHTML = `<span style="color:#0f172a;"><b>${isCN ? "参考答案：" : "Suggested Answer:"}</b></span><br><span style="font-size:18px; color:#10b981;">${correctRaw}</span><br><span style="font-size:14px; color:#64748b;">${isCN ? "(只需意思相近即可)" : "(Check if your meaning is similar)"}</span>`; }
            } else {
                fb.innerHTML = `<span style="color:#0f172a;"><b>${isCN ? "参考答案：" : "Suggested Answer:"}</b></span><br><span style="font-size:18px; color:#10b981;">${correctRaw}</span><br><span style="font-size:14px; color:#64748b;">${isCN ? "(只需意思相近即可)" : "(Check if your meaning is similar)"}</span>`;
            }
            showNextState(); return;
        }

        // 常规题判断
        if(user === correctRaw.toLowerCase()) {
            fb.innerHTML = `<span style="color:#10b981;">${isCN ? "✅ 答对啦！非常棒。" : "✅ Correct! Well done."}</span>`;
            showNextState();
            if (qType === 'MCQ') { document.querySelectorAll('.mcq-btn').forEach(b => { if(!b.classList.contains('active')) b.style.opacity = '0.5'; }); } 
            else { input.className = 'ans-input'; }
        } else {
            sessionErrors++; 
            if (qType === 'MCQ') {
                fb.innerHTML = `<span style="color:#ef4444;">${isCN ? "❌ 不对哦，试试其他选项！" : "❌ Not quite. Try another option!"}</span>`;
                const activeBtn = document.querySelector('.mcq-btn.active');
                if(activeBtn) { activeBtn.classList.remove('active'); activeBtn.classList.add('error'); }
                input.value = ''; 
            } else {
                fb.innerHTML = `<span style="color:#ef4444;">${isCN ? "❌ 拼写不对哦，请检查一下！" : "❌ Not quite. Check your spelling!"}</span><br><span style="font-size:15px; color:#64748b;">${isCN ? "提示：" : "Hint: "}<b>${correctRaw}</b></span>`;
                input.className = 'ans-input error-shake';
                setTimeout(() => { input.className = 'ans-input'; input.style.backgroundColor = '#fef2f2'; input.select(); }, 300);
            }
        }
    }

    function nextQ() {
        if(curIdx < sessionQs.length - 1) { curIdx++; renderQ(); } 
        else { finishQuiz(); }
    }

    // 🌟 终极音频触发点
    function finishQuiz() {
        const isCN = (curSub === '华文');
        document.querySelectorAll('.milestone-track').forEach(el => el.style.display = 'none');
        document.getElementById('draw-panel').style.display = 'none';
        
        let msg = ""; let magic67 = `<span class="magic-number">6~7</span>`; 
        
        if (sessionErrors <= 1) {
            msg = isCN ? `🎉 恭喜你，获得了 ${magic67} 的好成绩！太棒了！` : `🎉 Congratulations, you've got ${magic67} today!`;
            
            // 播放 Base64 声音
            let audioData = curUser === 'P1' ? BASE64_VENESSA : BASE64_VALERIE;
            if (audioData && audioData.trim() !== "") {
                let successAudio = new Audio(audioData);
                successAudio.play().catch(e => console.warn("Base64 audio play failed", e));
            }
        } else {
            msg = isCN ? `💪 挑战完成！多练几次，争取下次拿到 ${magic67} 哦！` : `💪 Good effort! Keep practicing to get ${magic67} next time!`;
        }

        const targetScreen = isSpellingMode ? 'spelling-screen' : 'quiz-screen';
        document.getElementById(targetScreen).innerHTML = `
            <div style="text-align:center; padding: 40px 0; font-size: 26px; color: #064e3b; font-weight:bold; line-height: 1.8;">${msg}</div>
            <button class="btn-action" style="background:#10b981; color:white; width:100%; height:60px; margin-top:20px;" onclick="location.reload()">${isCN ? "返回主菜单" : "Back to Menu"}</button>
        `;
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    init();
</script>
</body>
</html>
