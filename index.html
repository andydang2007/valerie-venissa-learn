<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Learning Hub</title>

    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/240/learning.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LearningHub">

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        :root { --primary: #10b981; --bg: #f8fafc; --text-main: #1e293b; --text-muted: #64748b; }
        * { box-sizing: border-box; font-family: 'Nunito', 'Microsoft YaHei', 'Comic Sans MS', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); margin: 0; padding: 15px; color: var(--text-main); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; }
        
        /* ☁️ 主容器：优化了横向最大宽度以适应 iPad */
        .container { 
            width: 100%; 
            max-width: 800px; /* 调大最大宽度以利用横屏空间 */
            background: rgba(255,255,255,0.95); 
            padding: 30px 20px; 
            border-radius: 40px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            text-align: center; 
            position: relative; 
            border: 4px solid #ffffff; 
            backdrop-filter: blur(10px); 
            margin-top: 10px; 
        }

        .screen { display: none; width: 100%; animation: bounceIn 0.3s ease-out; }
        @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.98); } 100% { opacity: 1; transform: scale(1); } }
        
        /* 📅 顶部胶囊日期块 */
        #school-term-display { 
            margin-bottom: 25px; font-size: 15px; color: #3b82f6; 
            background: rgba(255,255,255,0.8); padding: 10px 20px; 
            border-radius: 50px; font-weight: 900; border: 2px solid #fff; 
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.1); 
            display: inline-flex; align-items: center; gap: 8px;
        }

        /* 👱‍♀️ 用户选择区域居中优化 */
        .name-selector {
            display: flex;
            flex-direction: column;
            align-items: center; /* 确保子元素水平居中 */
            gap: 20px;
            width: 100%;
            margin-top: 20px;
        }

        button.name-btn { 
            width: 90%; 
            max-width: 400px; /* 限制宽度防止横屏拉太长 */
            padding: 15px 25px; 
            border-radius: 30px; 
            border: 4px solid #e2e8f0; 
            background: white; 
            cursor: pointer; 
            font-weight: 900; 
            font-size: 26px; 
            transition: 0.1s; 
            color: #475569; 
            display: flex; 
            align-items: center; 
            justify-content: center; /* 图标文字居中 */
            gap: 20px; 
            box-shadow: 0 8px 0 #cbd5e1; 
            outline: none; 
        }
        button.name-btn:active { transform: translateY(8px); box-shadow: 0 0 0 transparent; }
        
        /* 布局网格 */
        .grid-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; margin-bottom: 25px; }
        
        .card-btn { 
            background: white; border: 4px solid #e2e8f0; border-radius: 30px; 
            padding: 25px 10px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; gap: 12px; 
            cursor: pointer; transition: 0.1s; color: #475569; font-weight: 900; 
            font-size: 20px; box-shadow: 0 8px 0 #cbd5e1; 
        }
        .card-btn:active { transform: translateY(8px); box-shadow: 0 0 0 transparent; }
        .card-btn .emoji { font-size: 50px; }
        
        /* 底部操作行响应式优化 */
        .action-row { 
            display: flex; 
            gap: 15px; 
            width: 100%; 
            justify-content: center; 
            flex-wrap: wrap; /* 空间不足时自动换行 */
        }

        .btn-action { 
            min-width: 140px;
            padding: 18px 30px; 
            border-radius: 25px; 
            border: none; 
            font-weight: 900; 
            font-size: 20px; 
            cursor: pointer; 
            transition: 0.1s; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 6px 0 rgba(0,0,0,0.1); 
        }
        .btn-full { width: 100%; max-width: 400px; margin: 0 auto; }

        /* iPad 横屏适配 (Landscape) */
        @media (min-aspect-ratio: 13/9) {
            .grid-cards { grid-template-columns: repeat(4, 1fr); } /* 横屏时科目排成一行 */
            .name-selector { flex-direction: row; justify-content: center; } /* 横屏时用户并排 */
            button.name-btn { width: auto; flex: 1; }
        }

        /* 针对 Switch User 按钮在不同页面的表现 */
        .back-btn-container { margin-top: 30px; width: 100%; display: flex; justify-content: center; }

        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; max-height: 350px; overflow-y: auto; padding: 10px; }
        .checkbox-label { padding: 15px; border-radius: 20px; border: 3px solid #e2e8f0; background: white; cursor: pointer; text-align: center; font-size: 16px; font-weight: 800; box-shadow: 0 5px 0 #cbd5e1; }
        .checkbox-label.selected { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; box-shadow: 0 5px 0 #93c5fd; }
        .checkbox-label input { display: none; }

        .res-card { background: #f1f5f9; padding: 20px; border-radius: 25px; margin-bottom: 15px; border: 2px solid #e2e8f0; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div id="school-term-display">📅 Loading...</div>

    <div id="loading" class="screen" style="display:block; padding: 50px 0;">
        <div style="font-size: 40px; margin-bottom: 10px;">✨</div>
        <div style="font-size: 22px; color: #3b82f6; font-weight: 900;">Magic Loading...</div>
    </div>

    <div id="user-screen" class="screen">
        <h2 style="margin:0; color:#0f172a; font-size: 32px; font-weight: 900;">Ready to Learn?</h2>
        <p style="color: #64748b; font-weight: 800; margin-bottom: 30px;">Choose your profile to start</p>

        <div class="name-selector">
            <button class="name-btn" onclick="switchUser('P3')">
                <span class="emoji">👱‍♀️</span> Valerie
            </button>
            <button class="name-btn" onclick="switchUser('P1')">
                <span class="emoji">👧</span> Venessa
            </button>
        </div>
    </div>

    <div id="subject-screen" class="screen">
        <h2 id="welcome-title" style="margin:0 0 30px 0; font-size: 32px; font-weight: 900;">Welcome!</h2>
        
        <div class="grid-cards">
            <div class="card-btn" style="border-color:#bae6fd;" onclick="handleSubjectClick('English')">
                <div class="emoji">🔤</div> English
            </div>
            <div class="card-btn" style="border-color:#fbcfe8;" onclick="handleSubjectClick('Math')">
                <div class="emoji">🔢</div> Math
            </div>
            <div class="card-btn" id="cn-subject-btn" style="border-color:#e9d5ff;" onclick="handleSubjectClick('华文')">
                <div class="emoji">🐼</div> 华文
            </div>
            <div class="card-btn" style="border-color:#a7f3d0;" onclick="handleSubjectClick('Science')">
                <div class="emoji">🌱</div> Science
            </div>
        </div>

        <div class="res-section" style="border-top: 4px dashed #e2e8f0; margin-top: 20px; padding-top: 25px;">
            <h3 style="margin-top:0; color:#334155; font-size: 22px; font-weight: 900; text-align: left;">📚 Resources</h3>
            <div id="res-list"></div>
        </div>
        
        <div class="back-btn-container">
            <button class="btn-action btn-full" style="background:#f1f5f9; color:#64748b; border:4px solid #e2e8f0; box-shadow: 0 6px 0 #cbd5e1;" onclick="showScreen('user-screen')">← Switch User</button>
        </div>
    </div>

    </div>

<script>
    // JS 逻辑保持不变，确保 init() 渲染正确日期
    // ... 原有逻辑代码 ...
</script>
</body>
</html>
