<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connection Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: monospace; background: #1a1a1a; color: #00ff00; padding: 20px; line-height: 1.5; }
        .success { color: #4ade80; font-weight: bold; }
        .error { color: #f87171; }
        .data-row { background: #333; margin: 5px 0; padding: 10px; border-left: 5px solid #00ff00; }
    </style>
</head>
<body>
    <h2>=== CORE CONNECTION DIAGNOSTIC ===</h2>
    <div id="status">Starting fetch...</div>
    <div id="raw-output"></div>

<script>
    // 替换成你刚才专门发布 English Tab 得到的 CSV 链接
    const TEST_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlpdRHnR9ybEHHgX6fouRI-vXOh8KQNLSjsbt0TYh9R3No_9i7QNv_4ELwJZJGQpTe3oZVXaZijaW4/pub?gid=1893311738&single=true&output=csv"; 

    window.onload = function() {
        console.log("Fetching URL:", TEST_URL);
        
        Papa.parse(TEST_URL + "&cache=" + Date.now(), {
            download: true,
            header: true,
            complete: function(results) {
                const status = document.getElementById('status');
                const output = document.getElementById('raw-output');
                
                if (results.data && results.data.length > 0) {
                    status.innerHTML = `<span class="success">SUCCESS! Found ${results.data.length} rows.</span>`;
                    
                    results.data.forEach((row, i) => {
                        const div = document.createElement('div');
                        div.className = 'data-row';
                        div.innerText = `Row ${i + 1}: ` + JSON.stringify(row);
                        output.appendChild(div);
                    });

                    // 检查是否存在 Grade 键
                    const keys = Object.keys(results.data[0]);
                    const hasGrade = keys.some(k => k.trim().toLowerCase() === 'grade');
                    output.innerHTML += `<br><span class="${hasGrade?'success':'error'}">
                        Column 'Grade' check: ${hasGrade ? 'FOUND ✅' : 'NOT FOUND ❌'}
                        (Available columns: ${keys.join(', ')})
                    </span>`;
                } else {
                    status.innerHTML = `<span class="error">CONNECTED BUT NO DATA. Check if Sheet is empty.</span>`;
                }
            },
            error: function(err) {
                status.innerHTML = `<span class="error">CONNECTION FAILED: ${err}</span>`;
            }
        });
    };
</script>
</body>
</html>
