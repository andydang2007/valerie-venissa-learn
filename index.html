<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Learning Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root { --primary: #10b981; --bg: #f8fafc; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 25px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; }
        .screen { display: none; }
        .name-selector { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        button.name-btn { padding: 10px 20px; border-radius: 12px; border: 2px solid #e2e8f0; background: white; cursor: pointer; font-weight: 600; }
        button.name-btn.active { border-color: var(--primary); background: #d1fae5; color: #065f46; }
        .subject-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        button.sub-btn { padding: 20px; border-radius: 16px; border: none; color: white; font-size: 18px; font-weight: bold; cursor: pointer; }
        .q-text { font-size: 24px; text-align: left; margin: 25px 0; line-height: 1.5; }
        input.ans-input { font-size: 20px; padding: 15px; width: 100%; border: 2px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; outline: none; }
        input.ans-input.error-shake { border-color: #ef4444; animation: shake 0.3s; }
        .feedback { font-size: 18px; margin: 15px 0; min-height: 25px; font-weight: bold; }
        .controls { display: flex; gap: 10px; margin-top: 20px; }
        .btn-action { flex: 1; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .res-section { border-top: 2px dashed #e2e8f0; margin-top: 20px; padding-top: 20px; text-align: left; }
        .res-card { background: #f1f5f9; padding: 15px; border-radius: 12px; margin-bottom: 12px; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

<div class="container">
    <div id="loading" class="screen" style="display:block;">Connecting to Subjects...</div>

    <div id="menu-screen" class="screen">
        <h2 style="margin-top:0;">Practice Hub</h2>
        <div class="name-selector">
            <button id="btn-P3" class="name-btn" onclick="switchUser('P3')">Valerie (P3)</button>
            <button id="btn-P1" class="name-btn" onclick="switchUser('P1')">Venissa (P1)</button>
        </div>
        <div id="subject-grid" class="subject-grid"></div>
        <div class="res-section">
            <h3 style="margin-top:0;">Resources 📚</h3>
            <div id="res-list"></div>
        </div>
    </div>

    <div id="quiz-screen" class="screen">
        <div id="q-text" class="q-text"></div>
        <input type="text" id="ans-in" class="ans-input" placeholder="Type answer..." autocomplete="off">
        <div id="fb-text" class="feedback"></div>
        <div class="controls">
            <button class="btn-action" style="background:#f1f5f9;" onclick="location.reload()">Exit</button>
            <button id="sub-btn" class="btn-action" style="background:#111827; color:white;" onclick="checkAns()">Submit</button>
            <button id="next-btn" class="btn-action" style="background:#10b981; color:white; display:none;" onclick="nextQ()">Next →</button>
        </div>
    </div>
</div>

<script>
    // 配置信息
    const SHEET_ID = "1vQlpdRHnR9ybEHHgX6fouRI-vXOh8KQNLSjsbt0TYh9R3No_9i7QNv_4ELwJZJGQpTe3oZVXaZijaW4";
    const GIDS = { 
        "English": "1055551329", 
        "Math": "59294467", 
        "Science": "1581471994", 
        "华文": "2020673087", 
        "Resources": "469231602" 
    };

    let db = {}, curUser = 'P3', curSub = '', sessionQs = [], curIdx = 0;

// ... 前面的 HTML 和 Style 保持不变 ...

    async function init() {
        const loadingMsg = document.getElementById('loading');
        // 增加一点延时，确保数据读取不被浏览器缓存卡住
        const loads = Object.entries(GIDS).map(([name, gid]) => {
            return new Promise(res => {
                const url = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=${gid}&single=true&output=csv&t=${Date.now()}`;
                Papa.parse(url, {
                    download: true, header: true, skipEmptyLines: 'greedy',
                    complete: r => {
                        console.log(`Loaded ${name}:`, r.data.length, "rows"); // 调试日志
                        res({ name, data: r.data });
                    },
                    error: () => res(null)
                });
            });
        });

        const results = await Promise.all(loads);
        db = {};
        results.forEach(r => {
            if(!r || !r.data || r.data.length === 0) return;
            r.data.forEach(row => {
                let g = (row.Grade || row.grade || "").trim().toUpperCase(); 
                if(!g) return;
                if(!db[g]) db[g] = {};
                // 确保科目名统一
                if(!db[g][r.name]) db[g][r.name] = [];
                db[g][r.name].push(row);
            });
        });

        loadingMsg.style.display = 'none';
        showScreen('menu-screen');
        switchUser('P3'); // 默认展示 Valerie
    }

    function checkAns() {
        const input = document.getElementById('ans-in');
        const user = input.value.trim().toLowerCase();
        const correctRaw = sessionQs[curIdx]['Correct Answer'].toString().trim();
        const correct = correctRaw.toLowerCase();
        const fb = document.getElementById('fb-text');
        
        if(user === "") return;

        if(user === correct) {
            fb.innerHTML = `<span style="color:#10b981;">✅ Excellent! Correct Answer.</span>`;
            input.disabled = true;
            document.getElementById('sub-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
        } else {
            // 这里加上了答案提示
            fb.innerHTML = `<span style="color:#ef4444;">❌ Try again!</span><br>
                            <span style="font-size:14px; color:#94a3b8; font-weight:normal;">
                               Hint: The answer is "${correctRaw}"
                            </span>`;
            input.className = 'ans-input error-shake';
            setTimeout(() => {
                input.className = 'ans-input';
                input.value = ''; // 清空，让孩子根据上面的 Hint 重新输入
                input.focus();
            }, 600);
        }
    }

        const results = await Promise.all(loads);
        db = {};
        results.forEach(r => {
            if(!r || !r.data) return;
            r.data.forEach(row => {
                let g = (row.Grade || "").trim().toUpperCase();
                if(!g) return;
                if(!db[g]) db[g] = {};
                if(!db[g][r.name]) db[g][r.name] = [];
                db[g][r.name].push(row);
            });
        });

        loadingMsg.style.display = 'none';
        showScreen('menu-screen');
        switchUser('P3');
    }

    function switchUser(g) {
        curUser = g;
        document.getElementById('btn-P3').className = g === 'P3' ? 'name-btn active' : 'name-btn';
        document.getElementById('btn-P1').className = g === 'P1' ? 'name-btn active' : 'name-btn';
        
        const grid = document.getElementById('subject-grid');
        grid.innerHTML = '';
        const colors = {"English":"#3b82f6","Math":"#10b981","Science":"#ef4444","华文":"#f59e0b"};
        
        if(db[g]) {
            Object.keys(db[g]).forEach(s => {
                if(s === 'Resources') return;
                const btn = document.createElement('button');
                btn.className = 'sub-btn';
                btn.style.background = colors[s] || "#64748b";
                btn.innerText = s;
                btn.onclick = () => startQuiz(s);
                grid.appendChild(btn);
            });
        }
        renderRes(g);
    }

    function renderRes(g) {
        const list = document.getElementById('res-list');
        list.innerHTML = '';
        if(db[g] && db[g]['Resources']) {
            db[g]['Resources'].forEach(r => {
                const div = document.createElement('div');
                div.className = 'res-card';
                if(r.Type === 'IMAGE') div.innerHTML = `<b>${r.Title}</b><img src="${r.Content}" style="width:100%;margin-top:10px;border-radius:8px;">`;
                else if(r.Type === 'PDF') div.innerHTML = `<b>${r.Title}</b><br><a href="${r.Content}" target="_blank" style="color:#2563eb;text-decoration:none;display:block;margin-top:8px;">🔗 Open PDF Resource</a>`;
                else div.innerHTML = `<b>${r.Title}</b><p style="margin:8px 0 0 0;">${r.Content}</p>`;
                list.appendChild(div);
            });
        } else {
            list.innerHTML = `<p style="color:#94a3b8;">No resources yet.</p>`;
        }
    }

    function startQuiz(s) {
        curSub = s; curIdx = 0;
        sessionQs = db[curUser][s].sort(() => 0.5 - Math.random()).slice(0, 5);
        showScreen('quiz-screen');
        renderQ();
    }

    function renderQ() {
        const q = sessionQs[curIdx];
        document.getElementById('q-text').innerText = q.Question;
        const input = document.getElementById('ans-in');
        input.value = '';
        input.disabled = false;
        input.className = 'ans-input';
        document.getElementById('fb-text').innerText = '';
        document.getElementById('sub-btn').style.display = 'block';
        document.getElementById('next-btn').style.display = 'none';
        
        // 自动聚焦
        setTimeout(() => input.focus(), 100);
        // 回车监听
        input.onkeypress = (e) => { if(e.key === 'Enter') checkAns(); };
    }

    function checkAns() {
        const input = document.getElementById('ans-in');
        const user = input.value.trim().toLowerCase();
        const correct = sessionQs[curIdx]['Correct Answer'].toString().trim().toLowerCase();
        const fb = document.getElementById('fb-text');
        
        if(user === "") return;

        if(user === correct) {
            fb.innerText = "✅ Excellent! Correct Answer.";
            fb.style.color = "#10b981";
            input.disabled = true;
            document.getElementById('sub-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
} else {
            // 在提示语里直接把正确答案写出来
            fb.innerHTML = `❌ Try again! <br><span style="font-size:14px; color:#94a3b8;">Hint: ${sessionQs[curIdx]['Correct Answer']}</span>`;
            fb.style.color = "#ef4444";
            input.className = 'ans-input error-shake';
            setTimeout(() => {
                input.className = 'ans-input';
                input.value = ''; // 清空让她照着 Hint 练一遍
            }, 400);
        }
    }

    function nextQ() {
        if(curIdx < sessionQs.length - 1) {
            curIdx++;
            renderQ();
        } else {
            alert("Practice Complete! Great job!");
            location.reload();
        }
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    init();
</script>
</body>
</html>
