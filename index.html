<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Learning Hub</title>

    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/240/paper-plane.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LearningHub">

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #10b981; --bg: #f8fafc; --text-main: #1e293b; --text-muted: #64748b; }
        * { box-sizing: border-box; font-family: 'Nunito', 'Microsoft YaHei', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); margin: 0; padding: 20px; color: var(--text-main); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; overflow-x: hidden; }
        
        .container { width: 100%; max-width: 650px; background: rgba(255,255,255,0.95); padding: 30px 25px 40px 25px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; position: relative; border: 4px solid #ffffff; backdrop-filter: blur(12px); display: flex; flex-direction: column; align-items: center; margin-top: 5vh; margin-bottom: auto; }
        .screen { display: none; width: 100%; animation: bounceIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); flex-direction: column; align-items: center; }
        
        @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        
        #school-term-display { margin-bottom: 25px; font-size: 15px; color: #3b82f6; background: rgba(255,255,255,0.7); padding: 10px 20px; border-radius: 50px; font-weight: 900; border: 2px solid #fff; box-shadow: 0 8px 15px rgba(59, 130, 246, 0.1); display: inline-flex; align-items: center; gap: 8px; }

        .magic-number { display: inline-block; font-size: 1.4em; color: #f59e0b; font-weight: 900; padding: 0 5px; animation: popPulse 1s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes popPulse { 0% { transform: scale(1); } 100% { transform: scale(1.15) translateY(-3px); text-shadow: 0 0 15px rgba(234, 179, 8, 0.5); } }

        /* 用户选择按钮 */
        button.name-btn { width: 100%; max-width: 320px; padding: 20px; border-radius: 30px; border: 4px solid #e2e8f0; background: white; cursor: pointer; font-weight: 900; font-size: 26px; transition: 0.15s; color: #475569; display: flex; align-items: center; justify-content: center; gap: 15px; box-shadow: 0 8px 0 #cbd5e1; outline: none; margin-bottom: 20px; }
        button.name-btn:active { transform: translateY(8px); box-shadow: 0 0 0 transparent; }
        .name-btn .avatar { font-size: 46px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1)); }

        /* 🏆 荣誉墙设计 */
        .dashboard-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; width: 100%; justify-content: center; }
        .dashboard-header .avatar { font-size: 50px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15)); }
        .dashboard-header h2 { margin: 0; font-size: 28px; color: #0f172a; font-weight: 900; }

        .honor-wall { width: 100%; background: #f8fafc; border: 4px dashed #cbd5e1; border-radius: 30px; padding: 20px; margin-bottom: 30px; text-align: left; }
        .honor-wall h3 { margin: 0 0 15px 0; font-size: 20px; color: #f59e0b; display: flex; align-items: center; gap: 8px; }
        
        .badges-scroll { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .badges-scroll::-webkit-scrollbar { display: none; }
        
        .badge-item { min-width: 80px; display: flex; flex-direction: column; align-items: center; gap: 8px; opacity: 0.4; filter: grayscale(100%); transition: 0.3s; }
        .badge-item.unlocked { opacity: 1; filter: grayscale(0%); animation: unlockPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .badge-icon { width: 60px; height: 60px; border-radius: 20px; background: white; border: 3px solid #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 4px 0 #cbd5e1; }
        .badge-item.unlocked .badge-icon { border-color: #f59e0b; background: #fffbeb; box-shadow: 0 4px 0 #d97706, 0 0 15px rgba(245, 158, 11, 0.3); }
        .badge-name { font-size: 12px; font-weight: 800; color: #64748b; text-align: center; line-height: 1.2; }
        .badge-item.unlocked .badge-name { color: #d97706; }

        @keyframes unlockPop { 0% { transform: scale(0.8); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* 紧凑型科目按钮 */
        .section-title { width: 100%; text-align: left; margin: 0 0 15px 5px; font-size: 20px; font-weight: 900; color: #334155; }
        .grid-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; margin-bottom: 25px; }
        
        .card-btn { background: white; border: 4px solid #e2e8f0; border-radius: 25px; padding: 20px 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: 0.15s; color: #475569; font-weight: 900; font-size: 18px; box-shadow: 0 6px 0 #cbd5e1; }
        .card-btn:active { transform: translateY(6px); box-shadow: 0 0 0 transparent; }
        .card-btn .emoji { font-size: 38px; filter: drop-shadow(0 3px 3px rgba(0,0,0,0.1)); }
        
        .card-btn.eng { border-color: #bae6fd; }
        .card-btn.math { border-color: #fbcfe8; }
        .card-btn.cn { border-color: #e9d5ff; }
        .card-btn.sci { border-color: #a7f3d0; }

        /* 小菜单按钮 */
        .menu-row { display: flex; gap: 15px; width: 100%; margin-bottom: 15px; }
        .menu-btn { flex: 1; background: white; border: 4px solid #e2e8f0; border-radius: 20px; padding: 20px 10px; font-size: 18px; font-weight: 900; color: #475569; cursor: pointer; box-shadow: 0 6px 0 #cbd5e1; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: 0.1s; }
        .menu-btn:active { transform: translateY(6px); box-shadow: 0 0 0 transparent; }
        .menu-btn .emoji { font-size: 32px; }

        .btn-action { width: 100%; border-radius: 20px; border: none; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.15s; display: flex; align-items: center; justify-content: center; outline: none; padding: 18px; box-shadow: 0 6px 0 rgba(0,0,0,0.1); background: #f1f5f9; color: #64748b; border: 4px solid #e2e8f0; }
        .btn-action:active { transform: translateY(6px); box-shadow: 0 0 0 transparent; }

        /* 锁屏 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: white; padding: 40px; border-radius: 40px; text-align: center; width: 90%; max-width: 350px; display: flex; flex-direction: column; align-items: center; border: 5px solid #fff; box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
        .pin-input-hub { font-size: 36px; font-weight: 900; letter-spacing: 10px; padding: 15px; width: 160px; text-align: center; border: 4px solid #e2e8f0; border-radius: 20px; margin: 20px 0; outline: none; color: #1e293b; transition: 0.2s; background: #f8fafc; }
        .pin-input-hub:focus { border-color: #f59e0b; background: #fffbeb; }
        .error-shake { border-color: #ef4444 !important; animation: shake 0.3s; background-color: #fef2f2 !important; }

        @media (min-width: 768px) { .container { padding: 40px 50px; } .grid-cards { grid-template-columns: repeat(4, 1fr); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body>

<div class="container">
    <div id="school-term-display">📅 Loading Date...</div>

    <div id="user-screen" class="screen" style="display: flex;">
        <h2 style="margin:0 0 5px 0; color:#0f172a; font-size: 30px; font-weight: 900;">Who is learning?</h2>
        <div style="font-size: 16px; color: #64748b; margin-top: 5px; font-weight: 800; margin-bottom: 25px;">Aim for <span class="magic-number" style="font-size:1.1em;">6~7</span> today!</div>

        <button class="name-btn" onclick="switchUser('P3')">
            <span class="avatar">👱‍♀️</span> Valerie
        </button>
        <button class="name-btn" onclick="switchUser('P1')">
            <span class="avatar">👧</span> Venessa
        </button>
    </div>

    <div id="dashboard-screen" class="screen">
        <div class="dashboard-header">
            <div class="avatar" id="dash-avatar">👱‍♀️</div>
            <h2 id="dash-name">Welcome!</h2>
        </div>

        <div class="honor-wall">
            <h3>🏆 My Badges</h3>
            <div class="badges-scroll" id="badges-container">
                </div>
        </div>

        <div class="section-title">Select Subject</div>
        <div class="grid-cards">
            <div class="card-btn eng" onclick="showSubMenu('english-menu')">
                <div class="emoji">🔤</div> English
            </div>
            <div class="card-btn math" onclick="launchPractice('Math')">
                <div class="emoji">🔢</div> Math
            </div>
            <div class="card-btn cn" onclick="showSubMenu('chinese-menu')">
                <div class="emoji" id="cn-emoji">🐼</div> <span id="cn-label">华文</span>
            </div>
            <div class="card-btn sci" onclick="launchPractice('Science')">
                <div class="emoji">🌱</div> Science
            </div>
        </div>
        
        <button class="btn-action" onclick="showScreen('user-screen')">👤 Switch User</button>
    </div>

    <div id="english-menu" class="screen">
        <h2 style="margin:0 0 20px 0; font-size: 26px; font-weight: 900; color: #0f172a;">🔤 English Modes</h2>
        <div class="menu-row">
            <div class="menu-btn" style="border-color:#bae6fd; color:#0284c7;" onclick="launchPractice('English')">
                <div class="emoji">🚀</div> Practice
            </div>
            <div class="menu-btn" style="border-color:#fde68a; color:#b45309;" onclick="window.location.href='spelling.html'">
                <div class="emoji">✍️</div> Spelling
            </div>
        </div>
        <button class="btn-action" onclick="showScreen('dashboard-screen')">← Back to Hub</button>
    </div>

    <div id="chinese-menu" class="screen">
        <h2 style="margin:0 0 20px 0; font-size: 26px; font-weight: 900; color: #0f172a;">🐼 华文练习</h2>
        <div class="menu-row" style="flex-wrap: wrap;">
            <div class="menu-btn" style="border-color:#bae6fd; color:#0284c7; flex: 1 1 40%;" onclick="launchPractice('华文')">
                <div class="emoji">📝</div> 复习
            </div>
            <div class="menu-btn" style="border-color:#fde68a; color:#b45309; flex: 1 1 40%;" onclick="window.location.href='tingxie.html'">
                <div class="emoji">✍️</div> 听写
            </div>
            <div class="menu-btn" style="border-color:#fbcfe8; color:#be185d; flex: 1 1 100%; flex-direction: row; justify-content: center;" onclick="window.location.href='pinyin.html'">
                <div class="emoji">🎮</div> 拼音游戏
            </div>
        </div>
        <button class="btn-action" onclick="showScreen('dashboard-screen')">← 返回主页</button>
    </div>

</div>

<div id="pin-modal" class="modal-overlay">
    <div class="modal-content">
        <div style="font-size: 40px; margin-bottom: 5px;">🛡️</div>
        <h3 style="margin:0 0 10px 0; color:#0f172a; font-size: 24px; font-weight: 900;">Parent Lock</h3>
        <p style="color:#64748b; font-size:14px; margin:0; font-weight: 700;">Ask Dad for today's code.</p>
        <input type="tel" id="hub-pin-input" class="pin-input-hub" maxlength="4" placeholder="***" autocomplete="off" inputmode="numeric" pattern="[0-9]*">
        <div style="display:flex; gap:10px; width: 100%;">
            <button class="btn-action" style="flex:1; padding:15px; font-size:16px;" onclick="closePinModal()">Cancel</button>
            <button class="btn-action" style="flex:1; padding:15px; font-size:16px; background:#f59e0b; color:white; border-color:#f59e0b; box-shadow:0 6px 0 #d97706;" onclick="verifyHubPin()">Unlock</button>
        </div>
    </div>
</div>

<script>
    let pendingUser = null;
    let currentUser = '';

    // 初始化日期与学期
    function initDate() {
        const now = new Date();
        const t2 = new Date(2026, 2, 23), t3 = new Date(2026, 5, 29), t4 = new Date(2026, 8, 14);
        const diff = (d1, d2) => Math.floor((d1 - d2) / 864e5);
        let termStr = "Term 1";
        
        if (now >= t4) { const w = Math.floor(diff(now, t4)/7) + 1; termStr = w <= 10 ? `Term 4 Week ${w}` : "Holiday"; }
        else if (now >= t3) { const w = Math.floor(diff(now, t3)/7) + 1; termStr = w <= 10 ? `Term 3 Week ${w}` : "Holiday"; }
        else if (now >= t2) { const w = Math.floor(diff(now, t2)/7) + 1; termStr = w <= 10 ? `Term 2 Week ${w}` : "Holiday"; }
        
        document.getElementById('school-term-display').innerHTML = `<span>📅 ${now.toLocaleDateString('en-SG', {month:'short', day:'numeric'})}</span><span style="color:#cbd5e1">|</span><span>${termStr}</span>`;
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    function showSubMenu(menuId) {
        showScreen(menuId);
    }

    // 核心路由：跳转到独立引擎
    function launchPractice(subject) {
        localStorage.setItem('currentSubject', subject);
        window.location.href = 'practice.html';
    }

    // 用户切换逻辑
    function switchUser(g) {
        if (g === 'P1') { 
            pendingUser = g; document.getElementById('pin-modal').style.display = 'flex'; 
            const pinInput = document.getElementById('hub-pin-input');
            pinInput.value = ''; setTimeout(() => pinInput.focus(), 100); return; 
        }
        executeSwitchUser(g);
    }

    function executeSwitchUser(g) {
        currentUser = g;
        localStorage.setItem('currentPlayer', g);
        
        // 更新 UI
        document.getElementById('dash-avatar').innerText = g === 'P3' ? '👱‍♀️' : '👧';
        document.getElementById('dash-name').innerText = `Hello, ${g === 'P3' ? 'Valerie' : 'Venessa'}!`;
        document.getElementById('cn-label').innerText = g === 'P3' ? '高级华文' : '华文';
        
        renderBadges();
        showScreen('dashboard-screen');
    }

    // 🔐 PIN码验证
    function verifyHubPin() {
        const input = document.getElementById('hub-pin-input').value;
        const now = new Date();
        const mmdd = (now.getMonth() + 1) * 100 + now.getDate();
        const day = now.getDay() === 0 ? 7 : now.getDay();
        
        if (input === (mmdd + day).toString()) {
            closePinModal();
            executeSwitchUser(pendingUser);
        } else {
            const el = document.getElementById('hub-pin-input'); el.classList.add('error-shake');
            setTimeout(() => { el.classList.remove('error-shake'); el.value = ''; el.focus(); }, 400);
        }
    }
    
    function closePinModal() { 
        document.getElementById('pin-modal').style.display = 'none'; 
        document.getElementById('hub-pin-input').value = ''; 
    }

    // 🏆 荣誉墙徽章渲染引擎
    function renderBadges() {
        const container = document.getElementById('badges-container');
        container.innerHTML = ''; // 清空

        // 获取该用户积累的数据 (从 localStorage 扫描)
        let totalPerfects = 0;
        let balloonGamesUnlocked = 0;
        
        for (let i = 0; i < localStorage.length; i++) {
            let key = localStorage.key(i);
            if (key.startsWith('practice_stats_') && key.includes(`_${currentUser}_`)) {
                try {
                    let stats = JSON.parse(localStorage.getItem(key));
                    totalPerfects += (stats.perfects || 0);
                    balloonGamesUnlocked += (stats.gamesPlayed || 0);
                } catch(e) {}
            }
        }

        // 定义系统徽章库
        const badgesDef = [
            { id: 'first_blood', icon: '🎯', name: '神射手', desc: 'Score 6~7 once', unlocked: totalPerfects >= 1 },
            { id: 'sharp_shooter', icon: '🔥', name: '连击王', desc: 'Score 6~7 3 times', unlocked: totalPerfects >= 3 },
            { id: 'balloon_master', icon: '🎈', name: '气球猎手', desc: 'Unlock Balloon Game', unlocked: balloonGamesUnlocked >= 1 },
            { id: 'grand_master', icon: '👑', name: '学霸', desc: 'Unlock 5 Games', unlocked: balloonGamesUnlocked >= 5 }
        ];

        // 渲染 HTML
        badgesDef.forEach(b => {
            const div = document.createElement('div');
            div.className = `badge-item ${b.unlocked ? 'unlocked' : ''}`;
            div.innerHTML = `
                <div class="badge-icon">${b.icon}</div>
                <div class="badge-name">${b.name}</div>
            `;
            container.appendChild(div);
        });
    }

    // 绑定回车键验证
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && document.getElementById('pin-modal').style.display === 'flex') {
            verifyHubPin();
        }
    });

    initDate();
    
    // 如果之前有登录记录，直接进入 Dashboard
    let lastUser = localStorage.getItem('currentPlayer');
    if(lastUser === 'P3' || lastUser === 'P1') {
        executeSwitchUser(lastUser);
    } else {
        showScreen('user-screen');
    }
</script>

</body>
</html>
