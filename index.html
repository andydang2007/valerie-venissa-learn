<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Learning Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10b981; --bg: #f8fafc; --text-main: #1e293b; --text-muted: #64748b; }
        * { box-sizing: border-box; font-family: 'Nunito', 'Microsoft YaHei', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); margin: 0; padding: 20px; color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 700px; background: rgba(255,255,255,0.95); padding: 30px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 4px solid #ffffff; }
        .screen { display: none; width: 100%; flex-direction: column; align-items: center; }
        .vault-card { width: 100%; background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); border: 4px solid #fde68a; border-radius: 30px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .crystal-card { width: 100%; background: #f0f9ff; border: 4px solid #bae6fd; border-radius: 30px; padding: 15px; margin-bottom: 20px; text-align: center; display: flex; justify-content: space-around; align-items: center; }
        .menu-btn { background: white; border: 4px solid #e2e8f0; border-radius: 20px; padding: 15px; font-weight: 900; cursor: pointer; transition: 0.1s; box-shadow: 0 6px 0 #cbd5e1; }
        .menu-btn:active { transform: translateY(6px); box-shadow: none; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; margin-bottom: 20px; }
        .reward-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: white; padding: 30px; border-radius: 30px; text-align: center; width: 90%; max-width: 350px; border: 6px solid #f59e0b; }
        #secret-code { font-family: monospace; font-size: 28px; background: #fffbeb; padding: 15px; border: 3px dashed #f59e0b; margin: 20px 0; color: #b45309; }
    </style>
</head>
<body>

<div class="container">
    <div id="user-screen" class="screen" style="display: flex;">
        <h2>谁在学习？</h2>
        <button class="menu-btn" style="width:100%; margin-bottom:15px;" onclick="selUser('P3')">👱‍♀️ Valerie (P3)</button>
        <button class="menu-btn" style="width:100%;" onclick="selUser('P1')">👧 Venessa (P1)</button>
    </div>

    <div id="dash-screen" class="screen">
        <div class="vault-card">
            <h3 style="margin:0; color:#d97706;">💰 家庭共享金库</h3>
            <div id="vault-total" style="font-size:48px; font-weight:900; color:#b45309;">0</div>
        </div>

        <div class="crystal-card">
            <div>
                <div style="font-size:12px; color:#0369a1;">我的打卡水晶</div>
                <div id="user-crys" style="font-size:32px; font-weight:900; color:#0ea5e9;">0</div>
            </div>
            <div>
                <div style="font-size:12px; color:#0369a1;">当前连击</div>
                <div id="user-streak" style="font-size:32px; font-weight:900; color:#0ea5e9;">0</div>
            </div>
        </div>

        <div class="grid">
            <button class="menu-btn" onclick="startSub('English')">🔤 English</button>
            <button class="menu-btn" onclick="startSub('Math')">🔢 Math</button>
            <button class="menu-btn" onclick="startSub('华文')">🐼 华文</button>
            <button class="menu-btn" onclick="startSub('Science')">🌱 Science</button>
        </div>

        <h3 style="width:100%; text-align:left;">🎁 神秘商店</h3>
        <div class="reward-grid">
            <button class="menu-btn" onclick="buy('金币', 67, '🍔 汉堡', 'HB')">🍔<br>67币</button>
            <button class="menu-btn" onclick="buy('金币', 134, '🍟 套餐', 'TC')">🍟<br>134币</button>
            <button class="menu-btn" onclick="buy('金币', 268, '🍕 披萨', 'PZ')">🍕<br>268币</button>
            <button class="menu-btn" onclick="buy('水晶', 7, '🍦 甜筒', 'TT')">🍦<br>7晶</button>
            <button class="menu-btn" onclick="buy('水晶', 14, '🍨 麦旋风', 'XF')">🍨<br>14晶</button>
        </div>
        <button onclick="location.reload()" style="margin-top:20px; border:none; background:none; color:#64748b; font-weight:bold;">👤 切换用户</button>
    </div>
</div>

<div id="redeem-modal" class="modal-overlay">
    <div class="modal-content">
        <h2>兑换成功！</h2>
        <p>找老爸接头：</p>
        <div id="secret-code">CODE-XXXX</div>
        <button class="menu-btn" style="width:100%; background:#f59e0b; color:white;" onclick="document.getElementById('redeem-modal').style.display='none'">记住了！</button>
    </div>
</div>

<script>
    let cur = '';
    const SYNC_URL = "https://script.google.com/macros/s/AKfycbyNi-a8VpHLrIpd0x5Fnb_825ZzFrLp4h2oMKot3xefrLGiLe3Pj-d8L-xWQh5w-Kkd/exec";

    function selUser(u) {
        cur = u; localStorage.setItem('currentPlayer', u);
        document.getElementById('user-screen').style.display = 'none';
        document.getElementById('dash-screen').style.display = 'flex';
        updateUI();
    }

    function updateUI() {
        document.getElementById('vault-total').innerText = localStorage.getItem('gold_coins_vault') || "0";
        document.getElementById('user-crys').innerText = localStorage.getItem(`crystals_${cur}`) || "0";
        document.getElementById('user-streak').innerText = localStorage.getItem(`streak_${cur}`) || "0";
    }

    function startSub(s) {
        localStorage.setItem('currentSubject', s);
        location.href = 'practice.html';
    }

    function buy(type, price, name, prefix) {
        let key = type === '金币' ? 'gold_coins_vault' : `crystals_${cur}`;
        let balance = parseInt(localStorage.getItem(key) || "0");
        if (balance < price) return alert('余额不足！');

        if (confirm(`确认兑换 ${name}？`)) {
            localStorage.setItem(key, balance - price);
            const now = new Date();
            const dateStr = (now.getMonth() + 1).toString().padStart(2, '0') + now.getDate().toString().padStart(2, '0');
            const code = `${prefix}-${dateStr}-${(now.getDate() + price).toString().padStart(3, '0')}`;
            
            document.getElementById('secret-code').innerText = code;
            document.getElementById('redeem-modal').style.display = 'flex';
            
            fetch(SYNC_URL, { method:'POST', mode:'no-cors', body: JSON.stringify({type:'redemption', user:cur, rewardName:name, price:price, code:code}) });
            updateUI();
        }
    }
</script>
</body>
</html>
