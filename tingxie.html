<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>听写大挑战</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-M04YCD1PQK"></script>
    <script>
        let currentPlayer = localStorage.getItem('currentPlayer') || 'Valerie'; 
        let currentGrade = localStorage.getItem('currentGrade') || 'P3';
        
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-M04YCD1PQK');
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --text-main: #1e293b; --text-muted: #64748b; }
        * { box-sizing: border-box; font-family: 'Nunito', 'Microsoft YaHei', 'Comic Sans MS', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); margin: 0; padding: 15px; color: var(--text-main); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100dvh; overflow: hidden; }
        .container { width: 100%; max-width: 750px; background: rgba(255,255,255,0.95); padding: 20px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; margin: auto; position: relative; border: 4px solid #ffffff; display: flex; flex-direction: column; max-height: 96dvh; }
        .screen { display: none; flex: 1; flex-direction: column; width: 100%; overflow: hidden; animation: bounceIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        #finish-screen { justify-content: center; overflow-y: auto; }
        
        h1 { color: #3b82f6; margin-top: 0; font-size: 28px; margin-bottom: 15px; font-weight: 900; letter-spacing: 1px; text-shadow: 2px 2px 0px #dbeafe; flex: none; }
        
        .btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 15px; flex: none; }
        .btn-choice { padding: 12px 24px; border-radius: 30px; border: 3px solid #e2e8f0; background: white; cursor: pointer; font-weight: 900; font-size: 18px; color: var(--text-muted); transition: 0.15s; min-width: 100px; box-shadow: 0 4px 0 #e2e8f0; outline: none; }
        .btn-choice.active { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; box-shadow: 0 4px 0 #93c5fd; }
        
        /* 💡 改为无边框胶囊样式 */
        .checkbox-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 15px; padding: 5px; flex: 1; overflow-y: auto; align-content: flex-start; }
        .checkbox-label { padding: 10px 20px; border-radius: 20px; background: #f1f5f9; cursor: pointer; font-weight: 800; font-size: 16px; color: var(--text-muted); transition: all 0.15s; user-select: none; height: fit-content; border: none; }
        .checkbox-label.selected { background: #3b82f6; color: #ffffff; font-weight: 900; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4); transform: scale(1.05); }
        
        .action-panel { display: flex; flex-direction: column; gap: 15px; width: 100%; flex: none; }
        .btn-stacked-row { display: flex; gap: 15px; justify-content: center; }
        
        /* 💡 按钮变宽润 */
        .btn-stacked { flex: 1; padding: 18px 0; border-radius: 20px; font-size: 20px; font-weight: 900; border: none; cursor: pointer; transition: 0.15s; display: flex; align-items: center; justify-content: center; color: white; }
        .btn-review-stacked { background: #f59e0b; box-shadow: 0 6px 0 #d97706; }
        .btn-practice-stacked { background: #10b981; box-shadow: 0 6px 0 #059669; }
        .btn-home { background: #f1f5f9; color: #64748b; font-size: 18px; border: 3px solid #e2e8f0; box-shadow: 0 6px 0 #cbd5e1; width: 100%; border-radius: 20px; padding: 12px 0; font-weight: 900; cursor: pointer;}

        .progress-container { width: 100%; background: #f1f5f9; height: 16px; border-radius: 10px; margin-bottom: 20px; overflow: hidden; border: 2px solid #e2e8f0; flex: none; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #34d399, #10b981); width: 0%; transition: width 0.4s; }
        .progress-text { font-size: 18px; color: #94a3b8; margin-bottom: 15px; font-weight: 900; flex: none; }
        
        .hint-display { font-size: 32px; font-weight: bold; color: #334155; margin-bottom: 15px; min-height: 80px; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; align-content: center; flex: none; }
        .hint-unit { cursor: pointer; padding: 10px 18px; border-radius: 20px; border: 4px solid #e2e8f0; background: #fff; min-width: 60px; text-align: center; font-size: 26px; transition: 0.2s; box-shadow: 0 5px 0 #cbd5e1; }
        .hint-unit.active { color: #ea580c; background: #fff7ed; border-color: #fb923c; transform: scale(1.1); box-shadow: 0 6px 0 #f97316; z-index: 2; }
        .hint-unit.done { color: #10b981; background: #ecfdf5; border-color: #6ee7b7; box-shadow: 0 0 0 transparent; transform: translateY(5px); }
        
        .practice-main { display: flex; flex-direction: column; flex: 1; width: 100%; min-height: 0; }
        .practice-area { background: #f8fafc; padding: 20px 10px; border-radius: 30px; border: 4px dashed #cbd5e1; margin-bottom: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; position: relative; overflow: hidden; min-height: 250px;}
        .hanzi-box { width: 240px; height: 240px; border: 4px solid #94a3b8; border-radius: 25px; background: white; }
        
        .helper-row { display: flex; gap: 15px; margin-top: 15px; justify-content: center; width: 100%; }
        .btn-helper { font-size: 16px; padding: 10px 20px; border-radius: 20px; font-weight: 900; cursor: pointer; transition: 0.15s; outline: none; display: none; }
        #peek-btn { background: #fef08a; color: #a16207; border: 3px solid #fde047; box-shadow: 0 5px 0 #facc15; }
        #skip-char-btn { background: #f1f5f9; color: #64748b; border: 3px solid #e2e8f0; box-shadow: 0 5px 0 #cbd5e1; }
        
        .controls-row { display: flex; gap: 12px; width: 100%; height: 65px; flex: none; }
        .btn-action { border-radius: 20px; border: none; font-weight: 900; font-size: 20px; cursor: pointer; transition: 0.15s; display: flex; align-items: center; justify-content: center; outline: none; }
        .btn-quit { flex: 1; background: #f1f5f9; color: #64748b; font-size: 16px; border: 3px solid #e2e8f0; box-shadow: 0 5px 0 #cbd5e1; } 
        .btn-nav { flex: 1.5; background: #38bdf8; color: white; box-shadow: 0 5px 0 #0284c7; } 
        /* 💡 灰色不可用状态 */
        .btn-nav:disabled { background: #cbd5e1 !important; color: #f8fafc !important; box-shadow: 0 5px 0 #94a3b8 !important; cursor: not-allowed; transform: none !important; }

        @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
        
        @media (orientation: landscape) and (min-width: 768px) {
            .container { max-width: 900px; padding: 25px 30px; height: 95dvh; border-radius: 40px;}
            .practice-main { flex-direction: row; align-items: flex-start; gap: 20px; }
            .practice-area { margin-bottom: 0; height: 100%; min-height: 280px; flex: 1; }
            .practice-main .controls-row { display: grid; grid-template-columns: 1fr 1fr; width: 280px; height: auto; gap: 15px; flex: none; }
            .practice-main .btn-action { height: 75px; width: 100%; border-radius: 20px; }
            .practice-main .btn-quit { grid-column: 1 / 3; font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="loading" class="screen" style="display:flex; justify-content:center; align-items:center; padding: 60px 0; font-size: 24px; font-weight: 900; color: #3b82f6;">
        🌟 题库载入中... 
    </div>

    <div id="topic-screen" class="screen">
        <h1 id="topic-header">📝 听写任务</h1>
        <div id="semester-group" class="btn-group"></div>
        <div id="topic-list" class="checkbox-grid"></div>
        <div class="action-panel">
            <div class="btn-stacked-row">
                <button class="btn-stacked btn-review-stacked" onclick="startReview(this)">🔥 挑战</button>
                <button class="btn-stacked btn-practice-stacked" onclick="startPractice()">🚀 练习</button>
            </div>
            <button class="btn-home" onclick="window.location.href='index.html'">🏠 返回主页</button>
        </div>
    </div>

    <div id="practice-screen" class="screen">
        <div class="progress-container"><div id="prog-bar" class="progress-bar"></div></div>
        <div id="prog-text" class="progress-text">1 / 10</div>
        <div id="hint-area" class="hint-display"></div>
        <div class="practice-main">
            <div id="work-area" class="practice-area">
                <div id="thumb-up" style="position:absolute; font-size:110px; display:none; z-index:10;">👍</div>
                <div id="draw-target"></div>
                <div class="helper-row">
                    <button id="peek-btn" class="btn-helper">👀 看一下</button>
                    <button id="skip-char-btn" class="btn-helper" onclick="skipCurrentChar()">太简单，跳过 ⏭️</button>
                </div>
            </div>
            <div class="controls-row">
                <button id="quit-btn" class="btn-action btn-quit" onclick="window.location.href='index.html'">退出 🏠</button>
                <button id="prev-btn" class="btn-action btn-nav" onclick="moveQuestion(-1)">⬅️ 上一个</button>
                <button id="next-btn" class="btn-action btn-nav" onclick="moveQuestion(1)">下一个 ➡️</button>
            </div>
        </div>
    </div>

    <div id="finish-screen" class="screen"></div>
</div>

<script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlpdRHnR9ybEHHgX6fouRI-vXOh8KQNLSjsbt0TYh9R3No_9i7QNv_4ELwJZJGQpTe3oZVXaZijaW4/pub?gid=266851979&single=true&output=csv";
    const SYNC_API_URL = "https://script.google.com/macros/s/AKfycbzbNOgg7deW9uVVyfYGTfKGOtVgNs_9ZfUQ9J_9cYpG2Ufow9KLDICHgsinBXrPJlmz/exec";
    const LIMIT = 5; 

    let db = {}, curUser = currentGrade, practiceList = [], curIdx = 0;
    let hzWriter = null, practiceChars = [];
    let sessionErrors = 0;
    let currentMode = 'practice';

    async function syncToCloud(payload) {
        try { fetch(SYNC_API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) }); } catch (e) {}
    }

    function checkAndIncrementLimit(lessons, mode) {
        const today = new Date().toISOString().split('T')[0];
        const storageKey = `spelling_usage_${today}`;
        let usage = JSON.parse(localStorage.getItem(storageKey) || "{}");
        for (let lesson of lessons) {
            if (!usage[lesson]) usage[lesson] = { practice: 0, challenge: 0 };
            if (usage[lesson][mode] >= LIMIT) {
                alert(`「${lesson}」今天练得够多了，休息一下吧！`);
                return false;
            }
        }
        lessons.forEach(l => usage[l][mode]++);
        localStorage.setItem(storageKey, JSON.stringify(usage));
        return true;
    }

    function unlockPinyinLessons(selArray) {
        const cnNum = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10,'十一':11,'十二':12,'十三':13,'十四':14,'十五':15,'十六':16,'十七':17,'十八':18,'十九':19,'二十':20};
        let savedMax = parseInt(localStorage.getItem(`max_lesson_${currentPlayer}`) || "8"); 
        let updated = false;

        selArray.forEach(lessonName => {
            let num = NaN;
            let match = lessonName.match(/第(.+)课/);
            if (match && cnNum[match[1]]) num = cnNum[match[1]];
            else {
                let numMatch = lessonName.match(/\d+/);
                if (numMatch) num = parseInt(numMatch[0]);
            }
            if (!isNaN(num) && num > savedMax) { savedMax = num; updated = true; }
        });

        if (updated) {
            localStorage.setItem(`max_lesson_${currentPlayer}`, savedMax);
            console.log(`✅ 已前置解锁拼音游戏至第 ${savedMax} 课`);
        }
    }

    function init() {
        Papa.parse(SHEET_URL + "&t=" + Date.now(), {
            download: true, header: true, skipEmptyLines: 'greedy',
            transformHeader: h => h.replace(/^\uFEFF/, '').trim().toUpperCase(),
            complete: function(results) {
                results.data.forEach((row, index) => { 
                    let g = (row['GRADE'] || "").toString().toUpperCase();
                    let topic = (row['TOPIC'] || row['LESSON'] || "").toString().trim();
                    let hint = (row['QUESTION'] || row['HINT'] || "").toString().trim();
                    let ans = (row['CORRECT ANSWER'] || row['ANSWER'] || "").toString().trim();

                    if(!g || (!hint && !ans)) return;
                    if(!db[g]) db[g] = []; 
                    
                    db[g].push({ Topic: topic || "Default", Hint: hint, Answer: ans, isWrong: false, originalIndex: index });
                });
                document.getElementById('loading').style.display = 'none';
                loadTopics();
            }
        });
    }

    function loadTopics() {
        document.getElementById('topic-header').innerText = `🎈 ${currentPlayer} 的听写 🎈`;
        let pool = db[curUser] || [];
        if (pool.length === 0) {
            document.getElementById('topic-list').innerHTML = `<p style="color:#ef4444; font-weight:900;">⚠️ 找不到 ${curUser} 的数据</p>`;
            showScreen('topic-screen');
            return;
        }

        let topics = [...new Set(pool.map(q => q.Topic))].sort((a,b) => getWeight(a) - getWeight(b));
        const gradeMap = {'P1': '一', 'P2': '二', 'P3': '三', 'P4': '四', 'P5': '五', 'P6': '六'};
        let gradeStr = gradeMap[curUser] || curUser;
        
        document.getElementById('semester-group').innerHTML = `
            <button class="btn-choice" onclick="selectSemester('A', this)">📖 ${gradeStr}上</button>
            <button class="btn-choice" onclick="selectSemester('B', this)">📘 ${gradeStr}下</button>
        `;
        
        const list = document.getElementById('topic-list'); list.innerHTML = '';
        topics.forEach(t => {
            const lbl = document.createElement('label');
            lbl.className = 'checkbox-label';
            lbl.innerHTML = `<input type="checkbox" value="${t}" onchange="this.classList.toggle('selected', this.checked)"> ${t}`;
            list.appendChild(lbl);
        });
        showScreen('topic-screen');
    }

    function selectSemester(type, btn) {
        btn.classList.toggle('active');
        let isActive = btn.classList.contains('active');
        document.querySelectorAll('#topic-list input').forEach(cb => {
            let weight = getWeight(cb.value);
            if (type === 'A' && weight <= 10) { cb.checked = isActive; cb.parentElement.classList.toggle('selected', isActive); }
            else if (type === 'B' && weight > 10) { cb.checked = isActive; cb.parentElement.classList.toggle('selected', isActive); }
        });
    }

    function getWeight(s) {
        const dict = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10,'十一':11,'十二':12,'十三':13,'十四':14,'十五':15,'十六':16,'十七':17,'十八':18,'十九':19,'二十':20};
        let m = s.match(/第(.+)课/); if(m && dict[m[1]]) return dict[m[1]];
        let n = s.match(/\d+/); return n ? parseInt(n[0]) : 999;
    }

    function startPractice() {
        let sel = [...document.querySelectorAll('#topic-list input:checked')].map(i => i.value);
        if(sel.length === 0) return;
        if (!checkAndIncrementLimit(sel, 'practice')) return;
        
        unlockPinyinLessons(sel);
        currentMode = 'practice'; 
        let pool = db[curUser] || [];
        practiceList = pool.filter(q => sel.includes(q.Topic)).sort((a,b) => a.originalIndex - b.originalIndex);
        curIdx = 0; sessionErrors = 0; showScreen('practice-screen'); renderQuestion();
    }

    function startReview(btn) {
        let sel = [...document.querySelectorAll('#topic-list input:checked')].map(i => i.value);
        if(sel.length === 0) {
            const ot = btn.innerText; btn.innerText = "请先选择课文哦🐣"; btn.style.background = "#f43f5e";
            setTimeout(() => { btn.innerText = ot; btn.style.background = "#f59e0b"; }, 2000);
            return;
        }
        if (!checkAndIncrementLimit(sel, 'challenge')) return;

        unlockPinyinLessons(sel);
        currentMode = 'challenge'; 
        let pool = db[curUser] || [];
        let filtered = pool.filter(q => sel.includes(q.Topic)).sort(() => 0.5 - Math.random());
        practiceList = filtered.slice(0, Math.min(10, filtered.length));
        curIdx = 0; sessionErrors = 0; showScreen('practice-screen'); renderQuestion();
    }

    function moveQuestion(step) {
        let target = curIdx + step;
        if(target >= 0 && target < practiceList.length) { curIdx = target; renderQuestion(); }
        else if (target >= practiceList.length) { finish(); }
    }

    function renderQuestion() {
        const q = practiceList[curIdx];
        document.getElementById('prog-bar').style.width = `${((curIdx + 1) / practiceList.length) * 100}%`;
        document.getElementById('prog-text').innerText = `${curIdx + 1} / ${practiceList.length}`;
        
        // 💡 第一题时，按钮置灰且不可点
        const prevBtn = document.getElementById('prev-btn');
        if (curIdx === 0) { prevBtn.disabled = true; } else { prevBtn.disabled = false; }
        
        document.getElementById('next-btn').innerText = (curIdx === practiceList.length - 1) ? "交卷 ✨" : "下一个 ➡️";
        
        document.getElementById('draw-target').innerHTML = '';
        const skb = document.getElementById('skip-char-btn');
        const pkb = document.getElementById('peek-btn');
        skb.style.display = 'block'; 
        pkb.style.display = currentMode === 'challenge' ? 'none' : 'block'; 

        const word = q.Answer.trim(); const pinyins = q.Hint.trim().split(/\s+/);
        q.charsData = []; let pIdx = 0;
        for(let char of word) {
            let isP = /[，。！？、：；（）《》“”" "]/u.test(char);
            q.charsData.push({ char, pinyin: isP ? char : (pinyins[pIdx++] || ''), isP, done: isP });
        }
        practiceChars = q.charsData;
        document.getElementById('hint-area').innerHTML = practiceChars.map((item, i) => {
            let innerHtml = item.isP ? item.char : (item.done && currentMode !== 'challenge' ? item.char : item.pinyin);
            return `<div class="hint-unit ${item.done?'done':''}" id="py-${i}" onclick="jumpTo(${i})">${innerHtml}</div>`;
        }).join('');
        autoJump();
    }

    function jumpTo(idx) {
        if(practiceChars[idx].done) return; 
        document.querySelectorAll('.hint-unit').forEach((el, i) => el.classList.toggle('active', i === idx));
        document.getElementById('draw-target').innerHTML = `<div id="hz-box" class="hanzi-box"></div>`;
        let boxSize = window.innerWidth <= 768 ? 200 : 240;
        hzWriter = HanziWriter.create('hz-box', practiceChars[idx].char, { width: boxSize, height: boxSize, padding: 15, showOutline: false, showCharacter: false, strokeColor: '#1e293b', drawingColor: '#3b82f6', outlineColor: '#cbd5e1' });
        hzWriter.quiz({ 
            onMistake: () => { sessionErrors++; practiceList[curIdx].isWrong = true; },
            onComplete: () => {
                showThumb(); practiceChars[idx].done = true;
                let pyEl = document.getElementById(`py-${idx}`); pyEl.classList.add('done');
                pyEl.innerText = currentMode === 'challenge' ? practiceChars[idx].pinyin : practiceChars[idx].char;
                setTimeout(autoJump, 600);
            }
        });
        if (currentMode !== 'challenge') {
            const peek = document.getElementById('peek-btn');
            peek.onmousedown = peek.ontouchstart = () => hzWriter.showOutline();
            peek.onmouseup = peek.ontouchend = () => hzWriter.hideOutline();
        }
    }

    function skipCurrentChar() {
        let idx = practiceChars.findIndex(i => !i.done);
        if(idx !== -1) { 
            sessionErrors++; 
            practiceChars[idx].done = true; 
            document.getElementById(`py-${idx}`).classList.add('done'); 
            autoJump(); 
        }
    }

    function autoJump() { let next = practiceChars.findIndex(i => !i.done); if(next !== -1) jumpTo(next); }
    function showThumb() { const t = document.getElementById('thumb-up'); t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 600); }

    function finish() {
        const isPerfect = sessionErrors === 0;
        let earnedCoins = 0;
        let badgeEarned = false;
        let newBadgedTopics = [];

        if (currentMode === 'challenge' && isPerfect) {
            let involvedTopics = [...new Set(practiceList.map(q => q.Topic))];
            
            involvedTopics.forEach(topic => {
                let badgeKey = `tingxie_badge_${currentPlayer}_${topic}`;
                if (!localStorage.getItem(badgeKey)) {
                    localStorage.setItem(badgeKey, "true");
                    badgeEarned = true;
                    earnedCoins += 1; 
                    newBadgedTopics.push(topic);
                    syncToCloud({ type: 'badge', user: currentPlayer, subject: '听写', icon: '👑', title: '听写大王', desc: `完美攻克《${topic}》` });
                }
            });

            if (earnedCoins > 0) {
                let vault = parseInt(localStorage.getItem('gold_coins_vault') || "0");
                localStorage.setItem('gold_coins_vault', vault + earnedCoins);
                syncToCloud({ type: 'coin_update', user: currentPlayer, amount: earnedCoins, total: vault + earnedCoins });
            }
        }

        if (isPerfect) {
            confetti({ particleCount: 250, spread: 100 });
            new Audio("https://actions.google.com/sounds/v1/foley/cheer_short.ogg").play().catch(()=>{});
        }

        let html = `<div style="padding:40px 0;"><h1>${isPerfect?'🏆':'💪'}</h1><h2 style="font-size:36px;">${isPerfect?'太厉害了！':'继续加油！'}</h2>`;
        
        if (badgeEarned) {
            html += `<div style="background:#fffbeb; padding:15px; border-radius:20px; border:3px solid #fde68a; margin:20px 0;">
                        <div style="font-size:40px;">👑</div>
                        <div style="font-weight:900; color:#d97706;">获得【听写大王】徽章</div>
                        <div style="font-size:16px; color:#92400e; margin: 5px 0;">(${newBadgedTopics.join(', ')})</div>
                        <div style="font-size:20px; color:#b45309; margin-top:10px;">💰 +${earnedCoins} 金币已存入金库</div>
                     </div>`;
        } else if (currentMode === 'challenge' && isPerfect) {
            html += `<div style="color:#94a3b8; margin:20px 0; font-weight:800;">(这几课的【听写大王】你已经拿过啦，去挑战新课文吧！)</div>`;
        }
        
        html += `<button class="btn-action btn-quit" style="width:200px; margin:30px auto;" onclick="window.location.href='index.html'">返回主页 🏠</button></div>`;
        document.getElementById('finish-screen').innerHTML = html; showScreen('finish-screen');
        
        if (isPerfect) setTimeout(() => { window.location.href = "https://andydang2007.github.io/game/popballoons.html?ticket=" + Date.now(); }, 3000);
    }

    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.style.display='none'); document.getElementById(id).style.display='flex'; }
    init();
</script>
