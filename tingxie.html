<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>听写大挑战</title>
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/240/paper-plane.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        let currentUser = localStorage.getItem('currentPlayer') || 'Valerie'; 
        let currentGrade = localStorage.getItem('currentGrade');
        if (!currentGrade) {
            currentGrade = (currentUser === 'Venessa' || currentUser === 'P1') ? 'P1' : 'P3';
        }
        let isSister = (currentGrade === 'P1' || currentUser === 'Venessa' || currentUser === 'P1');
    </script>
    <style>
        :root { --primary: #10b981; --bg: #f8fafc; --text-main: #1e293b; --text-muted: #64748b; }
        * { box-sizing: border-box; font-family: 'Nunito', 'Microsoft YaHei', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); margin: 0; padding: 15px; color: var(--text-main); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; overflow-x: hidden; }
        
        .container { width: 100%; max-width: 650px; background: rgba(255,255,255,0.95); padding: 30px 25px; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; position: relative; border: 4px solid #ffffff; backdrop-filter: blur(12px); display: flex; flex-direction: column; align-items: center; margin-top: 4vh; margin-bottom: auto; }
        
        .screen { display: none; width: 100%; flex-direction: column; align-items: center; animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
        
        .header-tag { background: #f8fafc; color: #3b82f6; padding: 8px 20px; border-radius: 30px; font-weight: 900; font-size: 16px; border: 3px solid #e2e8f0; box-shadow: 0 3px 0 #cbd5e1; margin-bottom: 15px; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.15s; }
        .header-tag:active { transform: translateY(3px); box-shadow: none; }

        .progress-col { width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; }
        .milestone-track { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 6px; width: 100%; margin-bottom: 8px; }
        
        .milestone { width: 24px; height: 24px; background: #f8fafc; border: 2px solid #cbd5e1; border-radius: 50%; z-index: 2; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: 0.4s; box-sizing: border-box; flex-shrink: 0; }
        .milestone.done { border-color: #10b981; background: #d1fae5; }
        .milestone.active { border-color: #3b82f6; background: #eff6ff; font-size: 14px; transform: scale(1.2); box-shadow: 0 0 8px rgba(59,130,246,0.3); animation: bounceActive 1s infinite alternate; }
        @keyframes bounceActive { 0% { transform: scale(1.2) translateY(0); } 100% { transform: scale(1.2) translateY(-2px); } }

        .quiz-main-col { width: 100%; display: flex; flex-direction: column; align-items: center; }

        .audio-btn { width: 100px; height: 100px; border-radius: 50%; background: #3b82f6; border: 6px solid #bfdbfe; color: white; font-size: 40px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 10px 20px rgba(59,130,246,0.3), inset 0 -5px 10px rgba(0,0,0,0.2); transition: 0.2s; margin: 10px 0 25px 0; }
        .audio-btn:active { transform: scale(0.9) translateY(5px); box-shadow: 0 2px 5px rgba(59,130,246,0.3); }
        .audio-btn.playing { animation: pulseAudio 1s infinite; background: #10b981; border-color: #a7f3d0; }
        @keyframes pulseAudio { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(16, 185, 129, 0); } 100% { transform: scale(1); } }

        input.ans-input { font-size: 32px; padding: 15px; width: 100%; max-width: 300px; border: 4px solid #e2e8f0; border-radius: 20px; box-sizing: border-box; outline: none; font-family: 'Microsoft YaHei', sans-serif; font-weight: 900; color: #1e293b; text-align: center; margin-bottom: 20px; letter-spacing: 4px; }
        input.ans-input:focus { border-color: #3b82f6; background: #f8fafc; }
        input.ans-input.error-shake { border-color: #ef4444; animation: shake 0.3s; background-color: #fef2f2; color: #ef4444; }

        .hint-text { color: #94a3b8; font-size: 16px; font-weight: 800; margin-bottom: 10px; opacity: 0; transition: opacity 0.3s; }
        .hint-text.visible { opacity: 1; }

        .feedback { font-size: 20px; margin: 5px 0 20px 0; min-height: 28px; font-weight: 900; width: 100%; }

        .btn-action { width: 100%; border-radius: 20px; border: none; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.15s; display: flex; align-items: center; justify-content: center; outline: none; padding: 15px; box-shadow: 0 5px 0 rgba(0,0,0,0.1); }
        .btn-action:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,0.1); }

        .lesson-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; margin-top: 20px; }
        .lesson-btn { background: white; border: 3px solid #e2e8f0; border-radius: 15px; padding: 15px 5px; font-weight: 900; color: #475569; font-size: 16px; cursor: pointer; box-shadow: 0 4px 0 #cbd5e1; transition: 0.15s; }
        .lesson-btn:active { transform: translateY(4px); box-shadow: none; }
        .lesson-btn.locked { opacity: 0.5; cursor: not-allowed; background: #f1f5f9; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.85); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .epic-modal { background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); padding: 40px; border-radius: 40px; text-align: center; width: 90%; max-width: 400px; border: 6px solid #fde68a; box-shadow: inset 0 0 30px rgba(245, 158, 11, 0.2), 0 30px 60px rgba(0,0,0,0.4); display: flex; flex-direction: column; align-items: center; position: relative; transition: 0.2s; }
        @keyframes epicPop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        .epic-icon { font-size: 80px; margin-top: -80px; background: white; width: 120px; height: 120px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 6px solid #fde68a; box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3); z-index: 2; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .epic-title { font-size: 28px; font-weight: 900; color: #b45309; margin: 20px 0 10px 0; }
        .epic-desc { font-size: 16px; font-weight: 800; color: #92400e; line-height: 1.5; margin-bottom: 25px; }
        
        .stat-badge { background: #fffbeb; color: #d97706; padding: 8px 15px; border-radius: 20px; font-weight: 900; font-size: 16px; border: 2px solid #fde68a; display: inline-block; margin-top: 10px; }

        @media (min-width: 768px) { .container { padding: 40px 60px; max-width: 750px; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body>

<div class="container">
    <div id="loading" class="screen" style="display:flex; justify-content:center; align-items:center; padding: 60px 0; font-size: 20px; font-weight: 900; color: #3b82f6;">
        🌟 题库载入中... 
    </div>

    <div id="lesson-screen" class="screen">
        <h2 style="font-size: 28px; color: #0f172a; font-weight: 900; margin: 0 0 10px 0;">选择听写课文</h2>
        <div style="color: #64748b; font-weight: 800; margin-bottom: 10px;" id="lesson-subtitle"></div>
        <div class="lesson-grid" id="lesson-grid"></div>
        <button class="btn-action" style="background:#f1f5f9; color:#64748b; border: 3px solid #e2e8f0; box-shadow: 0 4px 0 #cbd5e1; margin-top: 30px;" onclick="window.location.href='index.html'">返回主页 🏠</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="header-tag" id="header-info" onclick="backToLesson()"></div>
        
        <div class="progress-col">
            <div id="progress-bar" class="milestone-track"></div>
            <div id="progress-text" style="font-size:14px; font-weight: 900; color:#94a3b8; margin-top: 5px;"></div>
        </div>

        <div class="quiz-main-col">
            <div class="audio-btn" id="audio-btn" onclick="playCurrentAudio()">
                🔊
            </div>
            
            <div id="hint-text" class="hint-text">拼音提示会在这里显示</div>
            
            <input type="text" id="ans-in" class="ans-input" placeholder="输入汉字..." autocomplete="off">
            
            <div id="fb-text" class="feedback"></div>
            
            <div style="display:flex; gap:12px; margin-top: 5px; width: 100%;">
                <button id="hint-btn" class="btn-action" style="background:#f1f5f9; color:#64748b; border: 3px solid #e2e8f0; box-shadow: 0 4px 0 #cbd5e1; flex: 0.8;" onclick="showHint()">提示 💡</button>
                <button id="sub-btn" class="btn-action" style="background:#3b82f6; color:white; box-shadow: 0 4px 0 #2563eb; flex: 1.2;" onclick="checkAns()">提交</button>
                <button id="next-btn" class="btn-action" style="background:#10b981; color:white; box-shadow: 0 4px 0 #059669; flex: 1.2; display:none;" onclick="nextQ()">下一题 ➡️</button>
            </div>
        </div>
    </div>

    <div id="finish-screen" class="screen"></div>
</div>

<div id="badge-modal" class="modal-overlay">
    <div class="epic-modal">
        <div class="epic-icon" id="badge-icon">⚡️</div>
        <div class="epic-title" id="badge-title">新纪录诞生！</div>
        <div class="epic-desc" id="badge-desc"></div>
        <div style="font-size:12px; color:#b45309; font-weight:800; margin-bottom: 20px;">☁️ 荣誉已存入云端荣誉墙...</div>
        <button class="btn-action" style="background:#f59e0b; color:white; box-shadow: 0 6px 0 #d97706;" onclick="closeBadgeModal()">Awesome! 🚀</button>
    </div>
</div>

<script>
    const SYNC_API_URL = "https://script.google.com/macros/s/AKfycbzbNOgg7deW9uVVyfYGTfKGOtVgNs_9ZfUQ9J_9cYpG2Ufow9KLDICHgsinBXrPJlmz/exec"; // 换上了最新的后端API
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlpdRHnR9ybEHHgX6fouRI-vXOh8KQNLSjsbt0TYh9R3No_9i7QNv_4ELwJZJGQpTe3oZVXaZijaW4/pub?gid=266851979&single=true&output=csv"; // 换上了老爸给的确切听写GID
    
    let db = {}, sessionQs = [], curIdx = 0, sessionErrors = 0;
    let selectedLesson = "";
    let synth = window.speechSynthesis;
    let badgeQueue = [], pendingGameResult = null;

    async function syncToCloud(payload) {
        try { fetch(SYNC_API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) }); } catch (e) {}
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    function backToLesson() {
        if(confirm("确定要退出当前听写吗？进度将不会保存。")) {
            showScreen('lesson-screen');
            if (synth.speaking) synth.cancel();
        }
    }

    // 💡 气球逻辑接口 (和练习复用)
    function applyBalloonLogic(errors) {
        const today = new Date().toISOString().split('T')[0];
        const key = `balloon_stats_${today}_${currentUser}`;
        let stats = JSON.parse(localStorage.getItem(key) || '{"goodCount":0, "date":""}');
        if (stats.date !== today) stats = { goodCount: 0, date: today }; 

        let trigger = false;
        let msg = "";

        if (errors <= 1) {
            stats.goodCount += 1; 

            if (errors === 0) {
                trigger = true;
                msg = "🎉 满分达成！直接奖励气球大作战！🎈";
            } else if (stats.goodCount % 2 === 0) {
                trigger = true;
                msg = "🎉 累计两次高质量完成！解锁气球大作战！🎈";
            } else {
                msg = "🔥 表现不错！再获得一次全对就能玩气球啦！";
            }
        }

        localStorage.setItem(key, JSON.stringify(stats));
        return { trigger, msg };
    }

    async function init() {
        document.getElementById('lesson-subtitle').innerText = `${currentUser} (${currentGrade})`;

        let cached = sessionStorage.getItem('tingxie_db_cache');
        if (cached) { 
            try { 
                db = JSON.parse(cached); 
                if (Object.keys(db).length > 0) { renderLessonMenu(); return; } 
            } catch(e) { sessionStorage.removeItem('tingxie_db_cache'); } 
        }

        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            skipEmptyLines: 'greedy',
            complete: function(results) {
                db = {};
                results.data.forEach(row => {
                    let keys = Object.keys(row);
                    let kGrade = keys.find(k => /grade|年级/i.test(k)) || keys[0];
                    let kTopic = keys.find(k => /topic|lesson|课/i.test(k)) || keys[2];
                    let kType = keys.find(k => /type|类型/i.test(k)) || keys[3]; 
                    let kChar = keys.find(k => /chinese|char|word|question|汉字|词|题目/i.test(k)) || keys[4];
                    let kPy = keys.find(k => /pinyin|correct|answer|拼音|答案/i.test(k)) || keys[6];
                    
                    let typeVal = (row[kType] || "").toString().trim().toUpperCase();
                    // 只要不是专门的 PINYIN 题，都算作听写题词库
                    if (typeVal === 'PINYIN') return;

                    let grade = (row[kGrade] || "").trim().toUpperCase();
                    let topic = (row[kTopic] || "").trim();
                    let charRaw = (row[kChar] || "").trim();
                    let pyStr = (row[kPy] || "").trim();
                    
                    if (!charRaw || !topic || !grade) return;
                    
                    let char = charRaw.replace(/[^\u4e00-\u9fa5]/g, '') || charRaw; 
                    
                    if(!db[grade]) db[grade] = {};
                    if(!db[grade][topic]) db[grade][topic] = [];
                    db[grade][topic].push({ char: char, pinyin: pyStr });
                });
                
                if (Object.keys(db).length > 0) { 
                    sessionStorage.setItem('tingxie_db_cache', JSON.stringify(db)); 
                    renderLessonMenu(); 
                } else { 
                    document.getElementById('loading').innerText = "⚠️ 题库格式错误。"; 
                }
            },
            error: function() {
                document.getElementById('loading').innerText = "⚠️ 网络慢，请重试。";
            }
        });
    }

    function renderLessonMenu() {
        const grid = document.getElementById('lesson-grid');
        grid.innerHTML = '';
        
        let topics = db[currentGrade] ? Object.keys(db[currentGrade]) : [];
        if (topics.length === 0) {
            grid.innerHTML = `<div style="grid-column: span 3; color: #ef4444; font-weight: bold;">没有找到 ${currentGrade} 的课文数据。</div>`;
            showScreen('lesson-screen');
            return;
        }

        // 提取课文数字并排序
        let sortedTopics = topics.map(t => {
            let match = t.match(/\d+/);
            let num = match ? parseInt(match[0]) : (t.includes('一') ? 1 : (t.includes('二') ? 2 : (t.includes('三') ? 3 : 99)));
            return { raw: t, num: num };
        }).sort((a, b) => a.num - b.num);

        // 获取错题本里属于听写的错题 (提取这学期的)
        let mistakes = JSON.parse(localStorage.getItem('hub_mistakes') || '{}');
        let hasMistakes = false;
        for (let key in mistakes) {
            if (key.includes(`${currentUser}_华文`) && !key.includes('PINYIN')) {
                hasMistakes = true; break;
            }
        }

        if (hasMistakes) {
            let btn = document.createElement('button');
            btn.className = 'lesson-btn';
            btn.style.borderColor = '#ef4444';
            btn.style.color = '#ef4444';
            btn.style.gridColumn = 'span 3';
            btn.innerHTML = `🐞 错题重听`;
            btn.onclick = () => startTingxie('MISTAKES');
            grid.appendChild(btn);
        }

        sortedTopics.forEach(tObj => {
            let btn = document.createElement('button');
            btn.className = 'lesson-btn';
            btn.innerText = tObj.raw;
            btn.onclick = () => startTingxie(tObj.raw);
            grid.appendChild(btn);
        });

        showScreen('lesson-screen');
    }

    function startTingxie(topic) {
        selectedLesson = topic;
        sessionQs = [];
        
        if (topic === 'MISTAKES') {
            let mistakes = JSON.parse(localStorage.getItem('hub_mistakes') || '{}');
            let pool = [];
            // 把所有这学期的华文错题捞出来听写
            if (db[currentGrade]) {
                for (let t in db[currentGrade]) {
                    db[currentGrade][t].forEach(q => {
                        let key = `${currentUser}_华文_${q.char}`;
                        if (mistakes[key]) pool.push(q);
                    });
                }
            }
            if (pool.length === 0) { alert("错题本已清空！"); return; }
            sessionQs = pool.sort(() => 0.5 - Math.random()).slice(0, 15);
            document.getElementById('header-info').innerHTML = `← 🐞 错题听写`;
        } else {
            let pool = db[currentGrade][topic];
            sessionQs = [...pool].sort(() => 0.5 - Math.random());
            document.getElementById('header-info').innerHTML = `← 🐼 ${topic}`;
        }
        
        curIdx = 0; sessionErrors = 0;
        showScreen('quiz-screen');
        renderQ();
    }

    function updateProgress() {
        const bar = document.getElementById('progress-bar');
        let html = '';
        for(let i=0; i<sessionQs.length; i++) {
            html += `<div class="milestone${i < curIdx ? ' done' : (i === curIdx ? ' active' : '')}">${i < curIdx ? '⭐' : (i === curIdx ? '🐼' : '☁️')}</div>`;
        }
        bar.innerHTML = html;
        document.getElementById('progress-text').innerText = `${curIdx + 1} / ${sessionQs.length}`;
    }

    function renderQ() {
        updateProgress();
        document.getElementById('ans-in').value = '';
        document.getElementById('ans-in').disabled = false;
        document.getElementById('fb-text').innerText = '';
        
        document.getElementById('hint-text').innerText = sessionQs[curIdx].pinyin || "无拼音提示";
        document.getElementById('hint-text').classList.remove('visible');

        document.getElementById('hint-btn').style.display = 'flex';
        document.getElementById('sub-btn').style.display = 'flex'; 
        document.getElementById('next-btn').style.display = 'none';
        
        if (curIdx === sessionQs.length - 1) document.getElementById('next-btn').innerText = "完成听写 ✨";
        else document.getElementById('next-btn').innerText = "下一个 ➡️";
        
        document.getElementById('ans-in').focus();
        
        setTimeout(playCurrentAudio, 300);
    }

    function playCurrentAudio() {
        if (synth.speaking) synth.cancel();
        
        const btn = document.getElementById('audio-btn');
        btn.classList.add('playing');
        
        let utterThis = new SpeechSynthesisUtterance(sessionQs[curIdx].char);
        utterThis.lang = 'zh-CN';
        utterThis.rate = 0.75; 
        
        utterThis.onend = function() { btn.classList.remove('playing'); }
        utterThis.onerror = function() { btn.classList.remove('playing'); }
        
        synth.speak(utterThis);
    }

    function showHint() {
        document.getElementById('hint-text').classList.add('visible');
        document.getElementById('ans-in').focus();
    }

    function checkAns() {
        const input = document.getElementById('ans-in');
        const user = input.value.trim();
        const correctRaw = sessionQs[curIdx].char;
        const fb = document.getElementById('fb-text');
        
        if(user === "") { alert("请写下听到的词语！"); return; }
        
        let isCorrect = (user === correctRaw);
        let key = `${currentUser}_华文_${correctRaw}`;
        let mistakes = JSON.parse(localStorage.getItem('hub_mistakes') || '{}');
        let mData = mistakes[key] || { level: 3, wrongs: [] };
        if (typeof mData === 'number') mData = { level: mData, wrongs: [] };

        if(isCorrect) {
            input.disabled = true; 
            document.getElementById('hint-btn').style.display = 'none';
            document.getElementById('sub-btn').style.display = 'none'; 
            document.getElementById('next-btn').style.display = 'flex';
            fb.innerHTML = `<span style="color:#10b981;">✅ 拼写正确！</span>`;
            
            // 答对了，如果是错题库里的，减弱权重
            if (mistakes[key]) {
                mData.level += 1; 
                if (mData.level >= 5) delete mistakes[key]; 
                else mistakes[key] = mData;
                localStorage.setItem('hub_mistakes', JSON.stringify(mistakes));
                syncToCloud({type: 'mistake_update', user: currentUser, grade: currentGrade, subject: '华文', questionKey: key, level: mData.level});
            }
        } else {
            sessionErrors++; 
            fb.innerHTML = `<span style="color:#ef4444;">❌ 不对哦！</span><br><span style="font-size:16px; color:#64748b;">正确写法：<b style="color:#0f172a; font-size:24px;">${correctRaw}</b></span>`;
            input.classList.add('error-shake'); 
            setTimeout(()=> input.classList.remove('error-shake'), 400);
            
            input.disabled = true; 
            document.getElementById('hint-btn').style.display = 'none';
            document.getElementById('sub-btn').style.display = 'none'; 
            document.getElementById('next-btn').style.display = 'flex';
            
            // 答错了，加进错题本
            mData.level = Math.max(1, mData.level - 1);
            if (mData.wrongs[mData.wrongs.length - 1] !== user) mData.wrongs.push(user);
            mistakes[key] = mData;
            localStorage.setItem('hub_mistakes', JSON.stringify(mistakes));
            syncToCloud({type: 'mistake_update', user: currentUser, grade: currentGrade, subject: '华文', questionKey: key, level: mData.level, wrongAns: user});
        }
    }

    function nextQ() { 
        if (synth.speaking) synth.cancel();
        if (curIdx < sessionQs.length - 1) { curIdx++; renderQ(); } 
        else { finishTingxie(); } 
    }

    // 💡 终极联动结算逻辑
    function finishTingxie() {
        const isPerfect = sessionErrors === 0;
        badgeQueue = [];

        // ---------------- 1. 自动解锁拼音游戏进度 ----------------
        try {
            if (selectedLesson !== 'MISTAKES') {
                let currentLessonNum = parseInt(selectedLesson.replace(/\D/g, ''));
                if (!isNaN(currentLessonNum)) {
                    let savedMax = parseInt(localStorage.getItem(`max_lesson_${currentUser}`) || "8");
                    if (currentLessonNum > savedMax) {
                        localStorage.setItem(`max_lesson_${currentUser}`, currentLessonNum);
                        console.log(`自动解锁拼音：${currentLessonNum}`);
                    }
                }
            }
        } catch(e) {}

        // ---------------- 2. 听写大王徽章 (全对且首次) ----------------
        if (isPerfect && selectedLesson !== 'MISTAKES') {
            const badgeKey = `tingxie_badge_${currentUser}_${selectedLesson}`;
            if (!localStorage.getItem(badgeKey)) {
                localStorage.setItem(badgeKey, "true");
                
                let coinGain = isSister ? 4 : 2; // 听写给多点金币！妹妹4个，姐姐2个
                let vaultCoins = parseInt(localStorage.getItem('gold_coins_vault') || "0");
                localStorage.setItem('gold_coins_vault', vaultCoins + coinGain);

                badgeQueue.push({ icon: '👑', title: '听写大王', desc: `完美默写了《${selectedLesson}》！<br>金币 +${coinGain}！` });
                syncToCloud({ type: 'badge', user: currentUser, subject: '听写', icon: '👑', title: '听写大王', desc: `完美默写《${selectedLesson}》` });
                syncToCloud({ type: 'coin_update', user: currentUser, amount: coinGain, total: vaultCoins + coinGain });
            }
        }

        // ---------------- 3. 气球大作战逻辑 (全对触发) ----------------
        if (isPerfect) {
            pendingGameResult = applyBalloonLogic(sessionErrors);
            if (pendingGameResult && pendingGameResult.trigger) {
                badgeQueue.push({ icon: '🎈', title: '气球猎人！', desc: pendingGameResult.msg });
            }
        } else {
            pendingGameResult = null; 
        }

        if (badgeQueue.length > 0) {
            document.getElementById('badge-modal').style.display = 'flex';
            showNextBadge();
        } else {
            renderFinalScreen();
        }
    }

    function showNextBadge() {
        if (badgeQueue.length > 0) {
            let b = badgeQueue.shift(); let m = document.querySelector('.epic-modal');
            m.style.transform = m.style.opacity = ''; m.style.animation = 'none'; void m.offsetWidth; m.style.animation = 'epicPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            document.getElementById('badge-icon').innerText = b.icon;
            document.getElementById('badge-title').innerText = b.title;
            document.getElementById('badge-desc').innerHTML = b.desc;
            if (typeof confetti === 'function') confetti({ particleCount: 300, spread: 150, origin: { y: 0.3 }, zIndex: 1001 });
        } else { document.getElementById('badge-modal').style.display = 'none'; renderFinalScreen(); }
    }

    function closeBadgeModal() {
        let m = document.querySelector('.epic-modal'); m.style.transform = 'scale(0.8)'; m.style.opacity = '0';
        setTimeout(showNextBadge, 150);
    }

    function renderFinalScreen() {
        const isPerfect = sessionErrors === 0;
        let title = isPerfect ? '🎉 听写全对！' : '💪 听写完成！';
        
        let html = `<div style="text-align:center; padding: 40px 0;"><h1 style="font-size:30px; color:#0f172a; font-weight:900;">${title}</h1>`;
        
        if (pendingGameResult && pendingGameResult.msg) {
            html += `<div class="stat-badge">${pendingGameResult.msg}</div>`;
        }
        
        if (sessionErrors > 0) {
            html += `<p style="color:#ef4444; font-weight:800; margin-top:20px; font-size: 16px;">🐞 已将 ${sessionErrors} 个易错字关进捉虫日记。</p>`;
        }
        
        html += `<button class="btn-action" style="background:#f1f5f9; color:#64748b; width:100%; max-width: 250px; margin: 30px auto 0 auto; border: 3px solid #e2e8f0;" onclick="window.location.href='index.html'">🏠 返回主页</button></div>`;
        
        document.getElementById('finish-screen').innerHTML = html; 
        showScreen('finish-screen');
        
        if (isPerfect && pendingGameResult && pendingGameResult.trigger) {
            setTimeout(() => { window.location.href = "https://andydang2007.github.io/game/popballoons.html?ticket=" + Date.now(); }, 2500);
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (document.getElementById('quiz-screen').style.display === 'flex') {
                if (document.getElementById('sub-btn').style.display !== 'none') { e.preventDefault(); checkAns(); }
                else if (document.getElementById('next-btn').style.display !== 'none') { e.preventDefault(); nextQ(); }
            } else if (document.getElementById('badge-modal').style.display === 'flex') { e.preventDefault(); closeBadgeModal(); }
        }
    });

    window.onload = init;
</script>
</body>
</html>
